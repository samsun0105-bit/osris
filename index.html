        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }
        @keyframes scan {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(100%); opacity: 0; }
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(to right, transparent, #3b82f6, transparent);
            animation: scan 2s linear infinite;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }
        .new-badge {
            animation: blink 1.5s infinite;
        }
        
        .law-card-glow {
            border: 1px solid #e2e8f0;
            background-color: #ffffff;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .law-card-glow:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            border-color: #3b82f6;
        }

        ins { background: #e6ffed; text-decoration: none; border-bottom: 2px solid #059669; font-weight: 500; color: #065f46; padding: 0 2px; }
        del { background: #ffeef0; color: #991b1b; text-decoration: line-through; padding: 0 2px; }

        .admin-input {

            transition: all 0.2s;

        .admin-input:focus {

            init: () => {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            db.createObjectStore(STORE_NAME);
                        }
                    };
                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = (e) => reject(e.target.error);
                });
            },
            get: async (key) => {
                const db = await dbManager.init();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, 'readonly');
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.get(key);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },
            set: async (key, value) => {
                const db = await dbManager.init();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, 'readwrite');
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.put(value, key);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });

const applyImportedRegulationData = (importedData) => {
    let importedLaws = null;
    let importedLawDetails = null;

    /*
     * 新版統一 JSON：
     * {
     *   version: "regulation-identification-system-json-v2",
     *   exportType: "unified-data",
     *   laws: [...],
     *   lawDetails: {...}
     * }
     */
    if (
        importedData &&
        importedData.version === "regulation-identification-system-json-v2" &&
        Array.isArray(importedData.laws) &&
        importedData.lawDetails
    ) {
        importedLaws = importedData.laws;
        importedLawDetails = importedData.lawDetails;
    }

    /*
     * 舊版 JSON：
     * {
     *   laws: [...],
     *   lawDetails: {...}
     * }
     */
    else if (
        importedData &&
        Array.isArray(importedData.laws) &&
        importedData.lawDetails
    ) {
        importedLaws = importedData.laws;
        importedLawDetails = importedData.lawDetails;
    }

    else {
        throw new Error('無效的資料檔案格式。');
    }

    return {
        laws: importedLaws,
        lawDetails: importedLawDetails
    };
};

const handleAllSync = async () => {
    if (!canUseSmartSync()) {
        alert('目前權限無法使用智能同步。');
        return;
    }

    setSyncText('智能同步執行中');
    setIsSyncing(true);

try {
    // 建立控制器（用來中斷請求）
    const controller = new AbortController();

    // 設定60秒後自動中止，避免外部法規資料庫偶發延遲造成同步失敗
    const timeoutId = setTimeout(() => controller.abort(), 60000);

    // 發送請求（帶入 signal）
    const response = await fetch('/api/sync-laws', {
        signal: controller.signal
    });

    // 請求完成 → 取消 timeout
    clearTimeout(timeoutId);

    const result = await response.json();

        if (!response.ok || !result.success) {
            throw new Error(result.error || '法規同步失敗');
        }

        const syncData = result.data || [];

        setLaws(prevLaws => {
            return prevLaws.map(law => {
                const match = syncData.find(item => item.Pcode === law.pcode);

                if (match && match.LastUpdate) {
                    return {
                        ...law,
                        remoteDate: match.LastUpdate
                    };
                }

                return law;
            });
        });

        alert(`智能同步完成，共取得 ${result.count} 筆法規資料。`);

} catch (error) {
    if (error.name === 'AbortError') {
        alert('同步等候逾時，可能是全國法規資料庫暫時回應較慢，請稍後再試。');
    } else {
        alert('同步失敗：' + error.message);
    }
} finally {
    setIsSyncing(false);
}
};
