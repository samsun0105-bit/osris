    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }
        @keyframes scan {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(100%); opacity: 0; }
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(to right, transparent, #3b82f6, transparent);
            animation: scan 2s linear infinite;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }
        .new-badge {
            animation: blink 1.5s infinite;
        }
        
        .law-card-glow {
            border: 1px solid #e2e8f0;
            background-color: #ffffff;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .law-card-glow:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            border-color: #3b82f6;
        }

        ins { background: #e6ffed; text-decoration: none; border-bottom: 2px solid #059669; font-weight: 500; color: #065f46; padding: 0 2px; }
        del { background: #ffeef0; color: #991b1b; text-decoration: line-through; padding: 0 2px; }

        .admin-input {
            background: transparent;
            border-bottom: 1px dashed #cbd5e1;
            outline: none;
            width: 100%;
            transition: all 0.2s;
        }
        .admin-input:focus {
            border-bottom: 1px solid #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }

/* 權限與密碼設定：密碼輸入框統一為績效管理系統視覺比例 */
.permission-password-input {
    width: 100%;
    padding: 0.5rem 1rem;
    background-color: #f1f5f9;
    border: none;
    border-radius: 0.5rem;
    outline: none;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.875rem;
    line-height: 1.25rem;
    font-weight: 400;
    color: #334155;
    text-align: left;
    letter-spacing: 0.16em;
    transition: all 0.2s ease;
}

.permission-password-input:focus {
    box-shadow: 0 0 0 2px #3b82f6;
}

.permission-password-input::placeholder {
    color: #94a3b8;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.875rem;
    font-weight: 400;
    letter-spacing: 0.16em;
    opacity: 1;
}

.mobile-compare-card-list {
    display: none;
}

.time-mobile-date,
.time-mobile-clock {
    display: none;
}

.time-display-box {
    text-align: right;
}

/* 鑑別工作台視覺比例優化 */

.workbench-header-layout {
    align-items: flex-end;
}

.workbench-title-zone {
    flex: 1 1 auto;
    max-width: 760px;
    padding-left: 0.25rem;
}

.action-buttons {
    flex: 0 0 auto;
    align-items: center;
}

/*
 * 鑑別工作台標籤列：
 * 手機直式時，編輯與儲存會顯示在右側。
 */
.workbench-kicker-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

/*
 * 手機直式專用編輯／儲存區。
 * 桌機及手機橫式預設隱藏。
 */
.workbench-mobile-edit-controls {
    display: none;
}

/*
 * 桌機及手機橫式使用的編輯／儲存區。
 */
.workbench-standard-edit-controls {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 0.5rem;
    flex: 0 0 auto;
}

.workbench-kicker {
    padding: 0.45rem 1rem;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
}

.workbench-kicker i {
    font-size: 0.9rem;
}

.workbench-title {
    font-size: 1.85rem;
    line-height: 1.25;
    letter-spacing: -0.02em;
}

.workbench-date-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
}

.workbench-date-card {
    min-width: 150px;
    padding: 0.65rem 1rem;
}

.workbench-date-label {
    font-size: 0.72rem;
    line-height: 1.1;
}

.workbench-date-value {
    font-size: 0.95rem;
    line-height: 1.25;
}

.workbench-action-btn {
    min-height: 44px;
    padding: 0.72rem 1.35rem;
    font-size: 0.88rem;
    border-radius: 1rem;
}

/* 編輯／檢視雙態圖示按鈕，以及正式儲存按鈕 */
.edit-toggle-icon-btn,
.save-data-icon-btn {
    width: 40px;
    height: 40px;
    min-width: 40px;
    flex: 0 0 40px;

    border-radius: 12px;

    display: inline-flex;
    align-items: center;
    justify-content: center;

    font-size: 14px;

    transition:
        background-color 0.18s ease,
        border-color 0.18s ease,
        color 0.18s ease,
        transform 0.18s ease;

    box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
}

/* 尚未進入編輯模式 */
.edit-toggle-icon-btn.is-view {
    background: #ffffff;
    border: 1px solid #bfdbfe;
    color: #2563eb;
}

.edit-toggle-icon-btn.is-view:hover {
    background: #eff6ff;
    border-color: #93c5fd;
}

/* 已進入編輯模式 */
.edit-toggle-icon-btn.is-editing {
    background: #fffbeb;
    border: 1px solid #fbbf24;
    color: #b45309;
}

.edit-toggle-icon-btn.is-editing:hover {
    background: #fef3c7;
    border-color: #f59e0b;
    color: #92400e;
}

/* 綠色儲存按鈕 */
.save-data-icon-btn {
    background: #059669;
    border: 1px solid #059669;
    color: #ffffff;
}

.save-data-icon-btn:hover {
    background: #047857;
    border-color: #047857;
}

.edit-toggle-icon-btn:active,
.save-data-icon-btn:active {
    transform: scale(0.96);
}

.compare-summary-box {
    padding: 1.15rem 1.35rem;
    gap: 1rem;
    border-radius: 1.5rem;
}

.compare-summary-icon {
    width: 3rem;
    height: 3rem;
}

.compare-summary-icon i {
    font-size: 1.45rem;
}

.compare-summary-title {
    font-size: 1rem;
    line-height: 1.3;
}

.compare-summary-text {
    font-size: 0.9rem;
    line-height: 1.55;
}

.compare-table {
    table-layout: fixed;
}

.compare-table th {
    padding: 1rem 1.25rem;
    font-size: 0.76rem;
    line-height: 1.35;
}

.compare-table td {
    padding: 1.15rem 1.25rem;
}

.compare-delete-btn {
    width: 2.2rem;
    height: 2.2rem;
    border-radius: 0.85rem;
}

.admin-textarea-compact {
    width: 100%;
    min-height: 38px;
    resize: vertical;
    overflow: auto;
    line-height: 1.5;
    word-break: break-word;
    overflow-wrap: anywhere;
    background: transparent;
    border: 1px dashed #cbd5e1;
    border-radius: 0.65rem;
    padding: 0.45rem 0.55rem;
    outline: none;
    transition: all 0.2s ease;
}

.admin-textarea-compact:focus {
    border-color: #3b82f6;
    background: rgba(59, 130, 246, 0.05);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08);
}

.law-monitor-input {
    border: 1px dashed #cbd5e1;
    border-radius: 0.65rem;
    padding: 0.35rem 0.55rem;

}

.law-monitor-input:focus {
    border-color: #3b82f6;
    background: #ffffff;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08);

        const DB_NAME = 'OSH_Regulation_Production';

            init: () => {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            db.createObjectStore(STORE_NAME);
                        }
                    };
                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = (e) => reject(e.target.error);
                });

            get: async (key) => {
                const db = await dbManager.init();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, 'readonly');
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.get(key);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },
            set: async (key, value) => {
                const db = await dbManager.init();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, 'readwrite');
                    const store = transaction.objectStore(STORE_NAME);

                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);

    { no: '第 15-1 條', old: '原無一定規模以上營造工程於規劃、設計及施工階段之源頭風險分析、安全衛生圖說、規範及經費編列規定。', new: '<ins>新增一定規模以上營造工程交付規劃、設計及施工時，事業單位應依工程特性分析潛在危害，編製安全衛生圖說、規範及經費，並使施工者採取預防作為。</ins>', note: '營造源頭防災' },

    { no: '第 22 條', old: '原規定事業單位應僱用或特約醫護人員辦理勞工健康保護事項。', new: '將原本事業單位應僱用或特約醫護人員辦理勞工健康保護事項，修正為應<ins>置勞工健康服務人員或委託勞工健康服務專業機構辦理</ins>，並增列<ins>工作相關疾病預防</ins>。', note: '健康服務強化' },

    { no: '第 22-1 條', old: '原無職場霸凌之法定定義及雇主建立申訴管道、處理規範與公開揭示之明確規定。', new: '<ins>新增職場霸凌定義</ins>，並規定雇主應依事業單位規模訂定申訴管道及處理規範，且應公開揭示，建立職場霸凌防治基本制度。', note: '職場霸凌新增' },

    { no: '第 22-2 條', old: '原無職場霸凌內部申訴、調查、處理、利益迴避及申訴人保護之完整制度。', new: '<ins>新增職場霸凌內部申訴、調查及處理機制</ins>，明定調查人員利益迴避、申訴人協助及保護措施，並要求雇主將申訴案件及處理結果<ins>登錄至指定網站</ins>。', note: '霸凌申訴機制' },

    { no: '第 22-3 條', old: '原無被申訴人為事業單位最高負責人時之外部申訴及調查處理機制。', new: '<ins>新增被申訴人為最高負責人時之外部申訴、調查及處理機制</ins>，勞工得向地方主管機關申訴，地方主管機關並得請專業人士或民間團體協助調查。', note: '最高負責人申訴' },

    { no: '第 23 條', old: '原條文對事業單位內各層級人員之職業安全衛生責任分工規定較為概括。', new: '明確化事業單位內各層級人員之職業安全衛生職責，強化<ins>雇主、工作場所負責人、各級主管及相關人員</ins>在安全衛生管理上的責任分工。', note: '職責明確化' },

    { no: '第 24 條', old: '原條文對具有危險性機械、危險性設備或其他特定機械操作人員之資格要求及安全義務規定較不完整。', new: '明定雇主對具有危險性機械、危險性設備或其他特定機械操作人員，應僱用<ins>經認可教育訓練或技能檢定合格者</ins>充任，並要求操作人員遵守安全衛生規定。', note: '操作資格強化' },

    { no: '第 26 條', old: '原承攬危害告知規定，未明確要求交付承攬前先實施風險評估；對工作場所或設備出租、出借之危害告知亦未完整規範。', new: '強化承攬危害告知規定，事業單位交付承攬前應先<ins>實施風險評估，再據以危害告知</ins>；另新增工作場所或設備出租、出借時，亦應事前告知相關危害因素。', note: '承攬告知強化' },

    { no: '第 27 條', old: '原共同作業防災管理規定，對施工現場機械、設備、器具、人員進場管制及再承攬管理之要求較不完整。', new: '擴大共同作業之防災管理範圍，增列<ins>施工現場機械、設備、器具及人員進場管制</ins>，並要求再承攬人就其承攬部分交付再承攬時，亦應辦理防災事項。', note: '共同作業強化' },

    { no: '第 27-1 條', old: '原無事業單位將工程交付二個以上施工者施工時之整體安全衛生統合管理責任規定。', new: '<ins>新增事業單位將工程交付二個以上施工者施工時，應指定其中一施工者負整體工程安全衛生統合管理責任</ins>，以避免多施工者作業介面管理落差。', note: '統合管理新增' },

    { no: '第 32 條', old: '原條文未建立職業安全衛生教育訓練單位之完整認可及品質管理法源。', new: '增訂<ins>職業安全衛生教育訓練單位之認可管理機制</ins>，使教育訓練機構管理、認可及品質管制更具法源依據。', note: '訓練機構管理' },

    { no: '第 39 條', old: '原主管機關或勞動檢查機構調查協助及申訴人保護規定較不完整。', new: '主管機關或勞動檢查機構辦理調查時，得請<ins>專業人士或民間團體協助</ins>；並增列雇主不得對申訴人及協助申訴之工作者為不利處分之樣態。', note: '申訴保護強化' },

    { no: '第 40 條', old: '原違反職業安全衛生規定且情節重大者之刑事責任上限較低。', new: '提高違反職業安全衛生規定且情節重大者之<ins>刑事責任上限</ins>，強化重大職災或重大違法行為之嚇阻效果。', note: '刑責加重' },

    { no: '第 41 條', old: '原違反相關規定致發生職業災害或危害工作者安全健康之刑事處罰額度較低。', new: '提高違反相關規定致發生職業災害或危害工作者安全健康之<ins>刑事處罰額度</ins>，強化事業單位及相關責任人之防災責任。', note: '刑責加重' },

    { no: '第 43 條', old: '原行政罰規定未納入本次新增之職場霸凌防治相關義務。', new: '增訂違反<ins>職場霸凌防治相關規定</ins>之行政罰責，並配合修正後條文調整援引條次及罰鍰規定。', note: '霸凌罰責新增' },

    { no: '第 44 條', old: '原部分違反職業安全衛生規定之行政罰鍰額度及適用事項，未配合本次修法調整。', new: '配合修法調整相關違規事項之行政罰鍰規定，<ins>提高部分違規行為罰鍰額度</ins>，以強化法規執行效果。', note: '罰鍰提高' },

    { no: '第 45 條', old: '原罰則適用範圍未完整涵蓋新增承攬管理、職場霸凌防治及其他新制義務。', new: '配合新增承攬管理、職場霸凌防治及相關義務，修正違反規定之<ins>罰則適用範圍</ins>，使裁罰依據與新制一致。', note: '罰則配套修正' },

    { no: '第 46 條', old: '原對特定機械操作人員違規致發生職業災害者，主要以罰鍰處分，未設指定講習制度。', new: '對特定機械操作人員未遵守安全衛生規定致發生職業災害者，除處以罰鍰外，並應<ins>接受指定講習</ins>，以強化再教育及防災改善。', note: '講習制度新增' },

    { no: '第 48 條', old: '原行政處罰規定未完整配合本次新增及修正之職業安全衛生義務調整。', new: '配合新增及修正條文，調整相關違反事項之罰則規定，使<ins>行政處罰與新修職安法義務相互銜接</ins>。', note: '罰則配套修正' },

    { no: '第 49 條', old: '原違法公布內容較為有限，未完整揭露處分期日、違反條文、罰鍰金額及重大職災相關資訊。', new: '擴大違法公布事項，增列<ins>處分期日、違反條文及罰鍰金額</ins>；發生重大職災或特定違法情形者，並應公布<ins>職災發生日期、發生地及罹災人數</ins>。', note: '違法公布擴大' },

    { no: '第 51 條', old: '原自營作業者獨立作業或將其作業交付承攬時，對危害告知及承攬安全衛生管理之適用規定較不明確。', new: '明定自營作業者獨立作業或以其作業交付承攬時，<ins>適用危害告知及承攬安全衛生管理規定</ins>，強化自營作業者防災責任。', note: '自營作業者責任' },

    { no: '第 51-1 條', old: '原無數位平台經營商品交易或運送，並交付無僱傭關係個人從事外送作業之雇主義務適用規定。', new: '<ins>新增數位平台經營商品交易或運送，並交付無僱傭關係個人親自履行外送作業時，該事業單位適用本法有關雇主義務之相關規定。</ins>', note: '外送平台納管' }
] },
                                2: { rows: [
    { no: '第 2 條', old: '本條原引用本法相關定義，但尚未納入本法第 2 條第 6 款所定人員範圍。', new: '增列本法第 2 條第 6 款之引用，明確將<ins>「自營作業者」及「其他受工作場所負責人指揮或監督從事勞動之人員」</ins>納入相關定義適用範圍。', note: '擴大適用對象' },

    { no: '第 3 條', old: '本條原就工作場所負責人及相關用詞進行定義，但未完整對應新版母法之引用條文。', new: '增列本法<ins>第 2 條第 6 款及第 23 條第 4 項</ins>等引用，使「工作場所負責人」定義可對應新版母法規定。', note: '定義引用修正' },

    { no: '第 5 條', old: '原條文規定「勞動場所、工作場所、作業場所」之相關定義。', new: '<del>刪除原「勞動場所、工作場所、作業場所」定義。</del><ins>相關定義已提升至職業安全衛生法本法位階。</ins>', note: '條文刪除' },

    { no: '第 8 條', old: '風險評估定義原未明確納入事業單位交付承攬時之適用情形。', new: '風險評估定義增列適用於本法<ins>第 26 條第 1 項</ins>，配合事業單位交付承攬時應實施風險評估之規定。', note: '承攬風險評估' },

    { no: '第 11 條', old: '原職場不法侵害預防規定，對內部調查、處置及法律責任認定之程序未有完整說明。', new: '修正職場不法侵害預防規定，明定雇主應依相關法令採取必要措施，<ins>包括辦理內部調查及處置；涉及民事、刑事或行政責任者，由各主管機關或司法機關認定。</ins>', note: '不法侵害處理' },

    { no: '第 19 條', old: '原管制性化學品範圍之認定標準較為概括。', new: '明確界定管制性化學品範圍，將符合<ins>CNS 15030 分類屬致癌、生殖細胞致突變或生殖毒性第 1 級，且經評估具高度暴露風險者</ins>納入。', note: '化學品管制強化' },

    { no: '第 28 條', old: '原條文規定特別危害健康作業之相關定義。', new: '<del>刪除特別危害健康作業定義。</del><ins>相關內容已移由勞工健康保護規則規範。</ins>', note: '條文刪除' },

    { no: '第 30 條', old: '原條文規定體格及健康檢查、健康服務資料保存及管理等事項。', new: '<del>刪除體格及健康檢查、健康服務資料保存管理規定。</del><ins>相關事項已移由勞工健康保護規則規範。</ins>', note: '條文刪除' },

    { no: '第 31 條', old: '原條文規定職業安全衛生管理計畫之內容。', new: '<del>刪除職業安全衛生管理計畫內容規定。</del><ins>相關內容改由職業安全衛生管理辦法規範。</ins>', note: '條文刪除' },

    { no: '第 32 條', old: '職業安全衛生委員會職責為「審議、協調及建議」。', new: '職業安全衛生委員會職責由「審議、協調及建議」修正為<ins>「審議、協調、考核及建議」</ins>，新增考核職責。', note: '管理職責強化' },

    { no: '第 34 條', old: '原條文規定安全衛生管理由雇主或代理人綜理，並由各級主管指揮及監督。', new: '<del>刪除安全衛生管理由雇主或代理人綜理、各級主管指揮監督之規定。</del><ins>相關內容已提升至本法位階。</ins>', note: '條文刪除' },

    { no: '第 36 條', old: '交付承攬之事前告知方式原為書面或召開協商會議。', new: '交付承攬之事前告知方式修正為可採<ins>「書面或電子文件」</ins>，或召開協商會議並作成紀錄。', note: '數位化告知' },

    { no: '第 36-1 條', old: '原無出租或出借工作場所、設備時之事前告知規定。', new: '<ins>新增出租或出借工作場所、設備時之事前告知規定，明定應於出租或出借前，以書面或電子文件告知危害因素及安全衛生注意事項。</ins>', note: '新增出租出借告知' },

    { no: '第 37 條', old: '共同作業對象為「事業單位與承攬人、再承攬人所僱用之勞工」。', new: '共同作業對象修正為<ins>「事業單位與承攬人、再承攬人之工作者」</ins>，擴大適用對象。', note: '擴大共同作業範圍' },

    { no: '第 38 條', old: '原協議組織規定未完整納入工作場所負責人、變更管理及不利氣候風險預防事項。', new: '強化協議組織功能，明定由原事業單位召集承攬人、再承攬人之<ins>工作場所負責人</ins>協議；並增列<ins>變更管理及高、低氣溫等不利氣候風險預防措施</ins>。', note: '承攬協議強化' },

    { no: '第 41 條', old: '原安全衛生工作守則內容未明確納入機械設備操作程序及個人防護具維護使用事項。', new: '安全衛生工作守則新增<ins>「機械、設備或器具之操作規範與作業程序」及「個人防護具之維護及使用」</ins>等內容。', note: '工作守則強化' },

    { no: '第 46-1 條', old: '原無職災發生時人員清點、現場管制及緊急撤離等完整規定。', new: '<ins>新增職災發生時之急救及搶救措施，包括人員清點、現場管制、提供緊急應變人員必要個人防護具與設備，以及規劃緊急撤離機制。</ins>', note: '職災應變強化' },

    { no: '第 51 條', old: '應填載職業災害內容及統計之事業單位門檻為勞工人數 50 人以上。', new: '應填載職業災害內容及統計之事業單位門檻，由勞工人數<del>50 人以上</del>下修為<ins>30 人以上</ins>；並增列報請備查方式由中央主管機關定之。', note: '填報門檻下修' },

    { no: '第 53 條', old: '地方主管機關及目的事業主管機關辦理職業安全衛生業務內容，包括「法制、執行、督導、檢討分析」。', new: '業務內容調整為<ins>「法規及制度、推動及實施、督導及成效評估、檢討及持續改善」</ins>。', note: '管理機制調整' },

    { no: '第 54 條', old: '原施行日期規定未包含本次 115 年 6 月 26 日修正發布條文。', new: '增列本次<ins>115 年 6 月 26 日修正發布條文，自 115 年 7 月 1 日施行</ins>。', note: '施行日期修正' }
] },
3: { rows: [
    { no: '第 1 條', old: '本辦法原依職業安全衛生法第 23 條第 4 項規定訂定。', new: '配合職業安全衛生法第 23 條項次調整，將本辦法授權依據由<del>第 23 條第 4 項</del>修正為<ins>第 23 條第 5 項</ins>。', note: '授權依據修正' },

    { no: '第 1-1 條', old: '原規定事業單位應依其規模、性質，建立職業安全衛生管理系統。', new: '將「建立職業安全衛生管理系統」修正為<ins>「建立職業安全衛生管理制度」</ins>，避免與第 12-2 條特定事業單位應建置管理系統之規定混淆。', note: '用語明確化' },

    { no: '第 5-1 條', old: '原條文規定職業安全衛生管理單位、人員及各級主管之相關職責，但管理責任內容較為概括。', new: '明確職業安全衛生管理單位、委員會、業務主管、管理師、管理員、工作場所負責人及各級主管職責，並新增<ins>「查核」及「考核」</ins>等管理責任。', note: '管理職責強化' },

    { no: '第 6 條', old: '原條文保留專責一級管理單位設置之過渡期間規定。', new: '<del>刪除專責一級管理單位設置過渡期間規定。</del><ins>因原過渡期間已屆滿，已無繼續保留必要。</ins>', note: '過渡條文刪除' },

    { no: '第 11 條', old: '原條文規定職業安全衛生委員會委員之組成及排列方式。', new: '調整職業安全衛生委員會委員組成之文字及排序，並將<ins>勞工代表列為第一款</ins>，強化委員會組成之明確性。', note: '委員組成調整' },

    { no: '第 12 條', old: '職業安全衛生委員會原應就審議、協調及建議之安全衛生事項作成紀錄並保存。', new: '職業安全衛生委員會紀錄事項新增<ins>「考核」</ins>，使委員會審議、協調、考核及建議安全衛生事項均應作成紀錄並保存。', note: '委員會職能強化' },

    { no: '第 12-1 條', old: '原無雇主於勞工從事工作前實施一般性風險評估之完整規定。', new: '<ins>新增雇主使勞工從事工作前，應就工作場所內建築物、機械、設備、原料、材料、化學品、作業活動及其他職業安全衛生事項實施一般性風險評估，並依評估結果訂定職業安全衛生管理計畫。</ins>', note: '新增風險評估' },

    { no: '第 12-2 條', old: '原規定特定事業單位應建置職業安全衛生管理系統。', new: '增列<ins>中央主管機關得指定公告其他事業單位應建置職業安全衛生管理系統</ins>，以因應產業發展及新興危害。', note: '管理系統擴大' },

    { no: '第 12-3 條', old: '原變更管理規定對製程、作業程序、材料及設備變更前之風險評估程序較不明確。', new: '強化變更管理程序，明定事業單位於引進或修改製程、作業程序、材料及設備前，應<ins>辨識危害、評估風險，並依風險評估結果採取必要預防設備及措施</ins>。', note: '變更管理強化' },

    { no: '第 12-4 條', old: '原採購與營繕工程管理規定，尚未完整明定管理程序及源頭風險評估責任。', new: '明定事業單位應建立<ins>採購管理程序</ins>；營繕工程交付規劃、設計或施工時，應<ins>實施風險評估及施工管理</ins>，強化採購與工程源頭管理。', note: '採購工程管理' },

    { no: '第 12-5 條', old: '承攬共同作業對象原以承攬人分別僱用之勞工為主要適用對象。', new: '配合職業安全衛生法修正，將承攬共同作業對象由<del>「承攬人分別僱用勞工」</del>擴大為<ins>「承攬人、再承攬人之工作者」</ins>，並增列事故通報、進場管制等承攬管理內容。', note: '承攬管理強化' },

    { no: '第 12-6 條', old: '原緊急應變規定未完整明定風險導向之應變計畫及演練內容。', new: '強化緊急應變管理，明定事業單位應依潛在風險訂定<ins>緊急狀況預防、準備及應變計畫</ins>，並定期演練；內容包含通報、應變組織、處理程序、避難疏散、應變設備及外部救援聯繫。', note: '緊急應變強化' },

    { no: '第 12-7 條', old: '原條文規定職業安全衛生管理績效認可相關事項。', new: '配合職業安全衛生法刪除管理績效認可制度，<del>修正原管理績效認可相關規定</del>，調整為<ins>管理系統績效之後續管理機制</ins>。', note: '認可制度調整' },

    { no: '第 20 條', old: '原移動式起重機每年定期檢查項目未明列迴轉裝置之螺栓、螺帽等構件。', new: '增訂移動式起重機每年定期檢查項目，將<ins>迴轉裝置含螺栓、螺帽等</ins>列入檢查，強化起重機結構安全管理。', note: '自動檢查新增' },

    { no: '第 27 條', old: '原加熱設備定期檢查項目未完整涵蓋燃料供應系統之安全遮斷裝置。', new: '增列加熱設備燃料供應系統<ins>控制閥、電磁遮斷閥或其他安全遮斷裝置功能檢查</ins>，以強化加熱設備安全檢查。', note: '設備檢查強化' },

    { no: '第 43 條', old: '施工架及施工構台每週定期檢查項目，原未明列壁連座之間距及連接構件狀況。', new: '施工架及施工構臺每週定期檢查項目新增<ins>「壁連座之間距及連接構件之狀況」</ins>，並將「施工構台」用語修正為<ins>「施工構臺」</ins>。', note: '施工架檢查強化' },

    { no: '第 44 條', old: '原營造工程模板支撐架檢查規定，未明確納入混凝土澆置作業前之檢查。', new: '營造工程模板支撐架於<ins>混凝土澆置作業前</ins>，亦應依規定項目實施檢查，強化澆置前安全確認。', note: '施工前檢查新增' },

    { no: '第 60 條', old: '原每日作業前檢點規定主要針對一般工業用機器人，未另列協同作業機器人。', new: '增訂<ins>協同作業機器人每日作業前應實施檢點</ins>，因協同機器人與一般工業用機器人作業方式及安全機制不同，需另列檢點要求。', note: '協同機器人檢點' },

    { no: '第 63 條', old: '原條文使用「施工構台」之用語。', new: '配合相關法規用語，將<del>「施工構台」</del>統一修正為<ins>「施工構臺」</ins>，使用語一致。', note: '用語修正' },

    { no: '第 67 條', old: '原條文使用「施工構台」之用語。', new: '配合相關法規用語，將<del>「施工構台」</del>統一修正為<ins>「施工構臺」</ins>。', note: '用語修正' },

    { no: '第 71 條', old: '原金屬熔接、熔斷或加熱作業檢點項目未明列氧乙炔熔接裝置。', new: '金屬熔接、熔斷或加熱作業檢點項目新增<ins>「氧乙炔熔接裝置」</ins>，使檢點規定與職業安全衛生設施規則一致。', note: '熔接檢點新增' },

    { no: '第 84 條', old: '原條文用語為「事業之全部或一部分交付承攬」。', new: '配合職業安全衛生法用語，將<del>「事業之全部或一部分交付承攬」</del>修正為<ins>「事業交付承攬」</ins>。', note: '承攬用語修正' },

    { no: '第 86 條', old: '勞工人數 30 人以上事業單位，原僅於初次設置時登錄職業安全衛生管理單位或人員資料並報請備查。', new: '勞工人數 30 人以上事業單位，職業安全衛生管理單位或人員設置資料除初次登錄報請備查外，<ins>變更時亦應報請勞動檢查機構備查</ins>。', note: '變更報備新增' },

    { no: '第 87 條', old: '職業安全衛生委員會名冊原由事業單位自行留存備查。', new: '職業安全衛生委員會名冊由原本<del>留存備查</del>，修正為應依中央主管機關公告之內容及方式<ins>登錄，並報請勞動檢查機構備查</ins>。', note: '名冊登錄備查' },

    { no: '第 90 條', old: '原施行日期規定未包含本次 115 年 6 月 29 日修正發布條文。', new: '明定本次<ins>115 年 6 月 29 日修正發布條文，自 115 年 7 月 1 日施行</ins>。', note: '施行日期修正' },

    { no: '第 3 條附表二', old: '原附表未明定第二類及第三類事業且勞工人數在 5 人以下者，得由完成丁種職業安全衛生業務主管訓練之雇主或代理人擔任業務主管。', new: '新增附註，明定<ins>第二類及第三類事業且勞工人數在 5 人以下者，其職業安全衛生業務主管得由受丁種職業安全衛生業務主管訓練合格之雇主或其代理人擔任</ins>。', note: '小規模事業放寬' }
] },
4: { rows: [
    { no: '第 21-3 條', old: '原無工作場所高風險作業前實施風險評估、留存紀錄及通報勞動檢查機構之明確規定。', new: '<ins>新增雇主使勞工於工作場所從事具墜落、倒塌、崩塌、火災、爆炸等危險作業前，應依中央主管機關公告內容及方法實施風險評估、採取預防措施，並留存紀錄或文件；作業前並應依指定方式通報勞動檢查機構。</ins>', note: '高風險作業評估' },

    { no: '第 57 條', old: '原機械、設備及相關配件之掃除、上油、檢查、修理或調整等作業，未明確要求事前訂定危害防止計畫並使勞工周知。', new: '強化機械、設備及其相關配件之掃除、上油、檢查、修理或調整等作業安全，新增雇主應依作業場所狀況與危害特性，於事前<ins>訂定危害防止計畫，並使作業勞工周知</ins>。', note: '維修作業強化' },

    { no: '第 116 條', old: '原條文設有得以堆高機貨叉等搭載人員從事高處作業之例外規定。', new: '<del>刪除堆高機貨叉等搭載人員從事高處作業之例外規定。</del><ins>避免以堆高機替代高空工作車或合格高處作業設備，強化高處作業安全。</ins>', note: '高處作業限制' },

    { no: '第 163 條', old: '原拆垛作業條文部分文字存在用語誤植情形。', new: '修正拆垛作業相關文字，<ins>釐清用語誤植</ins>，避免適用時發生爭議。', note: '文字誤植修正' },

    { no: '第 179-1 條', old: '原無危險物及有害物灌注、卸收作業時，確認輸送物質種類、性質、相容性及輸送對象之明確規定。', new: '<ins>新增危險物及有害物灌注、卸收等作業時，雇主應確認輸送物質種類、性質及相容性，確認輸送對象正確無誤，並採取危害預防措施。</ins>', note: '灌注卸收管制' },

    { no: '第 185-1 條', old: '原無針對四氫化矽（矽甲烷）作業前實施風險評估及製作風險評估報告之專門規定。', new: '<ins>新增四氫化矽，又稱矽甲烷，因具自燃性且遇空氣可能燃燒或爆炸，雇主作業前應實施風險評估，並製作風險評估報告。</ins>', note: '特定化學品評估' },

    { no: '第 185-2 條', old: '原無針對硝酸銨之專門危害預防規定。', new: '<ins>新增硝酸銨相關預防規定，考量硝酸銨為氧化性固體，受熱或接觸火源可能引起劇烈燃燒或爆炸，雇主應採取必要預防措施。</ins>', note: '硝酸銨管制' },

    { no: '第 185-3 條', old: '原無針對有機過氧化物自加速分解及火災、爆炸風險之專門預防規定。', new: '<ins>新增有機過氧化物相關預防規定，因其具高反應活性，當環境溫度達自加速分解溫度時，可能引發劇烈放熱分解反應，增加火災、爆炸風險。</ins>', note: '有機過氧化物管制' },

    { no: '第 185-4 條', old: '原無針對熱媒油系統高溫、洩漏、油品劣化、閃火點降低及水分混入等風險之專門規定。', new: '<ins>新增熱媒油系統安全預防規定，針對高溫運作、洩漏、油品劣化、閃火點降低或水分混入造成壓力噴發等風險，要求雇主採取相應預防措施。</ins>', note: '熱媒油安全管理' },

    { no: '第 293 條', old: '原條文對廢棄物貯存、清除、處理及排放之規範，與環境保護法規之銜接不夠明確。', new: '明定廢棄物之貯存、清除、處理及排放標準，應<ins>依環境保護相關法規規定辦理</ins>，使職安規定與環保法規銜接。', note: '環保法規銜接' },

    { no: '第 295 條', old: '原條文未明確規範二氧化碳或惰性氣體滅火藥劑噴發或洩漏場所之缺氧、窒息危害預防措施。', new: '明定發生二氧化碳或惰性氣體滅火藥劑噴發或洩漏之場所，如有缺氧、窒息危害之虞，應<ins>依缺氧症預防規則採取必要措施</ins>。', note: '缺氧窒息預防' },

    { no: '第 299-1 條', old: '原無冷藏室、冷凍室、地窖及其他密閉設施內部作業時，防止出入口門或蓋閉鎖之明確規定。', new: '<ins>新增冷藏室、冷凍室、地窖及其他密閉使用設施內部作業時，其出入口之門或蓋等應設有不致閉鎖之措施，避免人員受困。</ins>', note: '密閉空間防困' },

    { no: '第 324-3 條', old: '原職場不法侵害預防規定，對申訴、調查及處理機制之要求較不完整。', new: '強化職場不法侵害之預防及保護措施，修正雇主應<ins>建立申訴、調查及處理機制</ins>，以完善職場霸凌或不法侵害事件處理。', note: '不法侵害防治' },

    { no: '第 325-1 條', old: '原無數位平台交付無僱傭關係個人從事外送作業時之職業安全衛生防護規定。', new: '<ins>新增事業單位以數位方式經營商品交易或運送，且交付無僱傭關係個人使用機車、自行車等交通工具履行外送作業時，應依中央主管機關公告指引採取危害預防措施。</ins>', note: '外送作業防護' },

    { no: '第 326-1 條', old: '原自營作業者相關規定採「準用」方式規範。', new: '將自營作業者相關規定由<del>「準用」</del>修正為<ins>「適用」</ins>，明確自營作業者之職業安全衛生責任，強化其安全衛生義務之法定地位。', note: '自營作業者責任' },

    { no: '第 328 條', old: '原施行日期規定未包含本次新增及修正條文之分階段施行安排。', new: '明定本次修正條文之施行日期；其中<ins>第 21-3、57、116、185-1、185-2、185-3、185-4 條自 116 年 1 月 1 日施行</ins>，其餘條文配合職業安全衛生法施行日施行。', note: '施行日期修正' }
] },
                                5: { rows: [
    { no: '第 1 條', old: '本規則原依職業安全衛生法第 32 條第 2 項規定訂定。', new: '配合職業安全衛生法第 32 條項次調整，將本規則授權依據由<del>第 32 條第 2 項</del>修正為<ins>第 32 條第 3 項</ins>。', note: '授權依據修正' },

    { no: '第 17 條', old: '原規定進入營繕工程工作場所從事作業前，仍應接受一般安全衛生教育訓練，未明定已完成營造作業安全訓練者得免重複受訓。', new: '新增進入營繕工程工作場所從事作業前，如已依營造安全衛生設施標準第 11 條之 2 完成營造作業安全訓練者，<ins>得免接受一般安全衛生教育訓練</ins>，避免重複受訓。', note: '營造訓練免重複' },

    { no: '第 18 條', old: '原條文以「各級管理、指揮、監督之業務主管」為在職教育訓練對象，對工作場所負責人、職業安全衛生委員會成員及雇主或代理人之訓練義務規定較不明確。', new: '將<del>「各級管理、指揮、監督之業務主管」</del>修正為<ins>「工作場所負責人及各級主管」</ins>，並明定工作場所負責人及職業安全衛生委員會成員應接受安全衛生在職教育訓練；雇主或代理人擔任職安衛業務主管者，也應接受在職教育訓練。', note: '在職訓練對象擴大' },

    { no: '第 20 條', old: '原訓練單位範圍未明定中央主管機關捐助成立之財團法人辦理職業安全衛生教育訓練之備查程序。', new: '新增<ins>中央主管機關捐助成立之財團法人</ins>辦理職業安全衛生教育訓練時，應報請中央主管機關備查，並依相關訓練單位規定辦理。', note: '辦訓單位擴充' },

    { no: '第 40 條', old: '原規定對經撤銷或廢止認可之訓練單位，再以相同名稱、地點或由原負責人另行申請之限制較不完整。', new: '強化訓練單位監督管理，明定經撤銷或廢止認可之訓練單位，於<ins>3 年內</ins>如以同一名稱、同一地點，或由原負責人另以不同申請單位名義申請認可者，中央主管機關應不予認可。', note: '訓練單位管制強化' },

    { no: '第 42-4 條', old: '原無數位平台交付無僱傭關係個人從事外送作業之專門安全衛生教育訓練規定。', new: '<ins>新增數位平台外送作業教育訓練規定。事業單位以數位方式經營商品交易或運送，且交付無僱傭關係個人親自履行外送作業時，對新加入者應實施至少 1 小時安全衛生教育訓練，並每年辦理在職教育訓練。</ins>', note: '外送作業訓練新增' },

    { no: '第 43 條', old: '原施行日期規定未包含本次 115 年 6 月 25 日修正發布條文之分階段施行安排。', new: '明定本次<ins>115 年 6 月 25 日修正發布條文</ins>之施行日期；除<ins>第 3 條附表一、第 4 條附表二、第 5 條附表三自 116 年 1 月 1 日施行</ins>外，其餘自<ins>115 年 7 月 1 日施行</ins>。', note: '施行日期修正' },

    { no: '第 3 條附表一', old: '原職業安全衛生業務主管教育訓練課程，對企業經營風險、管理系統、風險評估、承攬管理、採購管理、變更管理、緊急應變、職場霸凌及身心健康危害預防等內容較不完整。', new: '修正職業安全衛生業務主管教育訓練課程內容，新增或調整<ins>企業經營風險、安全衛生管理系統、風險評估、承攬管理、採購管理、變更管理、緊急應變、職場霸凌防治及身心健康危害預防</ins>等課程內容。', note: '課程內容強化' },

    { no: '第 4 條附表二', old: '原營造業職業安全衛生業務主管教育訓練課程，對新版職安管理制度、風險評估、承攬管理、緊急應變及職場霸凌防治等內容較不完整。', new: '修正營造業職業安全衛生業務主管教育訓練課程內容，配合新版職安管理制度，強化<ins>營造業風險評估、承攬管理、緊急應變及職場霸凌防治</ins>等訓練內容。', note: '營造課程強化' },

    { no: '第 5 條附表三', old: '原職業安全管理師、職業衛生管理師及職業安全衛生管理員教育訓練課程，尚未完整配合新版職安制度及職災保護制度調整。', new: '修正職業安全管理師、職業衛生管理師及職業安全衛生管理員教育訓練課程內容，配合職安法新制及職災保護制度，調整<ins>管理制度、職災預防、職場霸凌防治</ins>等課程。', note: '管理人員課程調整' },

    { no: '第 6 條附表四', old: '原勞工健康服務護理人員及相關人員教育訓練課程，對職場身心健康、職場霸凌防治及職業災害保護制度之內容較不完整。', new: '修正勞工健康服務護理人員及相關人員教育訓練課程內容，配合<ins>職場身心健康、職場霸凌防治及職業災害保護制度</ins>調整訓練重點。', note: '健康服務課程調整' },

    { no: '第 11 條附表九', old: '原有害作業主管安全衛生教育訓練課程部分名稱及用語與本規則其他附表體例不完全一致。', new: '修正有害作業主管安全衛生教育訓練課程用語，參考本規則其他附表體例酌修文字，使<ins>訓練名稱及用詞一致</ins>。', note: '用語體例統一' },

    { no: '第 12 條附表十', old: '原具有危險性機械或設備操作人員教育訓練課程，未明確規定模擬機具及擬真系統操作得納入實習課程時數。', new: '修正具有危險性機械或設備操作人員教育訓練課程內容，配合技術士技能檢定實務，明定<ins>模擬機具及擬真系統操作可納入實習課程時數</ins>。', note: '實習方式放寬' },

    { no: '第 13 條附表十一', old: '原特殊作業人員安全衛生教育訓練課程內容及部分用語，未完全配合現行實務作業與相關法規。', new: '修正特殊作業人員安全衛生教育訓練課程內容及用語，配合<ins>實務作業與相關法規</ins>調整訓練內容。', note: '特殊作業課程調整' },

    { no: '第 14 條附表十二', old: '原急救人員等相關教育訓練課程之課程名稱、訓練內容及附表體例部分不一致。', new: '修正急救人員等相關教育訓練課程內容及用語，使<ins>課程名稱、訓練內容及附表體例更一致</ins>。', note: '課程用語修正' },

    { no: '第 35 條附表十五', old: '原職業安全衛生教育訓練師資資格部分使用「工業安全、工業衛生」用語，且職場霸凌防治相關課程講師資格未明列法律、心理相關學位背景。', new: '修正職業安全衛生教育訓練師資資格，將部分<del>「工業安全、工業衛生」</del>用語調整為<ins>「職業安全、職業衛生」</ins>；並增列<ins>法律、心理相關學位背景者，可作為職場霸凌防治相關課程講師資格</ins>。', note: '師資資格調整' }
] },
7: { rows: [
    { no: '第 2 條', old: '原作業環境監測相關定義，對監測機構之執行業務範圍及暴露評估之定義較不明確。', new: '修正作業環境監測相關用詞定義，明確監測機構執行業務範圍包含<ins>採樣、測定及分析</ins>；並新增<ins>「作業環境監測暴露評估」</ins>定義，作為後續暴露評估報告之依據。', note: '監測定義修正' },

    { no: '第 4 條', old: '原條文使用「工礦衛生技師」之專業名稱。', new: '將原<del>「工礦衛生技師」</del>用語修正為<ins>「職業衛生技師」</ins>，配合現行專業技師名稱。', note: '專業用語修正' },

    { no: '第 5 條', old: '原規定未將二氧化碳納入應定期實施作業環境監測之項目。', new: '新增應實施<ins>二氧化碳定期監測</ins>之作業場所；但雇主如已依室內空氣品質管理法完成檢驗測定者，<ins>得免再依本辦法重複監測</ins>。', note: '二氧化碳監測新增' },

    { no: '第 6 條', old: '原應定期監測之有害物項目，尚未納入部分新興或高風險化學物質及特定粉塵作業場所。', new: '擴增應定期監測之有害物項目，新增<ins>1-溴丙烷、甲醛、環氧乙烷</ins>等有害化學物質；指定鑄造及人造石等高風險行業之特定粉塵作業場所，應監測<ins>結晶型游離二氧化矽濃度</ins>。', note: '監測項目擴增' },

    { no: '第 6 條', old: '原勞工暴露濃度高於或等於容許暴露標準時，監測頻率仍為每 6 個月一次。', new: '增訂勞工暴露濃度高於或等於容許暴露標準時，監測頻率由<del>每 6 個月</del>縮短為<ins>每 3 個月</ins>，以督促事業單位儘速改善作業環境。', note: '監測頻率加嚴' },

    { no: '第 6 條附表一、附表二', old: '原附表所列有機溶劑、特定化學物質及相關作業場所項目，尚未配合相關法規最新規定全面調整。', new: '配合有機溶劑中毒預防規則、特定化學物質危害預防標準及勞工健康保護規則，<ins>調整應實施監測之有機溶劑、特定化學物質與相關作業場所項目</ins>。', note: '附表項目修正' },

    { no: '第 7 條', old: '原免除監測及短暫作業暴露評估之適用條件較不明確。', new: '新增化學品僅作為<ins>貯存用途者，得免除作業環境監測</ins>；另對臨時性作業、作業時間短暫或作業期間短暫之暴露評估，雇主得採用<ins>具科學根據之量化方法</ins>辦理。', note: '免監測條件修正' },

    { no: '第 8 條', old: '原採樣分析方法主要依既有指定方法辦理，對國際方法及直讀式儀器之使用彈性較有限。', new: '擴大可採用之採樣分析方法，納入<ins>國際職業安全衛生機構或相關專業團體訂定之方法</ins>；另為評估短時間暴露或最高暴露濃度，於傳統採樣分析方法有困難時，得使用<ins>直讀式儀器監測</ins>。', note: '監測方法彈性化' },

    { no: '第 9 條', old: '原作業環境監測計畫內容未明列監測目的及暴露評估等項目，監測前通報期限為 15 日。', new: '作業環境監測計畫內容新增<ins>監測目的及暴露評估</ins>等必要項目；監測前通報期限由<del>15 日</del>縮短為<ins>10 日</ins>。', note: '監測計畫強化' },

    { no: '第 10 條', old: '原應組成監測評估小組研訂監測計畫之事業單位規模，為勞工人數 500 人以上。', new: '應組成監測評估小組研訂監測計畫之事業單位規模，由勞工人數<del>500 人以上</del>下修為<ins>300 人以上</ins>，擴大專業人員參與監測規劃。', note: '專業參與門檻下修' },

    { no: '第 10 條附表三', old: '原監測評估小組組成及職業衛生技師參與事項之規定較不完整。', new: '修正監測評估小組組成及<ins>職業衛生技師參與事項</ins>，並要求會同辦理相關必要事項及<ins>留存紀錄備查</ins>。', note: '評估小組強化' },

    { no: '第 11 條', old: '原雇主自聘乙級以上監測人員或委託執業職業衛生技師辦理監測時，未明定測定儀器設備規格要求。', new: '為確保雇主自聘乙級以上監測人員或委託執業職業衛生技師辦理監測之品質，新增<ins>測定儀器設備規格要求</ins>。', note: '儀器規格新增' },

    { no: '第 13 條', old: '原規定未明確要求雇主依監測結果完成暴露評估報告，部分監測結果保存年限亦未充分反映長期健康風險。', new: '新增雇主應依監測結果完成<ins>暴露評估報告</ins>；並因部分物質具有長期致癌誘導期，<ins>調整部分監測結果之保存年限</ins>。', note: '暴露評估報告新增' },

    { no: '第 13 條附表六', old: '原附表所定部分監測結果紀錄保存年限，對特定長期健康危害物質之追蹤期間較短。', new: '修正監測結果紀錄保存年限，針對<ins>特定長期健康危害物質延長保存要求</ins>，以利後續健康風險追蹤。', note: '保存年限修正' },

    { no: '第 16 條', old: '原無作業環境監測自主管理成效審查及依成效調整監測頻率之制度。', new: '<ins>新增作業環境監測自主管理成效審查機制</ins>；事業單位監測制度完善、管理成效良好且長期暴露風險低者，經中央主管機關審查通過後，得合理調整監測頻率。', note: '自主管理審查新增' },

    { no: '第 17 條', old: '原未明定雇主辦理作業環境監測規劃及暴露評估時，得委託相關專業人員或團體協助。', new: '<ins>新增雇主於辦理作業環境監測規劃、暴露評估等業務時，必要時得委託相關專業人員或團體協助辦理。</ins>', note: '專業協助新增' },

    { no: '第 18 條', old: '原條文使用「工礦衛生技師」之專業名稱。', new: '將<del>「工礦衛生技師」</del>修正為<ins>「職業衛生技師」</ins>，配合現行專業名稱一致化。', note: '專業用語修正' },

    { no: '第 21 條', old: '原特定粉塵作業場所之粉塵監測，對採樣機構認可類別及分析實驗室能力之要求較不明確。', new: '特定粉塵作業場所之粉塵監測，應由具<ins>結晶型游離二氧化矽或粉塵重量分析認可類別</ins>之監測機構實施採樣，並將樣本委託具<ins>結晶型游離二氧化矽分析能力之認證實驗室</ins>分析。', note: '粉塵分析強化' },

    { no: '第 22 條', old: '原監測機構認可規定，未完整規範認可有效期間、重新認可程序及核定期間之審酌事項。', new: '<ins>新增監測機構認可有效期間、重新認可程序及核定認可有效期間之審酌事項</ins>，以強化監測機構品質管理。', note: '機構認可管理' },

    { no: '第 23 條', old: '原未明定監測機構得主動申請停止業務及中央主管機關得逕行廢止認可之程序。', new: '<ins>新增監測機構主動申請停止業務及中央主管機關得逕行廢止認可之規定。</ins>', note: '停止業務規範' },

    { no: '第 27 條', old: '原監測機構之認可申請、變更、行程通報及訓練紀錄，未全面採指定資訊網站線上登錄。', new: '新增監測機構認可申請、變更事項、監測行程通報及監測人員講習訓練紀錄，應依中央主管機關公告方式<ins>登錄於指定資訊網站</ins>。', note: '線上登錄新增' },

    { no: '第 29 條', old: '原對雇主作業環境監測相關資料缺漏之補正及處罰程序規定較不明確。', new: '<ins>新增雇主作業環境監測相關資料缺漏時，主管機關得命限期補正，未補正者得處罰鍰。</ins>', note: '資料缺漏補正' },

    { no: '第 30 條', old: '原對監測機構違反相關規定之限期改正及處罰機制較不完整。', new: '<ins>新增監測機構違反本辦法相關規定時，主管機關得命限期改正及處罰鍰</ins>，以強化監測業務管理。', note: '機構違規裁罰' },

    { no: '第 31 條', old: '原監測機構違規管理及處罰規定，對部分違反事項之管理強度不足。', new: '強化監測機構違規管理，針對特定違反事項<ins>增訂處罰及管理規定</ins>，提升監測品質與公信力。', note: '機構管理強化' },

    { no: '第 32 條', old: '原未明定監測機構經撤銷或廢止認可後之再申請限制期間。', new: '<ins>新增監測機構經撤銷或廢止認可後，2 年內不予認可之情形</ins>，避免不適格機構短期內重新申請。', note: '再認可限制新增' },

    { no: '第 33 條', old: '原施行日期規定未包含本次新增制度之分階段施行安排。', new: '明定本次修正條文施行日期；部分新增制度因涉及配套建置、專業量能及主管機關作業準備，另定自<ins>116 年 1 月 1 日施行</ins>。', note: '施行日期修正' }
] },
                                8: { rows: [
    { no: '第 2 條附表一', old: '原附表未訂定「鋁及其不溶性化合物」之容許暴露標準。', new: '新增<ins>「鋁及其不溶性化合物」</ins>之容許暴露標準，將鋁相關粒狀暴露納入作業場所空氣中有害物容許濃度管制，作為雇主實施作業環境監測及工程控制之依據。', note: '容許濃度新增' },

    { no: '第 2 條附表一', old: '原「甲醛」容許濃度值未配合最新健康危害及致癌風險評估調整。', new: '修正<ins>「甲醛」之容許濃度值</ins>，考量其健康危害及致癌疑慮，調整作業場所暴露管制標準，以降低勞工吸入暴露造成之健康風險。', note: '容許濃度加嚴' },

    { no: '第 2 條附表一', old: '原「甲苯」八小時日時量平均容許濃度，未配合最新職業衛生建議及暴露風險調整。', new: '修正<ins>「甲苯」之容許濃度值</ins>，配合國內外職業衛生建議及作業場所暴露風險，調整其八小時日時量平均容許濃度，以強化有機溶劑作業勞工保護。', note: '容許濃度修正' },

    { no: '第 2 條附表一', old: '原附表部分有害物之化學式、中英文名稱及相關欄位文字，與現行化學品名稱及實務使用名稱不完全一致。', new: '修正部分有害物之<ins>化學式、中英文名稱及相關欄位文字</ins>，使附表內容與現行化學品名稱、國際資料及實務使用名稱一致，提升辨識及引用正確性。', note: '附表文字修正' },

    { no: '第 2 條附表二', old: '原粉塵容許濃度依第一種粉塵及第二種粉塵分類。', new: '合併原<del>第一種粉塵及第二種粉塵</del>分類，改以<ins>「結晶型游離二氧化矽」含量及粉塵型態</ins>作為判斷基礎，修正粉塵容許濃度分類方式。', note: '粉塵分類修正' },

    { no: '第 2 條附表二', old: '原結晶型游離二氧化矽容許濃度值，未充分反映含矽粉塵之長期呼吸危害風險。', new: '修正<ins>結晶型游離二氧化矽之容許濃度值</ins>，強化含矽粉塵作業場所之暴露管理，降低矽肺症及其他呼吸系統疾病風險。', note: '粉塵標準加嚴' },

    { no: '第 2 條附表二', old: '原「可呼吸性粉塵」、「總粉塵」、「結晶型游離二氧化矽」及「石綿粉塵」等定義較不完整。', new: '修正<ins>「可呼吸性粉塵」、「總粉塵」、「結晶型游離二氧化矽」及「石綿粉塵」</ins>等定義，使粉塵採樣、分析及暴露評估之判斷標準更明確。', note: '粉塵定義修正' },

    { no: '第 11 條', old: '原施行日期規定未包含本次新增及修正容許濃度值之緩衝期安排。', new: '增訂本次修正條文施行日期；考量新增及修正之有害物容許濃度值，事業單位需辦理工程控制、製程改善、預算編列、控制設備設計、安裝及測試等作業，故針對<ins>第 2 條附表一編號 15、211、445 及附表二</ins>訂定緩衝期，自<ins>116 年 1 月 1 日施行</ins>。', note: '施行日期修正' }
] },
                                9: { rows: [
    { no: '第 1 條', old: '原條文之法規授權依據，尚未配合職業安全衛生法現行條次及授權規定調整。', new: '明定本規則依<ins>職業安全衛生法第 6 條第 3 項</ins>規定訂定，配合法規授權依據調整，使本規則之法源依據更明確。', note: '授權依據修正' },

    { no: '第 2 條', old: '原有機溶劑作業適用範圍之作業型態分類及列舉較不完整。', new: '重新整理有機溶劑作業適用範圍，明列<ins>製造、印刷、書寫描繪、上光、防水、表面處理、黏接、清洗擦拭、塗飾、乾燥、研究試驗、儲槽內部作業、分裝回收</ins>等作業型態。', note: '適用作業明確化' },

    { no: '第 3 條', old: '原有機溶劑、有機溶劑混存物及相關設備、場所與作業型態之定義及分類較為分散。', new: '修正<ins>有機溶劑及有機溶劑混存物定義</ins>，並依第一種、第二種、第三種有機溶劑重新分類；同時明定密閉設備、局部排氣裝置、整體換氣裝置、通風不充分室內作業場所、儲槽等、短暫作業及臨時性作業等用詞。', note: '定義分類修正' },

    { no: '第 3 條附表一', old: '原有機溶劑分類附表未完全配合現行容許暴露標準及健康危害分類調整。', new: '修正<ins>有機溶劑分類附表</ins>，配合勞工作業場所容許暴露標準及健康危害分類，調整部分有機溶劑分類與列管範圍。', note: '附表分類修正' },

    { no: '第 4 條', old: '原條文對健康管理、作業環境監測、特定勞工保護及入槽安全等相關法規之銜接規定較不明確。', new: '明定雇主使勞工從事有機溶劑作業時，<ins>健康管理、作業環境監測、妊娠與分娩後女性及未滿 18 歲勞工保護、入槽安全</ins>等事項，應依相關職安衛法規辦理。', note: '相關法規銜接' },

    { no: '第 5 條', old: '原低消費量有機溶劑作業之排除條件及適用限制，判斷方式較不明確。', new: '重新規範低消費量作業之排除條件，明定於一定作業時間內有機溶劑或其混存物消費量<ins>未超過容許消費量</ins>者，得不受設施、管理及防護措施部分規定限制。', note: '低量作業排除' },

    { no: '第 5 條附表二', old: '原容許消費量及不同作業型態之消費量計算原則較不明確。', new: '明定<ins>容許消費量及計算方式</ins>，並針對不同有機溶劑作業型態規定消費量計算原則，使是否適用排除規定更可判斷。', note: '消費量計算明確' },

    { no: '第 6 條', old: '原控制設備設置規定，未完整依有機溶劑種類及作業場所型態分別規範。', new: '修正有機溶劑作業場所控制設備設置規定，依<ins>第一種、第二種、第三種有機溶劑及作業場所型態</ins>，分別要求設置密閉設備、局部排氣裝置或整體換氣裝置。', note: '控制設備修正' },

    { no: '第 6 條', old: '原控制設備選擇未明確要求依健康危害、散布情形及使用量進行風險分級。', new: '新增控制設備選擇應依<ins>有機溶劑健康危害分類、散布狀況及使用量</ins>等情形評估風險等級，並依風險等級選擇有效控制設備。', note: '風險分級管理' },

    { no: '第 7 條', old: '原噴布方式有機溶劑作業之設備要求，對通風不充分場所之規範較不完整。', new: '針對噴布方式之有機溶劑作業，明定於<ins>室內、儲槽等或通風不充分作業場所</ins>作業時，應設置密閉設備或局部排氣裝置。', note: '噴布作業強化' },

    { no: '第 8 條', old: '原臨時性有機溶劑作業免除部分設備設置規定之條件較不明確。', new: '明定室內作業場所從事<ins>臨時性有機溶劑作業</ins>，且非通風不充分場所者，得免除部分設備設置規定。', note: '臨時作業排除' },

    { no: '第 9 條', old: '原免設置有機溶劑設施之認定程序及作業環境變更後之處理要求較不完整。', new: '修正免設置有機溶劑設施之認定程序，雇主應檢具<ins>申請書、作業場所略圖及工作計畫書</ins>，向勞動檢查機構申請認定；作業環境變更時應重新符合規定並報備。', note: '免設程序修正' },

    { no: '第 10 條', old: '原對控制設備設置確有困難時之例外核定機制較不明確。', new: '明定如設置控制設備有困難，但已採取一定措施者，得<ins>報經中央主管機關核定</ins>後，免除相關設備設置要求。', note: '例外核定機制' },

    { no: '第 11 條', old: '原免除密閉設備、局部排氣裝置或整體換氣裝置之例外情形分散於不同規定。', new: '整併免除密閉設備、局部排氣裝置或整體換氣裝置之例外情形，包括<ins>臨時性作業、短暫作業、隔離設施、作業面廣泛不易設置設備、使用輸氣管面罩或設置吹吸型換氣裝置</ins>等情形。', note: '例外條件整併' },

    { no: '第 12 條', old: '原局部排氣裝置氣罩及導管之設置要求，對蒸氣發生源及氣罩選擇原則較不完整。', new: '修正局部排氣裝置之氣罩及導管設置要求，明定氣罩應設於<ins>每一有機溶劑蒸氣發生源</ins>，並依作業方法、蒸氣擴散狀況及比重選擇適當型式及大小。', note: '局排設計強化' },

    { no: '第 12 條', old: '原局部排氣裝置未明確要求設置可確認設備正常運轉之監測裝置。', new: '新增依第 17 條第 2 項設置之局部排氣裝置，應於氣罩連接導管適當處所設置可監測<ins>靜壓、流速或其他足以顯示設備正常運轉</ins>之裝置。', note: '運轉監測新增' },

    { no: '第 13 條', old: '原排氣口設置及防止有機溶劑排出物回流作業場所之規定較不完整。', new: '修正局部排氣裝置、整體換氣裝置及排氣口設置規定，要求排氣口原則上應<ins>直接向大氣開放</ins>，特定情形應防止排出物回流至作業場所。', note: '排氣回流防止' },

    { no: '第 14 條', old: '原換氣裝置運轉效能與作業場所容許暴露標準之連結較不明確。', new: '明定局部排氣裝置及吹吸型換氣裝置應於作業時間內有效運轉，使空氣中有機溶劑蒸氣濃度降低至<ins>容許暴露標準以下</ins>。', note: '換氣效能要求' },

    { no: '第 15 條', old: '原整體換氣裝置所需換氣能力之計算方式，未完整反映有機溶劑種類及實際消費量。', new: '修正整體換氣裝置所需換氣能力計算方式，應依<ins>有機溶劑種類及一小時作業時間內消費量</ins>計算每分鐘所需換氣量。', note: '換氣量計算修正' },

    { no: '第 16 條', old: '原條文對作業期間換氣設備持續運轉及不得妨礙設備功能之要求較不明確。', new: '明定有機溶劑作業時，局部排氣裝置、吹吸型換氣裝置或整體換氣裝置<ins>不得停止運轉</ins>，且不得阻礙其排氣或換氣功能。', note: '設備運轉管理' },

    { no: '第 17 條', old: '原密閉設備及各類換氣裝置之設計專業性與性能維持要求較為概括。', new: '明定密閉設備、局部排氣裝置、吹吸型換氣裝置或整體換氣裝置，應由<ins>專業人員妥為設計</ins>，並維持有效性能。', note: '專業設計要求' },

    { no: '第 17 條', old: '原局部排氣裝置未建立專業人員設計、設計報告、原始性能測試及文件長期保存制度。', new: '新增局部排氣裝置應由經中央主管機關訓練合格之專業人員設計，並製作<ins>局部排氣裝置設計報告書</ins>；設置完成後應實施原始性能測試並製作測試報告書，相關文件紀錄<ins>保存 10 年</ins>。', note: '局排設計報告' },

    { no: '第 18 條', old: '原規定未明確訂定局部排氣裝置設計專業人員之資格、訓練及訓練單位。', new: '明定第 17 條局部排氣裝置設計專業人員之<ins>資格、訓練課程與時數、訓練單位</ins>，依特定化學物質危害預防標準相關規定辦理。', note: '專業人員資格' },

    { no: '第 19 條', old: '原對作業現場通風設備、勞工作業及有機溶劑使用狀況之持續確認要求較不完整。', new: '明定雇主應隨時確認有機溶劑作業場所之<ins>通風設備運轉狀況、勞工作業情形、空氣流通效果及有機溶劑使用情形</ins>，並採取必要措施。', note: '現場確認強化' },

    { no: '第 20 條', old: '原有機溶劑作業主管設置及研究、試驗作業排除規定較不明確。', new: '明定雇主應指定<ins>現場主管擔任有機溶劑作業主管</ins>，從事作業監督；但研究或試驗作業得免設置有機溶劑作業主管。', note: '作業主管設置' },

    { no: '第 21 條', old: '原有機溶劑作業主管之監督事項較為概括。', new: '修正有機溶劑作業主管監督事項，包括<ins>決定作業方法、指揮作業、確認通風與使用情形、監督防護具使用、確認儲槽內部作業措施</ins>等。', note: '主管職責明確' },

    { no: '第 22 條', old: '原儲槽內部有機溶劑作業之事前準備、換氣、濃度測定、救難及離場清洗措施較不完整。', new: '修正儲槽內部從事有機溶劑作業之安全措施，包括<ins>派遣作業主管、事前告知作業方法及順序、排出殘留溶劑、防止配管流入、開放人孔、清洗儲槽、換氣、測定濃度、備置救難設施及污染後清洗離場</ins>。', note: '入槽作業強化' },

    { no: '第 23 條', old: '原有機溶劑作業場所之禁菸、禁止飲食及揭示要求較不明確。', new: '明定有機溶劑作業場所<ins>禁止吸菸或飲食</ins>，且雇主應將禁止事項揭示於作業場所顯明易見處。', note: '禁菸飲食揭示' },

    { no: '第 24 條', old: '原對儲槽內部或通風不充分場所從事特定有機溶劑作業之呼吸防護要求較不完整。', new: '明定從事儲槽內部作業，或在未設置控制設備之儲槽等、通風不充分場所從事短暫有機溶劑作業時，雇主應供給<ins>輸氣管面罩</ins>並使勞工確實佩戴。', note: '呼吸防護強化' },

    { no: '第 25 條', old: '原特定有機溶劑作業之防護具供給及使用要求，未完整依作業風險規範。', new: '規範雇主使勞工從事特定有機溶劑作業時，應依作業風險供給<ins>適當防護具</ins>，並使勞工確實使用，以避免吸入、皮膚接觸或污染危害。', note: '防護具管理' },

    { no: '第 26 條', old: '原防護具之管理、維護及正確使用要求較不完整。', new: '明定防護具之<ins>管理、維護及使用要求</ins>，確保防護具保持有效狀態，並避免因不當使用造成有機溶劑暴露風險。', note: '防護具維護' },

    { no: '第 27 條', old: '原有機溶劑及其混存物之儲藏管理，對蒸氣、洩漏、火災爆炸及人員暴露之防範較不完整。', new: '修正有機溶劑及其混存物儲藏規定，應防止<ins>蒸氣發散、洩漏、火災爆炸及人員暴露</ins>，並依危害特性採取必要安全措施。', note: '儲藏管理強化' },

    { no: '第 28 條', old: '原曾裝儲有機溶劑或混存物之空容器處理及殘留蒸氣危害防止規定較不完整。', new: '修正曾裝儲有機溶劑或混存物之空容器處理規定，應妥善<ins>密閉、標示或處置</ins>，避免殘留有機溶劑蒸氣造成暴露或火災爆炸危害。', note: '空容器管理' },

    { no: '第 29 條', old: '原施行日期未區分附表修正、局部排氣裝置專業制度及其他條文之不同施行時程。', new: '明定本次修正條文施行日期；<ins>第 3 條附表一自 2026/7/1 施行</ins>，<ins>第 12 條第 2 項、第 17 條第 2～5 項、第 18 條自 2027/7/1 施行</ins>，其餘自發布日施行。', note: '施行日期修正' }
] },
11: { rows: [
    { no: '第 2 條', old: '原條文未明確定義「長期夜間工作」及「勞工健康服務人員」，勞工總人數計算方式亦較不完整。', new: '新增<ins>「長期夜間工作」及「勞工健康服務人員」</ins>定義，並修正勞工總人數計算相關規定，使後續健康服務人力配置與健康檢查規定更明確。', note: '定義新增修正' },

    { no: '第 2 條附表一', old: '原特別危害健康作業項目未納入苯乙烯、甲苯及二甲苯作業。', new: '增列<ins>苯乙烯、甲苯及二甲苯作業</ins>為特別危害健康作業，強化長期暴露於有機化學物質勞工之健康保護。', note: '特別危害作業新增' },

    { no: '第 3 條', old: '原勞工健康服務相關人員資格未納入公共衛生師。', new: '勞工健康服務相關人員資格增列<ins>公共衛生師</ins>，使大型事業單位可納入公共衛生專業人力，協助職場健康調查、分析及推動健康服務。', note: '健康服務人員擴充' },

    { no: '第 5 條', old: '原事業單位特約辦理勞工健康服務時，對受託機構資格及人員指派方式之規定較不明確。', new: '明定事業單位特約辦理勞工健康服務時，應委託<ins>勞工健康服務專業機構</ins>，並由該機構指派符合資格之人員辦理。', note: '特約服務規範' },

const applyImportedRegulationData = (importedData) => {
    let importedLaws = null;
    let importedLawDetails = null;

    /*
     * 新版統一 JSON：
     * {
     *   version: "regulation-identification-system-json-v2",
     *   exportType: "unified-data",
     *   laws: [...],
     *   lawDetails: {...}
     * }
     */
    if (
        importedData &&
        importedData.version === "regulation-identification-system-json-v2" &&
        Array.isArray(importedData.laws) &&
        importedData.lawDetails
    ) {
        importedLaws = importedData.laws;
        importedLawDetails = importedData.lawDetails;
    }

    /*
     * 舊版 JSON：
     * {
     *   laws: [...],
     *   lawDetails: {...}
     * }
     */
    else if (
        importedData &&
        Array.isArray(importedData.laws) &&
        importedData.lawDetails
    ) {
        importedLaws = importedData.laws;
        importedLawDetails = importedData.lawDetails;
    }

    else {
        throw new Error('無效的資料檔案格式。');
    }

    return {
        laws: importedLaws,
        lawDetails: importedLawDetails
    };
};

const handleChangePassword = () => {
    if (!canChangePassword()) {
        setChangeError('僅管理者可修改權限與密碼設定');
        return;
    }

    const nextAdminPassword = newAdminPasswordInput.trim();
    const nextEditorPassword = newEditorPasswordInput.trim();

    /*
     * 管理者密碼安全規則：
     * 只有「要更新管理者密碼」時，才需要再次輸入目前管理者密碼。
     * 更新使用者密碼、啟用/停用使用者共用權限，不需再次輸入管理者密碼。
     */
    if (nextAdminPassword) {
        if (oldPasswordInput !== adminPassword) {
            setChangeError('若要更新管理者密碼，請先輸入目前管理者密碼');
            return;
        }

        if (nextAdminPassword.length < 4) {
            setChangeError('新管理者密碼長度至少需 4 碼');
            return;
        }
    }

    if (nextEditorPassword && nextEditorPassword.length < 4) {
        setChangeError('新使用者密碼長度至少需 4 碼');
        return;
    }

    if (nextAdminPassword) {
        setAdminPassword(nextAdminPassword);
    }

    if (nextEditorPassword) {
        setEditorPassword(nextEditorPassword);
    }

    setOldPasswordInput('');
    setNewAdminPasswordInput('');
    setNewEditorPasswordInput('');
    setChangeError('');
    setShowPermissionSettingsModal(false);

    alert('權限與密碼設定已更新成功。');
};

const handleAllSync = async () => {
    if (!canUseSmartSync()) {
        alert('目前權限無法使用智能同步。');
        return;
    }

    setSyncText('智能同步執行中');
    setIsSyncing(true);

    const controller = new AbortController();

    const timeoutId = setTimeout(() => {
        controller.abort();
    }, 60000);

    try {
        const response = await fetch(
            `/api/sync-laws?_=${Date.now()}`,
            {
                method: 'GET',
                signal: controller.signal,
                cache: 'no-store',
                headers: {
                    'Accept': 'application/json',
                    'Cache-Control': 'no-cache',
                    'Pragma': 'no-cache'
                }
            }
        );

        const responseText = await response.text();

        let result;

        try {
            result = JSON.parse(responseText);
        } catch (parseError) {
            throw new Error(
                `後端未回傳有效 JSON。HTTP ${response.status}：` +
                responseText.slice(0, 200)
            );
        }

        if (!response.ok) {
            throw new Error(
                result.error ||
                `後端回應錯誤：HTTP ${response.status}`
            );
        }

        const syncData = Array.isArray(result.data)
            ? result.data
            : [];

        const validSyncData = syncData.filter(item => {
            return (
                item &&
                item.Pcode &&
                /^\d{4}-\d{2}-\d{2}$/.test(
                    String(item.LastUpdate || '')
                )
            );
        });

        if (validSyncData.length === 0) {
            const firstError =
                result.failedItems?.[0]?.Error ||
                syncData.find(item => item?.Error)?.Error ||
                result.error ||
                '後端沒有取得任何有效法規日期';

            throw new Error(firstError);
        }

        let updatedCount = 0;
        let unchangedCount = 0;
        let unmatchedCount = 0;

        const normalizedSyncMap = new Map(
            validSyncData.map(item => [
                String(item.Pcode || '')
                    .trim()
                    .toUpperCase(),
                item
            ])
        );

        const nextLaws = laws.map(law => {
            const lawPcode = String(
                law.pcode || ''
            )
                .trim()
                .toUpperCase();

            const match = normalizedSyncMap.get(
                lawPcode
            );

            if (!match) {
                unmatchedCount += 1;
                return law;
            }

            if (
                String(law.remoteDate || '') ===
                String(match.LastUpdate)
            ) {
                unchangedCount += 1;
                return law;
            }

            updatedCount += 1;

            return {
                ...law,
                remoteDate: match.LastUpdate
            };
        });

        setLaws(nextLaws);

        setSelectedLaw(prevSelectedLaw => {
            if (!prevSelectedLaw) {
                return prevSelectedLaw;
            }

            const selectedPcode = String(
                prevSelectedLaw.pcode || ''
            )
                .trim()
                .toUpperCase();

            const match = normalizedSyncMap.get(
                selectedPcode
            );

            if (!match) {
                return prevSelectedLaw;
            }

            return {
                ...prevSelectedLaw,
                remoteDate: match.LastUpdate
            };
        });

        const successCount = Number(
            result.successCount ??
            validSyncData.length
        );

        const failedCount = Number(
            result.failedCount ??
            Math.max(
                0,
                syncData.length - validSyncData.length
            )
        );

        let message =
            `智能同步完成。\n\n` +
            `監測法規：${result.count || syncData.length} 筆\n` +
            `成功取得：${successCount} 筆\n` +
            `日期更新：${updatedCount} 筆\n` +
            `日期相同：${unchangedCount} 筆`;

        if (unmatchedCount > 0) {
            message +=
                `\n前端未匹配：${unmatchedCount} 筆`;
        }

        if (failedCount > 0) {
            const failedNames = (
                Array.isArray(result.failedItems)
                    ? result.failedItems
                    : []
            )
                .slice(0, 8)
                .map(item => {
                    const lawName =
                        item.Name ||
                        item.Pcode ||
                        '未知法規';

                    const errorText =
                        item.Error ||
                        '未取得日期';

                    return `${lawName}：${errorText}`;
                })
                .join('\n');

            message +=
                `\n同步失敗：${failedCount} 筆`;

            if (failedNames) {
                message +=
                    `\n\n失敗項目：\n${failedNames}`;
            }
        }

        alert(message);

    } catch (error) {
        if (error.name === 'AbortError') {
            alert(
                '同步等候逾時。\n\n' +
                '可能是全國法規資料庫暫時回應較慢，' +
                '請稍後再試。'
            );

        } else {
            console.error(
                '法規智能同步失敗：',
                error
            );

            alert(
                '同步失敗：' +
                (
                    error.message ||
                    '未知錯誤'
                )
            );
        }

    } finally {
        clearTimeout(timeoutId);
        setIsSyncing(false);
    }
};
