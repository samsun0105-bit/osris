        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }
        @keyframes scan {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(100%); opacity: 0; }
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(to right, transparent, #3b82f6, transparent);
            animation: scan 2s linear infinite;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }
        .new-badge {
            animation: blink 1.5s infinite;
        }
        
        .law-card-glow {
            border: 1px solid #e2e8f0;
            background-color: #ffffff;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .law-card-glow:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            border-color: #3b82f6;
        }

        ins { background: #e6ffed; text-decoration: none; border-bottom: 2px solid #059669; font-weight: 500; color: #065f46; padding: 0 2px; }
        del { background: #ffeef0; color: #991b1b; text-decoration: line-through; padding: 0 2px; }

        .admin-input {
            background: transparent;
            border-bottom: 1px dashed #cbd5e1;
            outline: none;
            width: 100%;
            transition: all 0.2s;
        }
        .admin-input:focus {
            border-bottom: 1px solid #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }

/* 權限與密碼設定：密碼輸入框統一為績效管理系統視覺比例 */
.permission-password-input {
    width: 100%;
    padding: 0.5rem 1rem;
    background-color: #f1f5f9;
    border: none;
    border-radius: 0.5rem;
    outline: none;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.875rem;
    line-height: 1.25rem;
    font-weight: 400;
    color: #334155;
    text-align: left;
    letter-spacing: 0.16em;
    transition: all 0.2s ease;
}

.permission-password-input:focus {
    box-shadow: 0 0 0 2px #3b82f6;
}

.permission-password-input::placeholder {
    color: #94a3b8;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.875rem;
    font-weight: 400;
    letter-spacing: 0.16em;
    opacity: 1;
}

.mobile-compare-card-list {
    display: none;
}

.time-mobile-date,
.time-mobile-clock {
    display: none;
}

.time-display-box {
    text-align: right;
}

/* 鑑別工作台視覺比例優化 */

.workbench-header-layout {
    align-items: flex-end;
}

.workbench-title-zone {
    flex: 1 1 auto;
    max-width: 760px;
    padding-left: 0.25rem;
}

.action-buttons {
    flex: 0 0 auto;
}

.workbench-kicker {
    padding: 0.45rem 1rem;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
}

.workbench-kicker i {
    font-size: 0.9rem;
}

.workbench-title {
    font-size: 1.85rem;
    line-height: 1.25;
    letter-spacing: -0.02em;
}

.workbench-date-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
}

.workbench-date-card {
    min-width: 150px;
    padding: 0.65rem 1rem;
}

.workbench-date-label {
    font-size: 0.72rem;
    line-height: 1.1;
}

.workbench-date-value {
    font-size: 0.95rem;
    line-height: 1.25;
}

.workbench-action-btn {
    min-height: 44px;
    padding: 0.72rem 1.35rem;
    font-size: 0.88rem;
    border-radius: 1rem;
}

.compare-summary-box {
    padding: 1.15rem 1.35rem;
    gap: 1rem;
    border-radius: 1.5rem;
}

.compare-summary-icon {
    width: 3rem;
    height: 3rem;
}

.compare-summary-icon i {
    font-size: 1.45rem;
}

.compare-summary-title {
    font-size: 1rem;
    line-height: 1.3;
}

.compare-summary-text {
    font-size: 0.9rem;
    line-height: 1.55;
}

.compare-table {
    table-layout: fixed;
}

.compare-table th {
    padding: 1rem 1.25rem;
    font-size: 0.76rem;
    line-height: 1.35;
}

.compare-table td {
    padding: 1.15rem 1.25rem;
}

.compare-delete-btn {
    width: 2.2rem;
    height: 2.2rem;
    border-radius: 0.85rem;
}

.admin-textarea-compact {
    width: 100%;
    min-height: 38px;
    resize: vertical;
    overflow: auto;
    line-height: 1.5;
    word-break: break-word;
    overflow-wrap: anywhere;
    background: transparent;
    border: 1px dashed #cbd5e1;
    border-radius: 0.65rem;
    padding: 0.45rem 0.55rem;
    outline: none;
    transition: all 0.2s ease;
}

.admin-textarea-compact:focus {
    border-color: #3b82f6;
    background: rgba(59, 130, 246, 0.05);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08);
}

.law-monitor-input {
    border: 1px dashed #cbd5e1;
    border-radius: 0.65rem;
    padding: 0.35rem 0.55rem;
    background: rgba(255, 255, 255, 0.75);
}

.law-monitor-input:focus {
    border-color: #3b82f6;
    background: #ffffff;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08);
}

        const DB_NAME = 'OSH_Regulation_Production';
        const DB_VERSION = 1;
        const STORE_NAME = 'app_state';

        const dbManager = {
            init: () => {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            db.createObjectStore(STORE_NAME);
                        }
                    };
                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = (e) => reject(e.target.error);
                });
            },
            get: async (key) => {
                const db = await dbManager.init();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, 'readonly');
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.get(key);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },
            set: async (key, value) => {
                const db = await dbManager.init();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, 'readwrite');
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.put(value, key);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }
        };

    { no: '第 41 條', old: '原安全衛生工作守則內容未明確納入機械設備操作程序及個人防護具維護使用事項。', new: '安全衛生工作守則新增<ins>「機械、設備或器具之操作規範與作業程序」及「個人防護具之維護及使用」</ins>等內容。', note: '工作守則強化' },

    { no: '第 46-1 條', old: '原無職災發生時人員清點、現場管制及緊急撤離等完整規定。', new: '<ins>新增職災發生時之急救及搶救措施，包括人員清點、現場管制、提供緊急應變人員必要個人防護具與設備，以及規劃緊急撤離機制。</ins>', note: '職災應變強化' },

    { no: '第 51 條', old: '應填載職業災害內容及統計之事業單位門檻為勞工人數 50 人以上。', new: '應填載職業災害內容及統計之事業單位門檻，由勞工人數<del>50 人以上</del>下修為<ins>30 人以上</ins>；並增列報請備查方式由中央主管機關定之。', note: '填報門檻下修' },

    { no: '第 53 條', old: '地方主管機關及目的事業主管機關辦理職業安全衛生業務內容，包括「法制、執行、督導、檢討分析」。', new: '業務內容調整為<ins>「法規及制度、推動及實施、督導及成效評估、檢討及持續改善」</ins>。', note: '管理機制調整' },

    { no: '第 54 條', old: '原施行日期規定未包含本次 115 年 6 月 26 日修正發布條文。', new: '增列本次<ins>115 年 6 月 26 日修正發布條文，自 115 年 7 月 1 日施行</ins>。', note: '施行日期修正' }
] },
3: { rows: [
    { no: '第 1 條', old: '本辦法原依職業安全衛生法第 23 條第 4 項規定訂定。', new: '配合職業安全衛生法第 23 條項次調整，將本辦法授權依據由<del>第 23 條第 4 項</del>修正為<ins>第 23 條第 5 項</ins>。', note: '授權依據修正' },

    { no: '第 1-1 條', old: '原規定事業單位應依其規模、性質，建立職業安全衛生管理系統。', new: '將「建立職業安全衛生管理系統」修正為<ins>「建立職業安全衛生管理制度」</ins>，避免與第 12-2 條特定事業單位應建置管理系統之規定混淆。', note: '用語明確化' },

    { no: '第 5-1 條', old: '原條文規定職業安全衛生管理單位、人員及各級主管之相關職責，但管理責任內容較為概括。', new: '明確職業安全衛生管理單位、委員會、業務主管、管理師、管理員、工作場所負責人及各級主管職責，並新增<ins>「查核」及「考核」</ins>等管理責任。', note: '管理職責強化' },

    { no: '第 6 條', old: '原條文保留專責一級管理單位設置之過渡期間規定。', new: '<del>刪除專責一級管理單位設置過渡期間規定。</del><ins>因原過渡期間已屆滿，已無繼續保留必要。</ins>', note: '過渡條文刪除' },

    { no: '第 11 條', old: '原條文規定職業安全衛生委員會委員之組成及排列方式。', new: '調整職業安全衛生委員會委員組成之文字及排序，並將<ins>勞工代表列為第一款</ins>，強化委員會組成之明確性。', note: '委員組成調整' },

    { no: '第 12 條', old: '職業安全衛生委員會原應就審議、協調及建議之安全衛生事項作成紀錄並保存。', new: '職業安全衛生委員會紀錄事項新增<ins>「考核」</ins>，使委員會審議、協調、考核及建議安全衛生事項均應作成紀錄並保存。', note: '委員會職能強化' },

    { no: '第 12-1 條', old: '原無雇主於勞工從事工作前實施一般性風險評估之完整規定。', new: '<ins>新增雇主使勞工從事工作前，應就工作場所內建築物、機械、設備、原料、材料、化學品、作業活動及其他職業安全衛生事項實施一般性風險評估，並依評估結果訂定職業安全衛生管理計畫。</ins>', note: '新增風險評估' },

    { no: '第 12-2 條', old: '原規定特定事業單位應建置職業安全衛生管理系統。', new: '增列<ins>中央主管機關得指定公告其他事業單位應建置職業安全衛生管理系統</ins>，以因應產業發展及新興危害。', note: '管理系統擴大' },

    { no: '第 12-3 條', old: '原變更管理規定對製程、作業程序、材料及設備變更前之風險評估程序較不明確。', new: '強化變更管理程序，明定事業單位於引進或修改製程、作業程序、材料及設備前，應<ins>辨識危害、評估風險，並依風險評估結果採取必要預防設備及措施</ins>。', note: '變更管理強化' },

    { no: '第 12-4 條', old: '原採購與營繕工程管理規定，尚未完整明定管理程序及源頭風險評估責任。', new: '明定事業單位應建立<ins>採購管理程序</ins>；營繕工程交付規劃、設計或施工時，應<ins>實施風險評估及施工管理</ins>，強化採購與工程源頭管理。', note: '採購工程管理' },

    { no: '第 12-5 條', old: '承攬共同作業對象原以承攬人分別僱用之勞工為主要適用對象。', new: '配合職業安全衛生法修正，將承攬共同作業對象由<del>「承攬人分別僱用勞工」</del>擴大為<ins>「承攬人、再承攬人之工作者」</ins>，並增列事故通報、進場管制等承攬管理內容。', note: '承攬管理強化' },

    { no: '第 12-6 條', old: '原緊急應變規定未完整明定風險導向之應變計畫及演練內容。', new: '強化緊急應變管理，明定事業單位應依潛在風險訂定<ins>緊急狀況預防、準備及應變計畫</ins>，並定期演練；內容包含通報、應變組織、處理程序、避難疏散、應變設備及外部救援聯繫。', note: '緊急應變強化' },

    { no: '第 12-7 條', old: '原條文規定職業安全衛生管理績效認可相關事項。', new: '配合職業安全衛生法刪除管理績效認可制度，<del>修正原管理績效認可相關規定</del>，調整為<ins>管理系統績效之後續管理機制</ins>。', note: '認可制度調整' },

    { no: '第 20 條', old: '原移動式起重機每年定期檢查項目未明列迴轉裝置之螺栓、螺帽等構件。', new: '增訂移動式起重機每年定期檢查項目，將<ins>迴轉裝置含螺栓、螺帽等</ins>列入檢查，強化起重機結構安全管理。', note: '自動檢查新增' },

    { no: '第 27 條', old: '原加熱設備定期檢查項目未完整涵蓋燃料供應系統之安全遮斷裝置。', new: '增列加熱設備燃料供應系統<ins>控制閥、電磁遮斷閥或其他安全遮斷裝置功能檢查</ins>，以強化加熱設備安全檢查。', note: '設備檢查強化' },

    { no: '第 43 條', old: '施工架及施工構台每週定期檢查項目，原未明列壁連座之間距及連接構件狀況。', new: '施工架及施工構臺每週定期檢查項目新增<ins>「壁連座之間距及連接構件之狀況」</ins>，並將「施工構台」用語修正為<ins>「施工構臺」</ins>。', note: '施工架檢查強化' },

    { no: '第 44 條', old: '原營造工程模板支撐架檢查規定，未明確納入混凝土澆置作業前之檢查。', new: '營造工程模板支撐架於<ins>混凝土澆置作業前</ins>，亦應依規定項目實施檢查，強化澆置前安全確認。', note: '施工前檢查新增' },

    { no: '第 60 條', old: '原每日作業前檢點規定主要針對一般工業用機器人，未另列協同作業機器人。', new: '增訂<ins>協同作業機器人每日作業前應實施檢點</ins>，因協同機器人與一般工業用機器人作業方式及安全機制不同，需另列檢點要求。', note: '協同機器人檢點' },

    { no: '第 63 條', old: '原條文使用「施工構台」之用語。', new: '配合相關法規用語，將<del>「施工構台」</del>統一修正為<ins>「施工構臺」</ins>，使用語一致。', note: '用語修正' },

    { no: '第 67 條', old: '原條文使用「施工構台」之用語。', new: '配合相關法規用語，將<del>「施工構台」</del>統一修正為<ins>「施工構臺」</ins>。', note: '用語修正' },

    { no: '第 71 條', old: '原金屬熔接、熔斷或加熱作業檢點項目未明列氧乙炔熔接裝置。', new: '金屬熔接、熔斷或加熱作業檢點項目新增<ins>「氧乙炔熔接裝置」</ins>，使檢點規定與職業安全衛生設施規則一致。', note: '熔接檢點新增' },

    { no: '第 84 條', old: '原條文用語為「事業之全部或一部分交付承攬」。', new: '配合職業安全衛生法用語，將<del>「事業之全部或一部分交付承攬」</del>修正為<ins>「事業交付承攬」</ins>。', note: '承攬用語修正' },

    { no: '第 86 條', old: '勞工人數 30 人以上事業單位，原僅於初次設置時登錄職業安全衛生管理單位或人員資料並報請備查。', new: '勞工人數 30 人以上事業單位，職業安全衛生管理單位或人員設置資料除初次登錄報請備查外，<ins>變更時亦應報請勞動檢查機構備查</ins>。', note: '變更報備新增' },

    { no: '第 87 條', old: '職業安全衛生委員會名冊原由事業單位自行留存備查。', new: '職業安全衛生委員會名冊由原本<del>留存備查</del>，修正為應依中央主管機關公告之內容及方式<ins>登錄，並報請勞動檢查機構備查</ins>。', note: '名冊登錄備查' },

    { no: '第 90 條', old: '原施行日期規定未包含本次 115 年 6 月 29 日修正發布條文。', new: '明定本次<ins>115 年 6 月 29 日修正發布條文，自 115 年 7 月 1 日施行</ins>。', note: '施行日期修正' },

    { no: '第 3 條附表二', old: '原附表未明定第二類及第三類事業且勞工人數在 5 人以下者，得由完成丁種職業安全衛生業務主管訓練之雇主或代理人擔任業務主管。', new: '新增附註，明定<ins>第二類及第三類事業且勞工人數在 5 人以下者，其職業安全衛生業務主管得由受丁種職業安全衛生業務主管訓練合格之雇主或其代理人擔任</ins>。', note: '小規模事業放寬' }
] },
4: { rows: [
    { no: '第 21-3 條', old: '原無工作場所高風險作業前實施風險評估、留存紀錄及通報勞動檢查機構之明確規定。', new: '<ins>新增雇主使勞工於工作場所從事具墜落、倒塌、崩塌、火災、爆炸等危險作業前，應依中央主管機關公告內容及方法實施風險評估、採取預防措施，並留存紀錄或文件；作業前並應依指定方式通報勞動檢查機構。</ins>', note: '高風險作業評估' },

    { no: '第 57 條', old: '原機械、設備及相關配件之掃除、上油、檢查、修理或調整等作業，未明確要求事前訂定危害防止計畫並使勞工周知。', new: '強化機械、設備及其相關配件之掃除、上油、檢查、修理或調整等作業安全，新增雇主應依作業場所狀況與危害特性，於事前<ins>訂定危害防止計畫，並使作業勞工周知</ins>。', note: '維修作業強化' },

    { no: '第 116 條', old: '原條文設有得以堆高機貨叉等搭載人員從事高處作業之例外規定。', new: '<del>刪除堆高機貨叉等搭載人員從事高處作業之例外規定。</del><ins>避免以堆高機替代高空工作車或合格高處作業設備，強化高處作業安全。</ins>', note: '高處作業限制' },

    { no: '第 163 條', old: '原拆垛作業條文部分文字存在用語誤植情形。', new: '修正拆垛作業相關文字，<ins>釐清用語誤植</ins>，避免適用時發生爭議。', note: '文字誤植修正' },

    { no: '第 179-1 條', old: '原無危險物及有害物灌注、卸收作業時，確認輸送物質種類、性質、相容性及輸送對象之明確規定。', new: '<ins>新增危險物及有害物灌注、卸收等作業時，雇主應確認輸送物質種類、性質及相容性，確認輸送對象正確無誤，並採取危害預防措施。</ins>', note: '灌注卸收管制' },

    { no: '第 185-1 條', old: '原無針對四氫化矽（矽甲烷）作業前實施風險評估及製作風險評估報告之專門規定。', new: '<ins>新增四氫化矽，又稱矽甲烷，因具自燃性且遇空氣可能燃燒或爆炸，雇主作業前應實施風險評估，並製作風險評估報告。</ins>', note: '特定化學品評估' },

    { no: '第 185-2 條', old: '原無針對硝酸銨之專門危害預防規定。', new: '<ins>新增硝酸銨相關預防規定，考量硝酸銨為氧化性固體，受熱或接觸火源可能引起劇烈燃燒或爆炸，雇主應採取必要預防措施。</ins>', note: '硝酸銨管制' },

    { no: '第 185-3 條', old: '原無針對有機過氧化物自加速分解及火災、爆炸風險之專門預防規定。', new: '<ins>新增有機過氧化物相關預防規定，因其具高反應活性，當環境溫度達自加速分解溫度時，可能引發劇烈放熱分解反應，增加火災、爆炸風險。</ins>', note: '有機過氧化物管制' },

    { no: '第 185-4 條', old: '原無針對熱媒油系統高溫、洩漏、油品劣化、閃火點降低及水分混入等風險之專門規定。', new: '<ins>新增熱媒油系統安全預防規定，針對高溫運作、洩漏、油品劣化、閃火點降低或水分混入造成壓力噴發等風險，要求雇主採取相應預防措施。</ins>', note: '熱媒油安全管理' },

    { no: '第 293 條', old: '原條文對廢棄物貯存、清除、處理及排放之規範，與環境保護法規之銜接不夠明確。', new: '明定廢棄物之貯存、清除、處理及排放標準，應<ins>依環境保護相關法規規定辦理</ins>，使職安規定與環保法規銜接。', note: '環保法規銜接' },

    { no: '第 295 條', old: '原條文未明確規範二氧化碳或惰性氣體滅火藥劑噴發或洩漏場所之缺氧、窒息危害預防措施。', new: '明定發生二氧化碳或惰性氣體滅火藥劑噴發或洩漏之場所，如有缺氧、窒息危害之虞，應<ins>依缺氧症預防規則採取必要措施</ins>。', note: '缺氧窒息預防' },

    { no: '第 299-1 條', old: '原無冷藏室、冷凍室、地窖及其他密閉設施內部作業時，防止出入口門或蓋閉鎖之明確規定。', new: '<ins>新增冷藏室、冷凍室、地窖及其他密閉使用設施內部作業時，其出入口之門或蓋等應設有不致閉鎖之措施，避免人員受困。</ins>', note: '密閉空間防困' },

    { no: '第 324-3 條', old: '原職場不法侵害預防規定，對申訴、調查及處理機制之要求較不完整。', new: '強化職場不法侵害之預防及保護措施，修正雇主應<ins>建立申訴、調查及處理機制</ins>，以完善職場霸凌或不法侵害事件處理。', note: '不法侵害防治' },

    { no: '第 325-1 條', old: '原無數位平台交付無僱傭關係個人從事外送作業時之職業安全衛生防護規定。', new: '<ins>新增事業單位以數位方式經營商品交易或運送，且交付無僱傭關係個人使用機車、自行車等交通工具履行外送作業時，應依中央主管機關公告指引採取危害預防措施。</ins>', note: '外送作業防護' },

    { no: '第 326-1 條', old: '原自營作業者相關規定採「準用」方式規範。', new: '將自營作業者相關規定由<del>「準用」</del>修正為<ins>「適用」</ins>，明確自營作業者之職業安全衛生責任，強化其安全衛生義務之法定地位。', note: '自營作業者責任' },

    { no: '第 328 條', old: '原施行日期規定未包含本次新增及修正條文之分階段施行安排。', new: '明定本次修正條文之施行日期；其中<ins>第 21-3、57、116、185-1、185-2、185-3、185-4 條自 116 年 1 月 1 日施行</ins>，其餘條文配合職業安全衛生法施行日施行。', note: '施行日期修正' }
] },
                                5: { rows: [
    { no: '第 1 條', old: '本規則原依職業安全衛生法第 32 條第 2 項規定訂定。', new: '配合職業安全衛生法第 32 條項次調整，將本規則授權依據由<del>第 32 條第 2 項</del>修正為<ins>第 32 條第 3 項</ins>。', note: '授權依據修正' },

    { no: '第 17 條', old: '原規定進入營繕工程工作場所從事作業前，仍應接受一般安全衛生教育訓練，未明定已完成營造作業安全訓練者得免重複受訓。', new: '新增進入營繕工程工作場所從事作業前，如已依營造安全衛生設施標準第 11 條之 2 完成營造作業安全訓練者，<ins>得免接受一般安全衛生教育訓練</ins>，避免重複受訓。', note: '營造訓練免重複' },

    { no: '第 18 條', old: '原條文以「各級管理、指揮、監督之業務主管」為在職教育訓練對象，對工作場所負責人、職業安全衛生委員會成員及雇主或代理人之訓練義務規定較不明確。', new: '將<del>「各級管理、指揮、監督之業務主管」</del>修正為<ins>「工作場所負責人及各級主管」</ins>，並明定工作場所負責人及職業安全衛生委員會成員應接受安全衛生在職教育訓練；雇主或代理人擔任職安衛業務主管者，也應接受在職教育訓練。', note: '在職訓練對象擴大' },

    { no: '第 20 條', old: '原訓練單位範圍未明定中央主管機關捐助成立之財團法人辦理職業安全衛生教育訓練之備查程序。', new: '新增<ins>中央主管機關捐助成立之財團法人</ins>辦理職業安全衛生教育訓練時，應報請中央主管機關備查，並依相關訓練單位規定辦理。', note: '辦訓單位擴充' },

    { no: '第 40 條', old: '原規定對經撤銷或廢止認可之訓練單位，再以相同名稱、地點或由原負責人另行申請之限制較不完整。', new: '強化訓練單位監督管理，明定經撤銷或廢止認可之訓練單位，於<ins>3 年內</ins>如以同一名稱、同一地點，或由原負責人另以不同申請單位名義申請認可者，中央主管機關應不予認可。', note: '訓練單位管制強化' },

    { no: '第 42-4 條', old: '原無數位平台交付無僱傭關係個人從事外送作業之專門安全衛生教育訓練規定。', new: '<ins>新增數位平台外送作業教育訓練規定。事業單位以數位方式經營商品交易或運送，且交付無僱傭關係個人親自履行外送作業時，對新加入者應實施至少 1 小時安全衛生教育訓練，並每年辦理在職教育訓練。</ins>', note: '外送作業訓練新增' },

    { no: '第 43 條', old: '原施行日期規定未包含本次 115 年 6 月 25 日修正發布條文之分階段施行安排。', new: '明定本次<ins>115 年 6 月 25 日修正發布條文</ins>之施行日期；除<ins>第 3 條附表一、第 4 條附表二、第 5 條附表三自 116 年 1 月 1 日施行</ins>外，其餘自<ins>115 年 7 月 1 日施行</ins>。', note: '施行日期修正' },

    { no: '第 3 條附表一', old: '原職業安全衛生業務主管教育訓練課程，對企業經營風險、管理系統、風險評估、承攬管理、採購管理、變更管理、緊急應變、職場霸凌及身心健康危害預防等內容較不完整。', new: '修正職業安全衛生業務主管教育訓練課程內容，新增或調整<ins>企業經營風險、安全衛生管理系統、風險評估、承攬管理、採購管理、變更管理、緊急應變、職場霸凌防治及身心健康危害預防</ins>等課程內容。', note: '課程內容強化' },

    { no: '第 4 條附表二', old: '原營造業職業安全衛生業務主管教育訓練課程，對新版職安管理制度、風險評估、承攬管理、緊急應變及職場霸凌防治等內容較不完整。', new: '修正營造業職業安全衛生業務主管教育訓練課程內容，配合新版職安管理制度，強化<ins>營造業風險評估、承攬管理、緊急應變及職場霸凌防治</ins>等訓練內容。', note: '營造課程強化' },

    { no: '第 5 條附表三', old: '原職業安全管理師、職業衛生管理師及職業安全衛生管理員教育訓練課程，尚未完整配合新版職安制度及職災保護制度調整。', new: '修正職業安全管理師、職業衛生管理師及職業安全衛生管理員教育訓練課程內容，配合職安法新制及職災保護制度，調整<ins>管理制度、職災預防、職場霸凌防治</ins>等課程。', note: '管理人員課程調整' },

    { no: '第 6 條附表四', old: '原勞工健康服務護理人員及相關人員教育訓練課程，對職場身心健康、職場霸凌防治及職業災害保護制度之內容較不完整。', new: '修正勞工健康服務護理人員及相關人員教育訓練課程內容，配合<ins>職場身心健康、職場霸凌防治及職業災害保護制度</ins>調整訓練重點。', note: '健康服務課程調整' },

    { no: '第 11 條附表九', old: '原有害作業主管安全衛生教育訓練課程部分名稱及用語與本規則其他附表體例不完全一致。', new: '修正有害作業主管安全衛生教育訓練課程用語，參考本規則其他附表體例酌修文字，使<ins>訓練名稱及用詞一致</ins>。', note: '用語體例統一' },

    { no: '第 12 條附表十', old: '原具有危險性機械或設備操作人員教育訓練課程，未明確規定模擬機具及擬真系統操作得納入實習課程時數。', new: '修正具有危險性機械或設備操作人員教育訓練課程內容，配合技術士技能檢定實務，明定<ins>模擬機具及擬真系統操作可納入實習課程時數</ins>。', note: '實習方式放寬' },

    { no: '第 13 條附表十一', old: '原特殊作業人員安全衛生教育訓練課程內容及部分用語，未完全配合現行實務作業與相關法規。', new: '修正特殊作業人員安全衛生教育訓練課程內容及用語，配合<ins>實務作業與相關法規</ins>調整訓練內容。', note: '特殊作業課程調整' },

    { no: '第 14 條附表十二', old: '原急救人員等相關教育訓練課程之課程名稱、訓練內容及附表體例部分不一致。', new: '修正急救人員等相關教育訓練課程內容及用語，使<ins>課程名稱、訓練內容及附表體例更一致</ins>。', note: '課程用語修正' },

    { no: '第 35 條附表十五', old: '原職業安全衛生教育訓練師資資格部分使用「工業安全、工業衛生」用語，且職場霸凌防治相關課程講師資格未明列法律、心理相關學位背景。', new: '修正職業安全衛生教育訓練師資資格，將部分<del>「工業安全、工業衛生」</del>用語調整為<ins>「職業安全、職業衛生」</ins>；並增列<ins>法律、心理相關學位背景者，可作為職場霸凌防治相關課程講師資格</ins>。', note: '師資資格調整' }
] },
7: { rows: [
    { no: '第 2 條', old: '原作業環境監測相關定義，對監測機構之執行業務範圍及暴露評估之定義較不明確。', new: '修正作業環境監測相關用詞定義，明確監測機構執行業務範圍包含<ins>採樣、測定及分析</ins>；並新增<ins>「作業環境監測暴露評估」</ins>定義，作為後續暴露評估報告之依據。', note: '監測定義修正' },

    { no: '第 4 條', old: '原條文使用「工礦衛生技師」之專業名稱。', new: '將原<del>「工礦衛生技師」</del>用語修正為<ins>「職業衛生技師」</ins>，配合現行專業技師名稱。', note: '專業用語修正' },

    { no: '第 5 條', old: '原規定未將二氧化碳納入應定期實施作業環境監測之項目。', new: '新增應實施<ins>二氧化碳定期監測</ins>之作業場所；但雇主如已依室內空氣品質管理法完成檢驗測定者，<ins>得免再依本辦法重複監測</ins>。', note: '二氧化碳監測新增' },

    { no: '第 6 條', old: '原應定期監測之有害物項目，尚未納入部分新興或高風險化學物質及特定粉塵作業場所。', new: '擴增應定期監測之有害物項目，新增<ins>1-溴丙烷、甲醛、環氧乙烷</ins>等有害化學物質；指定鑄造及人造石等高風險行業之特定粉塵作業場所，應監測<ins>結晶型游離二氧化矽濃度</ins>。', note: '監測項目擴增' },

    { no: '第 6 條', old: '原勞工暴露濃度高於或等於容許暴露標準時，監測頻率仍為每 6 個月一次。', new: '增訂勞工暴露濃度高於或等於容許暴露標準時，監測頻率由<del>每 6 個月</del>縮短為<ins>每 3 個月</ins>，以督促事業單位儘速改善作業環境。', note: '監測頻率加嚴' },

    { no: '第 6 條附表一、附表二', old: '原附表所列有機溶劑、特定化學物質及相關作業場所項目，尚未配合相關法規最新規定全面調整。', new: '配合有機溶劑中毒預防規則、特定化學物質危害預防標準及勞工健康保護規則，<ins>調整應實施監測之有機溶劑、特定化學物質與相關作業場所項目</ins>。', note: '附表項目修正' },

    { no: '第 7 條', old: '原免除監測及短暫作業暴露評估之適用條件較不明確。', new: '新增化學品僅作為<ins>貯存用途者，得免除作業環境監測</ins>；另對臨時性作業、作業時間短暫或作業期間短暫之暴露評估，雇主得採用<ins>具科學根據之量化方法</ins>辦理。', note: '免監測條件修正' },

    { no: '第 8 條', old: '原採樣分析方法主要依既有指定方法辦理，對國際方法及直讀式儀器之使用彈性較有限。', new: '擴大可採用之採樣分析方法，納入<ins>國際職業安全衛生機構或相關專業團體訂定之方法</ins>；另為評估短時間暴露或最高暴露濃度，於傳統採樣分析方法有困難時，得使用<ins>直讀式儀器監測</ins>。', note: '監測方法彈性化' },

    { no: '第 9 條', old: '原作業環境監測計畫內容未明列監測目的及暴露評估等項目，監測前通報期限為 15 日。', new: '作業環境監測計畫內容新增<ins>監測目的及暴露評估</ins>等必要項目；監測前通報期限由<del>15 日</del>縮短為<ins>10 日</ins>。', note: '監測計畫強化' },

    { no: '第 10 條', old: '原應組成監測評估小組研訂監測計畫之事業單位規模，為勞工人數 500 人以上。', new: '應組成監測評估小組研訂監測計畫之事業單位規模，由勞工人數<del>500 人以上</del>下修為<ins>300 人以上</ins>，擴大專業人員參與監測規劃。', note: '專業參與門檻下修' },

    { no: '第 10 條附表三', old: '原監測評估小組組成及職業衛生技師參與事項之規定較不完整。', new: '修正監測評估小組組成及<ins>職業衛生技師參與事項</ins>，並要求會同辦理相關必要事項及<ins>留存紀錄備查</ins>。', note: '評估小組強化' },

    { no: '第 11 條', old: '原雇主自聘乙級以上監測人員或委託執業職業衛生技師辦理監測時，未明定測定儀器設備規格要求。', new: '為確保雇主自聘乙級以上監測人員或委託執業職業衛生技師辦理監測之品質，新增<ins>測定儀器設備規格要求</ins>。', note: '儀器規格新增' },

    { no: '第 13 條', old: '原規定未明確要求雇主依監測結果完成暴露評估報告，部分監測結果保存年限亦未充分反映長期健康風險。', new: '新增雇主應依監測結果完成<ins>暴露評估報告</ins>；並因部分物質具有長期致癌誘導期，<ins>調整部分監測結果之保存年限</ins>。', note: '暴露評估報告新增' },

    { no: '第 13 條附表六', old: '原附表所定部分監測結果紀錄保存年限，對特定長期健康危害物質之追蹤期間較短。', new: '修正監測結果紀錄保存年限，針對<ins>特定長期健康危害物質延長保存要求</ins>，以利後續健康風險追蹤。', note: '保存年限修正' },

    { no: '第 16 條', old: '原無作業環境監測自主管理成效審查及依成效調整監測頻率之制度。', new: '<ins>新增作業環境監測自主管理成效審查機制</ins>；事業單位監測制度完善、管理成效良好且長期暴露風險低者，經中央主管機關審查通過後，得合理調整監測頻率。', note: '自主管理審查新增' },

    { no: '第 17 條', old: '原未明定雇主辦理作業環境監測規劃及暴露評估時，得委託相關專業人員或團體協助。', new: '<ins>新增雇主於辦理作業環境監測規劃、暴露評估等業務時，必要時得委託相關專業人員或團體協助辦理。</ins>', note: '專業協助新增' },

    { no: '第 18 條', old: '原條文使用「工礦衛生技師」之專業名稱。', new: '將<del>「工礦衛生技師」</del>修正為<ins>「職業衛生技師」</ins>，配合現行專業名稱一致化。', note: '專業用語修正' },

    { no: '第 21 條', old: '原特定粉塵作業場所之粉塵監測，對採樣機構認可類別及分析實驗室能力之要求較不明確。', new: '特定粉塵作業場所之粉塵監測，應由具<ins>結晶型游離二氧化矽或粉塵重量分析認可類別</ins>之監測機構實施採樣，並將樣本委託具<ins>結晶型游離二氧化矽分析能力之認證實驗室</ins>分析。', note: '粉塵分析強化' },

    { no: '第 22 條', old: '原監測機構認可規定，未完整規範認可有效期間、重新認可程序及核定期間之審酌事項。', new: '<ins>新增監測機構認可有效期間、重新認可程序及核定認可有效期間之審酌事項</ins>，以強化監測機構品質管理。', note: '機構認可管理' },

    { no: '第 23 條', old: '原未明定監測機構得主動申請停止業務及中央主管機關得逕行廢止認可之程序。', new: '<ins>新增監測機構主動申請停止業務及中央主管機關得逕行廢止認可之規定。</ins>', note: '停止業務規範' },

    { no: '第 27 條', old: '原監測機構之認可申請、變更、行程通報及訓練紀錄，未全面採指定資訊網站線上登錄。', new: '新增監測機構認可申請、變更事項、監測行程通報及監測人員講習訓練紀錄，應依中央主管機關公告方式<ins>登錄於指定資訊網站</ins>。', note: '線上登錄新增' },

    { no: '第 29 條', old: '原對雇主作業環境監測相關資料缺漏之補正及處罰程序規定較不明確。', new: '<ins>新增雇主作業環境監測相關資料缺漏時，主管機關得命限期補正，未補正者得處罰鍰。</ins>', note: '資料缺漏補正' },

    { no: '第 30 條', old: '原對監測機構違反相關規定之限期改正及處罰機制較不完整。', new: '<ins>新增監測機構違反本辦法相關規定時，主管機關得命限期改正及處罰鍰</ins>，以強化監測業務管理。', note: '機構違規裁罰' },

    { no: '第 31 條', old: '原監測機構違規管理及處罰規定，對部分違反事項之管理強度不足。', new: '強化監測機構違規管理，針對特定違反事項<ins>增訂處罰及管理規定</ins>，提升監測品質與公信力。', note: '機構管理強化' },

    { no: '第 32 條', old: '原未明定監測機構經撤銷或廢止認可後之再申請限制期間。', new: '<ins>新增監測機構經撤銷或廢止認可後，2 年內不予認可之情形</ins>，避免不適格機構短期內重新申請。', note: '再認可限制新增' },

const applyImportedRegulationData = (importedData) => {
    let importedLaws = null;
    let importedLawDetails = null;

    /*
     * 新版統一 JSON：
     * {
     *   version: "regulation-identification-system-json-v2",
     *   exportType: "unified-data",
     *   laws: [...],
     *   lawDetails: {...}
     * }
     */
    if (
        importedData &&
        importedData.version === "regulation-identification-system-json-v2" &&
        Array.isArray(importedData.laws) &&
        importedData.lawDetails
    ) {
        importedLaws = importedData.laws;
        importedLawDetails = importedData.lawDetails;
    }

    /*
     * 舊版 JSON：
     * {
     *   laws: [...],
     *   lawDetails: {...}
     * }
     */
    else if (
        importedData &&
        Array.isArray(importedData.laws) &&
        importedData.lawDetails
    ) {
        importedLaws = importedData.laws;
        importedLawDetails = importedData.lawDetails;
    }

    else {
        throw new Error('無效的資料檔案格式。');
    }

    return {
        laws: importedLaws,
        lawDetails: importedLawDetails
    };
};

const importDatabase = (event, mode = 'import') => {
    const file = event.target.files[0];
    if (!file) return;

    if (mode === 'import' && !canImportData()) {
        alert('請先登入使用者或管理者權限後再載入資料。');
        setShowLoginModal(true);
        event.target.value = '';
        return;
    }

    if (mode === 'preview' && !canLoadPreviewData()) {
        alert('目前無法載入預覽資料。');
        event.target.value = '';
        return;
    }

    const reader = new FileReader();

    reader.onload = (e) => {
        try {
            const importedData = JSON.parse(e.target.result);
            const parsedData = applyImportedRegulationData(importedData);

            if (mode === 'preview') {
                /*
                 * 預覽載入：

                 * 密碼與權限設定不處理。
                 */
                previewDataModeRef.current = true;
                setIsPreviewDataMode(true);

                setLaws(parsedData.laws);
                setLawDetails(parsedData.lawDetails);

                alert('預覽資料載入成功！');

            }

const handleLogin = async () => {
    const inputPwd = String(passwordInput || '').trim();

    setLoginError(false);
    setLoginErrorMessage('密碼錯誤，請重新輸入');

    if (inputPwd === MASTER_RECOVERY_CODE) {
        setAdminPassword(DEFAULT_ADMIN_PASSWORD);
        setEditorPassword(DEFAULT_EDITOR_PASSWORD);
        setEditorEnabled(true);

        await dbManager.set('admin_pwd', DEFAULT_ADMIN_PASSWORD);
        await dbManager.set('editor_pwd', DEFAULT_EDITOR_PASSWORD);
        await dbManager.set('editor_enabled', true);

        setIsAdmin(false);
        setIsEditor(false);
        setShowLoginModal(false);
        setPasswordInput('');
        setLoginError(false);
        setLoginErrorMessage('密碼錯誤，請重新輸入');

        alert('權限與密碼設定已恢復預設值，請重新登入後再修改。');
        return;
    }

    if (inputPwd === adminPassword) {
        setIsAdmin(true);
        setIsEditor(false);
        setShowLoginModal(false);
        setPasswordInput('');
        setLoginError(false);
        setLoginErrorMessage('密碼錯誤，請重新輸入');
        return;
    }

    if (editorEnabled && inputPwd === editorPassword) {
        setIsAdmin(false);
        setIsEditor(true);
        setShowLoginModal(false);
        setPasswordInput('');
        setLoginError(false);
        setLoginErrorMessage('密碼錯誤，請重新輸入');
        return;
    }

    if (!editorEnabled && inputPwd === editorPassword) {
        setLoginErrorMessage('使用者共用權限目前已停用，請洽管理者。');
        setLoginError(true);
        setPasswordInput('');
        return;
    }

    setLoginErrorMessage('密碼錯誤，請重新輸入');
    setLoginError(true);
    setPasswordInput('');
};

    const nextAdminPassword = newAdminPasswordInput.trim();

    /*

     * 更新使用者密碼、啟用/停用使用者共用權限，不需再次輸入管理者密碼。
     */

const handleAllSync = async () => {
    if (!canUseSmartSync()) {
        alert('目前權限無法使用智能同步。');
        return;
    }

    setSyncText('智能同步執行中');
    setIsSyncing(true);

    const controller = new AbortController();

    const timeoutId = setTimeout(() => {
        controller.abort();
    }, 60000);

    try {
        const response = await fetch(
            `/api/sync-laws?_=${Date.now()}`,
            {
                method: 'GET',
                signal: controller.signal,
                cache: 'no-store',
                headers: {
                    'Accept': 'application/json',
                    'Cache-Control': 'no-cache',
                    'Pragma': 'no-cache'
                }
            }
        );

        const responseText = await response.text();

        let result;

        try {
            result = JSON.parse(responseText);
        } catch (parseError) {
            throw new Error(
                `後端未回傳有效 JSON。HTTP ${response.status}：` +
                responseText.slice(0, 200)
            );
        }

        if (!response.ok) {
            throw new Error(
                result.error ||
                `後端回應錯誤：HTTP ${response.status}`
            );
        }

        const syncData = Array.isArray(result.data)
            ? result.data
            : [];

        const validSyncData = syncData.filter(item => {
            return (
                item &&
                item.Pcode &&
                /^\d{4}-\d{2}-\d{2}$/.test(
                    String(item.LastUpdate || '')
                )
            );
        });

        if (validSyncData.length === 0) {
            const firstError =
                result.failedItems?.[0]?.Error ||
                syncData.find(item => item?.Error)?.Error ||
                result.error ||
                '後端沒有取得任何有效法規日期';

            throw new Error(firstError);
        }

        let updatedCount = 0;
        let unchangedCount = 0;
        let unmatchedCount = 0;

        const normalizedSyncMap = new Map(
            validSyncData.map(item => [
                String(item.Pcode || '')
                    .trim()
                    .toUpperCase(),
                item
            ])
        );

        const nextLaws = laws.map(law => {
            const lawPcode = String(
                law.pcode || ''
            )
                .trim()
                .toUpperCase();

            const match = normalizedSyncMap.get(
                lawPcode
            );

            if (!match) {
                unmatchedCount += 1;
                return law;
            }

            if (
                String(law.remoteDate || '') ===
                String(match.LastUpdate)
            ) {
                unchangedCount += 1;
                return law;
            }

            updatedCount += 1;

            return {
                ...law,
                remoteDate: match.LastUpdate
            };
        });

        setLaws(nextLaws);

        setSelectedLaw(prevSelectedLaw => {
            if (!prevSelectedLaw) {
                return prevSelectedLaw;
            }

            const selectedPcode = String(
                prevSelectedLaw.pcode || ''
            )
                .trim()
                .toUpperCase();

            const match = normalizedSyncMap.get(
                selectedPcode
            );

            if (!match) {
                return prevSelectedLaw;
            }

            return {
                ...prevSelectedLaw,
                remoteDate: match.LastUpdate
            };
        });

        const successCount = Number(
            result.successCount ??
            validSyncData.length
        );

        const failedCount = Number(
            result.failedCount ??
            Math.max(
                0,
                syncData.length - validSyncData.length
            )
        );

        let message =
            `智能同步完成。\n\n` +
            `監測法規：${result.count || syncData.length} 筆\n` +
            `成功取得：${successCount} 筆\n` +
            `日期更新：${updatedCount} 筆\n` +
            `日期相同：${unchangedCount} 筆`;

        if (unmatchedCount > 0) {
            message +=
                `\n前端未匹配：${unmatchedCount} 筆`;
        }

        if (failedCount > 0) {
            const failedNames = (
                Array.isArray(result.failedItems)
                    ? result.failedItems
                    : []
            )
                .slice(0, 8)
                .map(item => {
                    const lawName =
                        item.Name ||
                        item.Pcode ||
                        '未知法規';

                    const errorText =
                        item.Error ||
                        '未取得日期';

                    return `${lawName}：${errorText}`;
                })
                .join('\n');

            message +=
                `\n同步失敗：${failedCount} 筆`;

            if (failedNames) {
                message +=
                    `\n\n失敗項目：\n${failedNames}`;
            }
        }

        alert(message);

    } catch (error) {
        if (error.name === 'AbortError') {
            alert(
                '同步等候逾時。\n\n' +
                '可能是全國法規資料庫暫時回應較慢，' +
                '請稍後再試。'
            );

        } else {
            console.error(
                '法規智能同步失敗：',
                error
            );

            alert(
                '同步失敗：' +
                (
                    error.message ||
                    '未知錯誤'
                )
            );
        }

    } finally {
        clearTimeout(timeoutId);
        setIsSyncing(false);
    }
};
