    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        /**
         * IndexedDB 管理器
         * 處理異步資料存取
         */
        const DB_NAME = 'OSH_Regulation_DB';
        const DB_VERSION = 1;
        const STORE_NAME = 'app_state';

        const dbManager = {
            init: () => {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            db.createObjectStore(STORE_NAME);
                        }
                    };
                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = (e) => reject(e.target.error);
                });
            },
            get: async (key) => {
                const db = await dbManager.init();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, 'readonly');
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.get(key);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },
            set: async (key, value) => {
                const db = await dbManager.init();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, 'readwrite');
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.put(value, key);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }
        };

        const App = () => {

            const [searchQuery, setSearchQuery] = useState('');
            const [filterType, setFilterType] = useState('全部');
            const [currentTime, setCurrentTime] = useState(new Date());
            
            // 管理員狀態

            const [showLoginModal, setShowLoginModal] = useState(false);
            const [authMode, setAuthMode] = useState('login'); 
            const [passwordInput, setPasswordInput] = useState('');
            const [oldPasswordInput, setOldPasswordInput] = useState('');
            const [newPasswordInput, setNewPasswordInput] = useState('');
            const [loginError, setLoginError] = useState(false);
            const [changeError, setChangeError] = useState('');

            // 法規主數據與內容
            const [adminPassword, setAdminPassword] = useState('1068');
            const [laws, setLaws] = useState([]);
            const [lawDetails, setLawDetails] = useState({});

            // 初始化：從 IndexedDB 讀取
            useEffect(() => {
                const loadData = async () => {

                        const savedDetails = await dbManager.get('details');
                        const savedPwd = await dbManager.get('admin_pwd');

                        if (savedLaws) setLaws(savedLaws);
                        else {
                            // 預設初始數據
                            setLaws([
                                { id: 1, pcode: 'N0060001', name: '職業安全衛生法', type: '法律', remoteDate: '2025-12-19', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 2, pcode: 'N0060002', name: '職業安全衛生法施行細則', type: '法規命令', remoteDate: '2020-02-27', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 3, pcode: 'N0060027', name: '職業安全衛生管理辦法', type: '法規命令', remoteDate: '2022-01-05', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 4, pcode: 'N0060009', name: '職業安全衛生設施規則', type: '法規命令', remoteDate: '2024-08-01', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 5, pcode: 'N0060010', name: '職業安全衛生教育訓練規則', type: '法規命令', remoteDate: '2025-09-04', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 6, pcode: 'N0060023', name: '職業安全衛生標示設置準則', type: '法規命令', remoteDate: '2014-07-02', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 7, pcode: 'N0060033', name: '勞工作業環境監測實施辦法', type: '法規命令', remoteDate: '2016-11-02', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 8, pcode: 'N0060004', name: '勞工作業場所容許暴露標準', type: '法規命令', remoteDate: '2025-04-11', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 9, pcode: 'N0060017', name: '有機溶劑中毒預防規則', type: '法規命令', remoteDate: '2025-05-14', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 10, pcode: 'N0060054', name: '危害性化學品標示及通識規則', type: '法規命令', remoteDate: '2018-11-09', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 11, pcode: 'N0060022', name: '勞工健康保護規則', type: '法規命令', remoteDate: '2021-12-22', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 12, pcode: 'N0060065', name: '女性勞工母性健康保護實施辦法', type: '法規命令', remoteDate: '2024-05-31', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 13, pcode: 'N0060032', name: '妊娠與分娩後女性及未滿十八歲勞工禁止從事危險性或有害性工作認定標準', type: '行政規則', remoteDate: '2025-11-20', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 14, pcode: 'N0060012', name: '精密作業勞工視機能保護設施標準', type: '法規命令', remoteDate: '2014-03-30', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 15, pcode: 'N0060025', name: '工業用機器人危害預防標準', type: '法規命令', remoteDate: '2018-02-14', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 16, pcode: 'N0060011', name: '鍋爐及壓力容器安全規則', type: '法規命令', remoteDate: '2014-07-01', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 17, pcode: 'J0160009', name: '游離輻射防護法', type: '法律', remoteDate: '2002-01-30', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 18, pcode: 'J0160022', name: '游離輻射防護施行細則', type: '法規命令', remoteDate: '2008-02-22', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 19, pcode: 'J0160004', name: '游離輻射防護安全標準', type: '法規命令', remoteDate: '2005-12-30', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 20, pcode: 'J0160025', name: '放射性物質與可發生游離輻射設備及其輻輻射作業管理辦法', type: '法規命令', remoteDate: '2018-12-22', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 21, pcode: 'J0160042', name: '放射性物質或可發生游離輻射設備操作人員管理辦法', type: '法規命令', remoteDate: '2009-04-17', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 22, pcode: 'N0030011', name: '事業單位僱用女性勞工夜間工作場所必要之安全衛生設施標準', type: '法規命令', remoteDate: '2015-03-31', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 23, pcode: 'N0060034', name: '機械設備器具安全標準', type: '法規命令', remoteDate: '2022-05-11', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 24, pcode: 'N0030001', name: '勞動基準法', type: '法律', remoteDate: '2024-07-31', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 25, pcode: 'N0050031', name: '勞工職業災害保險及保護法', type: '法律', remoteDate: '2021-04-30', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 26, pcode: 'N0050039', name: '勞工職業災害保險及保護法施行細則', type: '法規命令', remoteDate: '2025-05-29', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 27, pcode: 'N0050035', name: '勞工職業災害保險及保護法第十條規定參加保險辦法', type: '法規命令', remoteDate: '2022-03-09', localCheckDate: UNIFIED_INITIAL_DATE },
                                { id: 28, pcode: 'N0060020', name: '缺氧症預防規則', type: '法規命令', remoteDate: '2014-06-26', localCheckDate: UNIFIED_INITIAL_DATE }
                            ]);
                        }

                        if (savedDetails) setLawDetails(savedDetails);
                        else {
                            setLawDetails({
                                1: { rows: [{ no: '第 4 條', old: '本法適用於各業。但因事業規模、性質及風險程度...', new: '本法適用於各業。但因事業規模、性質及風險程度，經中央主管機關指定公告者，<ins>得分階段適用。針對居家辦公或遠端勞動者，亦納入職業安全衛生保障範圍。</ins>', note: '擴大適用範圍' }, { no: '第 12 條', old: '雇主對勞工應施以從事工作及預防災變所必要之安全衛生教育訓練。', new: '雇主對勞工應施以從事工作及預防災變所必要之安全衛生教育訓練。<ins>對於使用自動化、數位化設備之作業，應包含資安與電子監控環境之心理壓力預防訓練。</ins>', note: '新增數位作業教育' }, { no: '第 43 條', old: '處新臺幣三萬元以上十五萬元以下罰鍰...', new: '有下列情事之一者，處新臺幣三萬元以上<ins>三十萬元</ins>以下罰鍰...<ins>若涉及高風險作業致人於死者，罰鍰上限提高至一百萬元。</ins>', note: '罰則加重' }] },
                                5: { rows: [{ no: '第 15 條', old: '教育訓練得採通訊教學或網路教學方式辦理。', new: '教育訓練得採通訊教學、網路教學<ins>或虛擬實境 (VR) 沉浸式體驗教學</ins>方式辦理。<ins>其認可標準由中央主管機關另定之。</ins>', note: '認可新科技教學' }, { no: '第 23 條', old: '勞工領受證書後應妥善保存。', new: '勞工領受證書後應妥善保存。<ins>主管機關應建立數位證照雲端查驗系統，並與實體證書具同等法律效力。</ins>', note: '推動數位證照' }] },
                                8: { rows: [{ no: '附表一', old: '甲苯 (Toluene) 容許濃度：100 ppm', new: '甲苯 (Toluene) 容許濃度：<ins>50 ppm</ins>', note: '標準趨嚴' }, { no: '附表一', old: '正己烷 (n-Hexane) 容許濃度：50 ppm', new: '正己烷 (n-Hexane) 容許濃度：<ins>20 ppm</ins>', note: '標準趨嚴' }, { no: '附表一', old: '二甲苯 (Xylene) 容許濃度：100 ppm', new: '二甲苯 (Xylene) 容許濃度：<ins>80 ppm</ins>', note: '標準趨嚴' }] },
                                9: { rows: [{ no: '第 3 條', old: '雇主使勞工從事有機溶劑作業，應設置有效之局部排氣裝置。', new: '雇主使勞工從事有機溶劑作業，應設置有效之局部排氣裝置。<ins>排氣裝置應具備智慧感測功能，當風速低於法定標準時應自動發出警報並停止作業。</ins>', note: '設備規格升級' }, { no: '第 5 條', old: '有機溶劑應貯存於固定處所。', new: '有機溶劑應貯存於固定處所。<ins>優先推廣使用環境友善型綠色溶劑，替代傳統高揮發性有機化合物。</ins>', note: '推廣友善環境溶劑' }] },
                                13: { rows: [{ no: '第 2 條', old: '本標準所稱危險性或有害性工作如下...', new: '本標準所稱危險性或有害性工作如下...<ins>針對夜間工作環境，雇主應進行性別影響評估與安全路徑監測。</ins>', note: '新增夜間安全要求' }] },
                                26: { rows: [{ no: '第 18 條', old: '保險人應依本法規定核計保險費。', new: '保險人應依本法規定核計保險費。<ins>針對微型企業或短期補習班等教職員，應納入強制加保之稽核對象。</ins>', note: '納保對象明確化' }, { no: '第 25 條', old: '申請職災給付應檢附下列文件...', new: '申請職災給付應檢附下列文件...<ins>若為遠端辦公受傷，需檢附網路紀錄或視訊通報系統之佐證資料。</ins>', note: '適應新型態勞動' }] },
                                4: { rows: [{ no: '第 21 條', old: '雇主對於勞工從事作業，應採取必要之安全設備及措施。', new: '雇主對於勞工從事作業，應採取必要之安全設備及措施，<ins>並應落實自動檢查計畫</ins>。', note: '加強自主管理' }, { no: '第 128-1 條', old: '(新增條文)', new: '<ins>雇主對於高溫環境作業勞工，應提供必要之散熱設備及足夠之飲用水。</ins>', note: '新增熱危害預防' }] },
                                24: { rows: [{ no: '第 32-1 條', old: '雇主依第三十二條第一項及第二項規定使勞工延長工作時間...', new: '雇主依第三十二條第一項及第二項規定使勞工延長工作時間，<ins>應核實記載至分鐘為止</ins>。', note: '工時記載精細化' }] }
                            });
                        }

                        if (savedPwd) setAdminPassword(savedPwd);

                        setIsLoaded(true);
                    } catch (err) {
                        console.error("Failed to load IndexedDB data", err);
                        setIsLoaded(true);
                    }
                };
                loadData();
            }, []);

            // 持久化：當資料變動時存入 IndexedDB
            useEffect(() => {
                if (isLoaded) {
                    dbManager.set('laws', laws);
                    dbManager.set('details', lawDetails);
                    dbManager.set('admin_pwd', adminPassword);
                }
            }, [laws, lawDetails, adminPassword, isLoaded]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // 輔助函式
            const formatTime = (date) => {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                const hh = String(date.getHours()).padStart(2, '0');
                const mm = String(date.getMinutes()).padStart(2, '0');
                const ss = String(date.getSeconds()).padStart(2, '0');
                return `${y}/${m}/${d} ${hh}:${mm}:${ss}`;
            };

            const checkLawDiff = (remoteDate, localDate) => {
                const rDate = new Date(remoteDate);
                const lDate = localDate ? new Date(localDate) : new Date(0);
                return rDate > lDate;
            };

            const processSyncFile = (file, targetLawId = null) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const syncData = JSON.parse(e.target.result);
                        setLaws(prevLaws => {
                            return prevLaws.map(law => {
                                if (targetLawId !== null && law.id !== targetLawId) return law;
                                const match = syncData.find(item => item.Pcode === law.pcode);
                                if (match) {
                                    const jsonDate = new Date(match.LastUpdate);
                                    const currentRemote = new Date(law.remoteDate);
                                    if (jsonDate > currentRemote) {
                                        return { ...law, remoteDate: match.LastUpdate };
                                    }
                                }
                                return law;
                            });
                        });
                        
                        if (targetLawId) {
                            finalizeSingleSync(targetLawId);
                        } else {
                            finalizeAllSync();
                        }
                    } catch (err) {
                        alert('校對失敗：無法解析 law_sync_status.json。');
                        setIsSyncing(false);
                    }
                };
                reader.readAsText(file);
            };

            const exportDatabase = () => {
                const dataStr = JSON.stringify({ laws, lawDetails }, null, 2);
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                const exportFileDefaultName = `OSH_Regulation_DB_${new Date().toISOString().split('T')[0]}.json`;
                const linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', exportFileDefaultName);
                linkElement.click();
            };

            const importDatabase = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        if (importedData.laws && importedData.lawDetails) {
                            if (confirm('導入數據庫將覆蓋目前所有紀錄，確定要繼續嗎？')) {
                                setLaws(importedData.laws);
                                setLawDetails(importedData.lawDetails);
                                alert('數據庫導入成功！');
                            }
                        } else {
                            alert('無效的數據庫檔案格式。');
                        }
                    } catch (err) {
                        alert('檔案解析失敗：' + err.message);
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            const handleLogin = () => {
                if (passwordInput === adminPassword) {
                    setIsAdmin(true);
                    setShowLoginModal(false);
                    setPasswordInput('');
                    setLoginError(false);
                } else {

                newLaws[index] = newLaws[targetIndex];
                newLaws[targetIndex] = temp;
                setLaws(newLaws);

                setLawDetails(prev => {

                    if (!newRows[rowIndex]) {

                    newRows[rowIndex] = { ...newRows[rowIndex], [field]: value };

                setLawDetails(prev => {

                    return { ...prev, [lawId]: { rows: newRows } };

                                                                <div className="flex flex-col min-w-[140px]">
                                                                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">最近鑑別/登錄日</span>
                                                                    {isAdmin ? (
                                                                        <input 
                                                                            type="date"
                                                                            className={`text-sm font-black admin-input ${isLawDiff ? 'text-rose-500' : 'text-emerald-700'}`}
                                                                            value={law.localCheckDate}
                                                                            onChange={(e) => updateLawField(law.id, 'localCheckDate', e.target.value)}
                                                                        />
                                                                    ) : (
                                                                        <span className={`text-sm font-black ${isLawDiff ? 'text-rose-500' : 'text-emerald-700'}`}>
                                                                            {law.localCheckDate}
                                                                        </span>
                                                                    )}
                                                                </div>
                                                                
                                                                <div className="ml-6 flex items-center gap-2">
                                                                    <span className={`text-[11px] font-black px-4 py-1.5 rounded-lg shadow-sm transition-all ${!isLawDiff ? 'bg-emerald-600 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                                                        鑑別完成
                                                                    </span>
                                                                    <span className={`text-[11px] font-black px-4 py-1.5 rounded-lg shadow-sm transition-all ${isLawDiff ? 'bg-rose-600 text-white animate-pulse' : 'bg-slate-100 text-slate-400'}`}>
                                                                        鑑別異常
                                                                    </span>
                                                                    <span className={`text-[11px] font-black px-4 py-1.5 rounded-lg shadow-sm transition-all ${isLawDiff ? 'bg-amber-500 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                                                        法規變動
                                                                    </span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <div className="flex items-center gap-4 shrink-0 ml-20 lg:ml-0">
                                                        {isAdmin && (
                                                            <button 
                                                                onClick={() => removeLaw(law.id)}
                                                                className="w-12 h-12 rounded-2xl bg-rose-50 text-rose-500 hover:bg-rose-500 hover:text-white transition-all flex items-center justify-center"
                                                                title="移除此法規"
                                                            >
                                                                <i className="fas fa-trash-alt"></i>
                                                            </button>
                                                        )}
                                                        <button 
                                                            onClick={() => startSync(law)} 
                                                            className={`px-6 py-4 rounded-2xl font-black text-sm transition-all active:scale-95 ${isLawDiff ? 'bg-rose-600 text-white shadow-xl shadow-rose-600/30 hover:bg-rose-700 animate-pulse border-none' : 'bg-slate-100 text-slate-600 border border-slate-200 hover:bg-slate-200'}`}
                                                        >
                                                            比對詳情
                                                        </button>
                                                        <button
                                                            onClick={() => handleSingleSync(law.id)}
                                                            className={`px-10 py-4 rounded-2xl font-black text-sm text-white shadow-xl transition-all duration-200 transform hover:scale-105 active:scale-95 flex items-center justify-center ${isLawDiff ? 'bg-slate-300 shadow-none cursor-default text-slate-500' : 'bg-blue-600 shadow-blue-600/30 hover:bg-blue-700'}`}
                                                            disabled={isLawDiff}
                                                        >
                                                            立即鑑別
                                                        </button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        {isAdmin && (
                                            <button 
                                                onClick={addNewLaw}
                                                className="w-full py-8 border-2 border-dashed border-slate-300 rounded-3xl text-slate-400 font-black flex flex-col items-center justify-center gap-3 hover:border-blue-400 hover:text-blue-500 hover:bg-blue-50 transition-all"
                                            >
                                                <i className="fas fa-plus-circle text-2xl"></i>
                                                新增法規監測項目
                                            </button>
                                        )}
                                    </div>
                                </div>
                            ) : (
                                <div className="fade-in space-y-8">
                                    <button onClick={() => setActiveTab('monitor')} className="back-nav-btn flex items-center gap-3 text-base font-black text-slate-500 hover:text-blue-600 transition-all group">
                                        <i className="fas fa-chevron-left transition-transform group-hover:-translate-x-1"></i> 返回監控清單
                                    </button>
                                    
                                    <div className="bg-white rounded-[3rem] shadow-2xl border border-slate-200 overflow-hidden workbench-card">
                                        <div className="p-12 border-b border-slate-100 bg-slate-50/50">
                                            <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-8">
                                                <div className="space-y-5">
                                                    <div className="inline-flex items-center gap-2.5 bg-blue-100 text-blue-700 px-4 py-1.5 rounded-full text-[11px] font-black uppercase">
                                                        <i className="fas fa-microchip"></i> 鑑別工作台
                                                    </div>
                                                    <h2 className="text-4xl font-black text-slate-800 tracking-tight leading-tight">{selectedLaw?.name}</h2>
                                                    <div className="flex gap-6">
                                                        <div className="px-4 py-2 bg-white border border-slate-200 rounded-xl shadow-sm">
                                                            <span className="text-[10px] font-bold text-slate-400 block uppercase mb-1">最新公佈日</span>
                                                            <span className={`text-sm font-black ${checkLawDiff(selectedLaw?.remoteDate, selectedLaw?.localCheckDate) ? 'text-rose-600' : 'text-slate-700'}`}>
                                                                {selectedLaw?.remoteDate}
                                                            </span>
                                                        </div>
                                                        <div className="px-4 py-2 bg-white border border-slate-200 rounded-xl shadow-sm">
                                                            <span className="text-[10px] font-bold text-slate-400 block uppercase mb-1">最近鑑別/登錄日</span>
                                                            <span className="text-sm font-black text-emerald-600">{selectedLaw?.localCheckDate}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex gap-4 action-buttons">
                                                    <button onClick={() => window.print()} className="px-8 py-4 rounded-2xl bg-white border border-slate-200 text-slate-600 font-black text-base transition-all hover:bg-slate-50 active:scale-95">
                                                        <i className="fas fa-print mr-2"></i> 列印報告
                                                    </button>
                                                    <button
                                                        onClick={() => {
                                                            setSyncText('正在重新分析條文異動並更新鑑別紀錄...\n系統正在即時更新大數據資料庫紀錄...');
                                                            handleSingleSync(selectedLaw.id);
                                                            setActiveTab('monitor');
                                                        }}
                                                        className="px-8 py-4 rounded-2xl bg-blue-600 text-white font-black text-base shadow-xl hover:bg-blue-700 transition-all active:scale-95"
                                                    >
                                                        確認鑑別並更新日期
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <div className="p-12 space-y-12 bg-white">
                                            <div className="flex items-center gap-6 p-8 bg-emerald-50 border border-emerald-100 rounded-3xl">
                                                <div className="w-16 h-16 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center shrink-0 shadow-inner">
                                                    <i className="fas fa-check-circle text-3xl"></i>
                                                </div>
                                                <div className="space-y-2">
                                                    <h4 className="text-lg font-black text-emerald-900">自動比對完成</h4>
                                                    <p className="text-emerald-700 font-medium">系統已完成與全國法規資料庫之最新條文比對，下方列出本次異動細節：</p>
                                                </div>
                                            </div>

                                            <div className="overflow-hidden border border-slate-200 rounded-3xl shadow-sm">
                                                <table className="w-full text-left border-collapse">
                                                    <thead>
                                                        <tr className="bg-slate-50 border-b border-slate-200">
                                                            <th className="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-widest w-24 text-center">操作</th>
                                                            <th className="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-widest w-32">條號</th>
                                                            <th className="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-widest">條文比對 (舊版 vs 新版)</th>
                                                            <th className="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-widest w-40">異動屬性</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-100">
                                                        {currentLawData?.rows.map((row, idx) => (
                                                            <tr key={idx} className="hover:bg-slate-50/50 transition-colors">
                                                                <td className="px-8 py-6 text-center">
                                                                    {isAdmin ? (
                                                                        <button 
                                                                            onClick={() => removeDetailRow(selectedLaw.id, idx)}
                                                                            className="w-10 h-10 rounded-xl bg-rose-50 text-rose-500 hover:bg-rose-500 hover:text-white transition-all flex items-center justify-center row-action-btn"
                                                                        >
                                                                            <i className="fas fa-trash-alt"></i>
                                                                        </button>
                                                                    ) : (
                                                                        <span className="font-bold text-slate-400">{idx + 1}</span>
                                                                    )}
                                                                </td>
                                                                <td className="px-8 py-6 font-black text-blue-600">
                                                                    {isAdmin ? (
                                                                        <input className="admin-input" value={row.no} onChange={(e) => updateDetailField(selectedLaw.id, idx, 'no', e.target.value)} />
                                                                    ) : row.no}
                                                                </td>
                                                                <td className="px-8 py-6">
                                                                    <div className="space-y-4">
                                                                        {isAdmin ? (
                                                                            <div className="space-y-2">
                                                                                <textarea 
                                                                                    className="w-full text-slate-400 text-sm bg-slate-50 p-3 rounded-lg border-l-4 border-slate-200 line-through outline-none" 
                                                                                    value={row.old}
                                                                                    onChange={(e) => updateDetailField(selectedLaw.id, idx, 'old', e.target.value)}
                                                                                />
                                                                                <textarea 
                                                                                    className="w-full text-slate-800 text-base font-medium p-3 rounded-lg border-l-4 border-blue-500 bg-blue-50/30 outline-none" 
                                                                                    value={row.new}
                                                                                    onChange={(e) => updateDetailField(selectedLaw.id, idx, 'new', e.target.value)}
                                                                                />
                                                                            </div>
                                                                        ) : (
                                                                            <>
                                                                                <div className="text-slate-400 text-sm bg-slate-50 p-3 rounded-lg border-l-4 border-slate-200 line-through">{row.old}</div>
                                                                                <div className="text-slate-800 text-base font-medium p-3 rounded-lg border-l-4 border-blue-500 bg-blue-50/30" dangerouslySetInnerHTML={{ __html: row.new }}></div>
                                                                            </>
                                                                        )}
                                                                    </div>
                                                                </td>
                                                                <td className="px-8 py-6">
                                                                    {isAdmin ? (
                                                                        <input className="admin-input text-amber-700 font-black" value={row.note} onChange={(e) => updateDetailField(selectedLaw.id, idx, 'note', e.target.value)} />
                                                                    ) : (
                                                                        <span className="px-4 py-1.5 bg-amber-100 text-amber-700 rounded-full text-xs font-black">{row.note}</span>
                                                                    )}
                                                                </td>
                                                            </tr>
                                                        ))}
                                                        {isAdmin && (
                                                            <tr>
                                                                <td colSpan="4" className="p-6">
                                                                    <button 
                                                                        onClick={() => addDetailRow(selectedLaw.id)}
                                                                        className="w-full py-4 border border-dashed border-slate-300 rounded-xl text-slate-400 font-bold hover:bg-slate-50 transition-all"
                                                                    >
                                                                        <i className="fas fa-plus mr-2"></i> 新增異動對照條文
                                                                    </button>
                                                                </td>
                                                            </tr>
                                                        )}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    <footer className="bg-slate-900 border-t border-slate-800 px-10 py-8 text-center space-y-4">
                        <div className="flex flex-col md:flex-row justify-center items-center gap-4 md:gap-8">
                            <p className="text-slate-400 text-xs font-bold tracking-widest uppercase">
                                © 2026 職業安全衛生室｜法規智慧鑑別系統
                            </p>
                            <span className="hidden md:block text-slate-700">|</span>
                            <div className="flex items-center gap-3 bg-slate-800/50 px-5 py-2 rounded-xl border border-slate-700/50 shadow-inner">
                                <div className="w-2 h-2 bg-blue-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(59,130,246,0.6)]"></div>
                                <span className="text-slate-300 text-[10px] font-black tracking-[0.2em] uppercase">
                                    Developed by Sam Sun
                                </span>
                            </div>
                        </div>
                        <div className="text-[9px] text-slate-600 font-bold tracking-[0.3em] uppercase opacity-50">
                            Enterprise Compliance Intelligence Engine
                        </div>
                    </footer>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
