<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職業安全法規鑑別系統</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }
        @keyframes scan {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(100%); opacity: 0; }
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(to right, transparent, #3b82f6, transparent);
            animation: scan 2s linear infinite;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }
        .new-badge {
            animation: blink 1.5s infinite;
        }
        
        .law-card-glow {
            border: 1px solid #e2e8f0;
            background-color: #ffffff;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .law-card-glow:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            border-color: #3b82f6;
        }

        ins { background: #e6ffed; text-decoration: none; border-bottom: 2px solid #059669; font-weight: 500; color: #065f46; padding: 0 2px; }
        del { background: #ffeef0; color: #991b1b; text-decoration: line-through; padding: 0 2px; }

        .admin-input {
            background: transparent;
            border-bottom: 1px dashed #cbd5e1;
            outline: none;
            width: 100%;
            transition: all 0.2s;
        }
        .admin-input:focus {
            border-bottom: 1px solid #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }

        @media print {
            header, footer, .back-nav-btn, .action-buttons, .sidebar-mock, .time-display-box, .admin-controls, .row-action-btn, .db-controls {
                display: none !important;
            }
            body { background-color: white !important; }
            .main-container { padding: 0 !important; margin: 0 !important; width: 100% !important; max-width: none !important; }
            .workbench-card { border: none !important; box-shadow: none !important; padding: 0 !important; }
            .print-header { display: block !important; margin-bottom: 2rem; border-bottom: 2px solid #333; padding-bottom: 1rem; }
            table { width: 100% !important; border-collapse: collapse !important; page-break-inside: auto; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            td, th { border: 1px solid #cbd5e1 !important; padding: 12px !important; }
            @page { size: A4; margin: 1.5cm; }
        }
        .print-header { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const App = () => {
            const UNIFIED_INITIAL_DATE = '2026-03-02';
            const fileInputRef = useRef(null);

            // State 管理
            const [activeTab, setActiveTab] = useState('monitor');
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncText, setSyncText] = useState('正在執行鑑別程序...');
            const [selectedLaw, setSelectedLaw] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [filterType, setFilterType] = useState('全部');
            const [currentTime, setCurrentTime] = useState(new Date());
            
            // 管理員狀態
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [authMode, setAuthMode] = useState('login'); // 'login' or 'changePassword'
            const [passwordInput, setPasswordInput] = useState('');
            const [oldPasswordInput, setOldPasswordInput] = useState('');
            const [newPasswordInput, setNewPasswordInput] = useState('');
            const [loginError, setLoginError] = useState(false);
            const [changeError, setChangeError] = useState('');

            // 密碼管理 (預設改為 1068)
            const [adminPassword, setAdminPassword] = useState(() => {
                return localStorage.getItem('osh_admin_pwd') || '1068';
            });

            // 法規主數據
            const [laws, setLaws] = useState(() => {
                const savedLaws = localStorage.getItem('osh_laws_data');
                if (savedLaws) return JSON.parse(savedLaws);
                
                return [
                    { id: 1, name: '職業安全衛生法', type: '法律', remoteDate: '2025-12-19', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 2, name: '職業安全衛生法施行細則', type: '法規命令', remoteDate: '2020-02-27', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 3, name: '職業安全衛生管理辦法', type: '法規命令', remoteDate: '2022-01-05', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 4, name: '職業安全衛生設施規則', type: '法規命令', remoteDate: '2024-08-01', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 5, name: '職業安全衛生教育訓練規則', type: '法規命令', remoteDate: '2025-09-04', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 6, name: '職業安全衛生標示設置準則', type: '法規命令', remoteDate: '2014-07-02', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 7, name: '勞工作業環境監測實施辦法', type: '法規命令', remoteDate: '2016-11-02', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 8, name: '勞工作業場所容許暴露標準', type: '法規命令', remoteDate: '2025-04-11', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 9, name: '有機溶劑中毒預防規則', type: '法規命令', remoteDate: '2025-05-14', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 10, name: '危害性化學品標示及通識規則', type: '法規命令', remoteDate: '2018-11-09', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 11, name: '勞工健康保護規則', type: '法規命令', remoteDate: '2021-12-22', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 12, name: '女性勞工母性健康保護實施辦法', type: '法規命令', remoteDate: '2024-05-31', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 13, name: '妊娠與分娩後女性及未滿十八歲勞工禁止從事危險性或有害性工作認定標準', type: '行政規則', remoteDate: '2025-11-20', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 14, name: '精密作業勞工視機能保護設施標準', type: '法規命令', remoteDate: '2014-03-30', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 15, name: '工業用機器人危害預防標準', type: '法規命令', remoteDate: '2018-02-14', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 16, name: '鍋爐及壓力容器安全規則', type: '法規命令', remoteDate: '2014-07-01', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 17, name: '游離輻射防護法', type: '法律', remoteDate: '2002-01-30', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 18, name: '游離輻射防護法施行細則', type: '法規命令', remoteDate: '2008-02-22', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 19, name: '游離輻射防護安全標準', type: '法規命令', remoteDate: '2005-12-30', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 20, name: '放射性物質與可發生游離輻射設備及其輻輻射作業管理辦法', type: '法規命令', remoteDate: '2018-12-22', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 21, name: '放射性物質或可發生游離輻射設備操作人員管理辦法', type: '法規命令', remoteDate: '2009-04-17', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 22, name: '事業單位僱用女性勞工夜間工作場所必要之安全衛生設施標準', type: '法規命令', remoteDate: '2015-03-31', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 23, name: '機械設備器具安全標準', type: '法規命令', remoteDate: '2022-05-11', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 24, name: '勞動基準法', type: '法律', remoteDate: '2024-07-31', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 25, name: '勞工職業災害保險及保護法', type: '法律', remoteDate: '2021-04-30', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 26, name: '勞工職業災害保險及保護法施行細則', type: '法規命令', remoteDate: '2025-05-29', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 27, name: '勞工職業災害保險及保護法第十條規定參加保險辦法', type: '法規命令', remoteDate: '2022-03-09', localCheckDate: UNIFIED_INITIAL_DATE },
                    { id: 28, name: '缺氧症預防規則', type: '法規命令', remoteDate: '2014-06-26', localCheckDate: UNIFIED_INITIAL_DATE }
                ];
            });

            // 詳細條文資料庫
            const [lawDetails, setLawDetails] = useState(() => {
                const savedDetails = localStorage.getItem('osh_law_details_data');
                if (savedDetails) return JSON.parse(savedDetails);
                
                const initialDetails = {
                    1: { rows: [{ no: '第 4 條', old: '本法適用於各業。但因事業規模、性質及風險程度...', new: '本法適用於各業。但因事業規模、性質及風險程度，經中央主管機關指定公告者，<ins>得分階段適用</ins>。', note: '擴大適用範圍' }, { no: '第 45 條', old: '有下列情事之一者，處新臺幣三萬元以上十五萬元以下罰鍰...', new: '有下列情事之一者，處新臺幣三萬元以上<ins>三十萬元</ins>以下罰鍰...', note: '罰則加重' }] },
                    4: { rows: [{ no: '第 21 條', old: '雇主對於勞工從事作業，應採取必要之安全設備及措施。', new: '雇主對於勞工從事作業，應採取必要之安全設備及措施，<ins>並應落實自動檢查計畫</ins>。', note: '加強自主管理' }, { no: '第 128-1 條', old: '(新增條文)', new: '<ins>雇主對於高溫環境作業勞工，應提供必要之散熱設備及足夠之飲用水。</ins>', note: '新增熱危害預防' }] },
                    8: { rows: [{ no: '附表一', old: '甲苯容許濃度：100 ppm', new: '甲苯容許濃度：<ins>50 ppm</ins>', note: '標準趨嚴' }, { no: '附表一', old: '二甲苯容許濃度：100 ppm', new: '二甲苯容許濃度：<ins>80 ppm</ins>', note: '標準趨嚴' }] },
                    24: { rows: [{ no: '第 32-1 條', old: '雇主依第三十二條第一項及第二項規定使勞工延長工作時間...', new: '雇主依第三十二條第一項及第二項規定使勞工延長工作時間，<ins>應核實記載至分鐘為止</ins>。', note: '工時記載精細化' }] }
                };
                return initialDetails;
            });

            useEffect(() => {
                localStorage.setItem('osh_laws_data', JSON.stringify(laws));
                localStorage.setItem('osh_law_details_data', JSON.stringify(lawDetails));
                localStorage.setItem('osh_admin_pwd', adminPassword);
            }, [laws, lawDetails, adminPassword]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // 輔助函式
            const formatTime = (date) => {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                const hh = String(date.getHours()).padStart(2, '0');
                const mm = String(date.getMinutes()).padStart(2, '0');
                const ss = String(date.getSeconds()).padStart(2, '0');
                return `${y}/${m}/${d} ${hh}:${mm}:${ss}`;
            };

            const getLawStatus = (remoteDate, localDate) => {
                const rDate = new Date(remoteDate);
                const lDate = localDate ? new Date(localDate) : new Date(0);
                const today = new Date();
                if (rDate > lDate) return { code: 'danger', color: 'bg-rose-500', text: '需重新鑑別' };
                if ((today - lDate) / (1000 * 60 * 60 * 24) > 365) return { code: 'warning', color: 'bg-amber-500', text: '例行性檢視' };
                return { code: 'success', color: 'bg-emerald-600', text: '鑑別完成' };
            };

            const exportDatabase = () => {
                const dataStr = JSON.stringify({ laws, lawDetails }, null, 2);
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                const exportFileDefaultName = `OSH_Regulation_DB_${new Date().toISOString().split('T')[0]}.json`;
                const linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', exportFileDefaultName);
                linkElement.click();
            };

            const importDatabase = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        if (importedData.laws && importedData.lawDetails) {
                            if (confirm('導入數據庫將覆蓋目前所有紀錄，確定要繼續嗎？')) {
                                setLaws(importedData.laws);
                                setLawDetails(importedData.lawDetails);
                                alert('數據庫導入成功！');
                            }
                        } else {
                            alert('無效的數據庫檔案格式。');
                        }
                    } catch (err) {
                        alert('檔案解析失敗：' + err.message);
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            // 管理員行為
            const handleLogin = () => {
                if (passwordInput === adminPassword) {
                    setIsAdmin(true);
                    setShowLoginModal(false);
                    setPasswordInput('');
                    setLoginError(false);
                } else {
                    setLoginError(true);
                }
            };

            const handleChangePassword = () => {
                if (oldPasswordInput !== adminPassword) {
                    setChangeError('舊密碼不正確');
                    return;
                }
                if (newPasswordInput.length < 4) {
                    setChangeError('新密碼長度至少需 4 碼');
                    return;
                }
                setAdminPassword(newPasswordInput);
                setAuthMode('login');
                setOldPasswordInput('');
                setNewPasswordInput('');
                setChangeError('');
                alert('密碼修改成功，請重新登入。');
            };

            const handleLogout = () => {
                setIsAdmin(false);
                setActiveTab('monitor');
            };

            const addNewLaw = () => {
                const newId = Math.max(...laws.map(l => l.id), 0) + 1;
                setLaws([...laws, { id: newId, name: '新法規名稱', type: '法規命令', remoteDate: '2026-03-01', localCheckDate: '2026-03-01' }]);
            };

            const removeLaw = (id) => {
                if(confirm('確定要移除此法規監測項目嗎？相關鑑別紀錄也會消失。')) {
                    setLaws(prev => prev.filter(law => law.id !== id));
                }
            };

            const updateLawField = (id, field, value) => {
                setLaws(prev => prev.map(law => law.id === id ? { ...law, [field]: value } : law));
            };

            const updateDetailField = (lawId, rowIndex, field, value) => {
                setLawDetails(prev => {
                    const current = prev[lawId] || { rows: [] };
                    const newRows = [...current.rows];
                    if (!newRows[rowIndex]) {
                        newRows[rowIndex] = { no: '', old: '', new: '', note: '' };
                    }
                    newRows[rowIndex] = { ...newRows[rowIndex], [field]: value };
                    return { ...prev, [lawId]: { rows: newRows } };
                });
            };

            const removeDetailRow = (lawId, rowIndex) => {
                setLawDetails(prev => {
                    const current = prev[lawId] || { rows: [] };
                    const newRows = current.rows.filter((_, idx) => idx !== rowIndex);
                    return { ...prev, [lawId]: { rows: newRows } };
                });
            };

            const addDetailRow = (lawId) => {
                setLawDetails(prev => {
                    const current = prev[lawId] || { rows: [] };
                    return { ...prev, [lawId]: { rows: [...current.rows, { no: '新條號', old: '舊條文內容', new: '新條文內容', note: '異動類型' }] } };
                });
            };

            const handleAllSync = () => {
                setSyncText('正在批次執行全法規鑑別同步，請稍候...');
                setIsSyncing(true);
                setTimeout(() => {
                    const today = new Date().toISOString().split('T')[0];
                    setLaws(prev => prev.map(law => ({ ...law, localCheckDate: today })));
                    setIsSyncing(false);
                }, 5000); 
            };

            const handleSingleSync = (lawId) => {
                setSyncText('正在重新分析條文異動並更新鑑別紀錄...');
                setIsSyncing(true);
                setTimeout(() => {
                    const today = new Date().toISOString().split('T')[0];
                    setLaws(prev => prev.map(law => law.id === lawId ? { ...law, localCheckDate: today } : law));
                    setIsSyncing(false);
                }, 2500);
            };

            const handleExport = () => {
                const now = new Date();
                const quarter = Math.ceil((now.getMonth() + 1) / 3);
                const exportData = laws.map((law, index) => {
                    const status = getLawStatus(law.remoteDate, law.localCheckDate);
                    return {
                        "序號": index + 1,
                        "法規名稱": law.name,
                        "法規類別": law.type,
                        "鑑別季度": `${now.getFullYear()} Q${quarter}`,
                        "全國法規資料庫日期": law.remoteDate,
                        "最近鑑別/登錄日": law.localCheckDate,
                        "合規狀態": status.text
                    };
                });
                const worksheet = XLSX.utils.json_to_sheet(exportData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "法規鑑別總表");
                XLSX.writeFile(workbook, `職安法規鑑別總表_${now.getFullYear()}_Q${quarter}.xlsx`);
            };

            const filteredLaws = useMemo(() => {
                return laws.filter(law => (filterType === '全部' || law.type === filterType) && law.name.includes(searchQuery));
            }, [searchQuery, filterType, laws]);

            const startSync = (law) => {
                setSyncText(`正在連線資料庫讀取《${law.name}》最新條文...`);
                setIsSyncing(true);
                setTimeout(() => {
                    setSelectedLaw(law);
                    setActiveTab('compare');
                    setIsSyncing(false);
                }, 1500);
            };

            const currentLawData = useMemo(() => {
                if (!selectedLaw) return null;
                return lawDetails[selectedLaw.id] || { rows: [] };
            }, [selectedLaw, lawDetails]);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Login & Change Password Modal */}
                    {showLoginModal && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/80 backdrop-blur-sm p-4">
                            <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-200 fade-in">
                                {authMode === 'login' ? (
                                    <>
                                        <div className="text-center mb-8">
                                            <div className="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 mx-auto mb-4">
                                                <i className="fas fa-user-shield text-3xl"></i>
                                            </div>
                                            <h3 className="text-2xl font-black text-slate-800">管理員身份驗證</h3>
                                            <p className="text-slate-500 text-sm mt-2">請輸入存取密碼以啟動編輯模式</p>
                                        </div>
                                        <div className="space-y-4">
                                            <input 
                                                type="password" 
                                                className={`w-full px-6 py-4 bg-slate-50 border ${loginError ? 'border-rose-400' : 'border-slate-200'} rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10 transition-all text-center text-xl tracking-[0.5em]`}
                                                placeholder="••••"
                                                value={passwordInput}
                                                onChange={(e) => setPasswordInput(e.target.value)}
                                                onKeyDown={(e) => e.key === 'Enter' && handleLogin()}
                                                autoFocus
                                            />
                                            {loginError && <p className="text-rose-500 text-xs font-bold text-center">密碼錯誤，請重新輸入</p>}
                                            <button 
                                                onClick={handleLogin}
                                                className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black shadow-xl shadow-blue-600/20 hover:bg-blue-700 active:scale-[0.98] transition-all"
                                            >
                                                啟動編輯模式
                                            </button>
                                            <div className="flex justify-between px-2">
                                                <button 
                                                    onClick={() => setAuthMode('changePassword')}
                                                    className="text-xs text-blue-600 font-bold hover:underline"
                                                >
                                                    修改登入密碼
                                                </button>
                                                <button 
                                                    onClick={() => setShowLoginModal(false)}
                                                    className="text-xs text-slate-400 font-bold hover:text-slate-600 transition-all"
                                                >
                                                    取消
                                                </button>
                                            </div>
