<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職業安全法規鑑別系統 - 模擬異常展示版</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }
        @keyframes scan {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(100%); opacity: 0; }
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(to right, transparent, #3b82f6, transparent);
            animation: scan 2s linear infinite;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }
        .new-badge {
            animation: blink 1.5s infinite;
        }
        
        .law-card-glow {
            border: 1px solid #e2e8f0;
            background-color: #ffffff;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .law-card-glow:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            border-color: #3b82f6;
        }

        ins { background: #e6ffed; text-decoration: none; border-bottom: 2px solid #059669; font-weight: 500; color: #065f46; padding: 0 2px; }
        del { background: #ffeef0; color: #991b1b; text-decoration: line-through; padding: 0 2px; }

        .admin-input {
            background: transparent;
            border-bottom: 1px dashed #cbd5e1;
            outline: none;
            width: 100%;
            transition: all 0.2s;
        }
        .admin-input:focus {
            border-bottom: 1px solid #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }

        @media print {
            header, footer, .back-nav-btn, .action-buttons, .sidebar-mock, .time-display-box, .admin-controls, .row-action-btn, .db-controls {
                display: none !important;
            }
            body { background-color: white !important; }
            .main-container { padding: 0 !important; margin: 0 !important; width: 100% !important; max-width: none !important; }
            .workbench-card { border: none !important; box-shadow: none !important; padding: 0 !important; }
            .print-header { display: block !important; margin-bottom: 2rem; border-bottom: 2px solid #333; padding-bottom: 1rem; }
            table { width: 100% !important; border-collapse: collapse !important; page-break-inside: auto; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            td, th { border: 1px solid #cbd5e1 !important; padding: 12px !important; }
            @page { size: A4; margin: 1.5cm; }
        }
        .print-header { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- IndexedDB 核心邏輯 ---
        const DB_NAME = 'OSH_Regulation_Demo';
        const DB_VERSION = 1;

        const openDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('laws')) {
                        db.createObjectStore('laws', { keyPath: 'id' });
                    }
                    if (!db.objectStoreNames.contains('details')) {
                        db.createObjectStore('details', { keyPath: 'lawId' });
                    }
                    if (!db.objectStoreNames.contains('config')) {
                        db.createObjectStore('config', { keyPath: 'key' });
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        };

        const saveData = async (storeName, data) => {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                if (Array.isArray(data)) {
                    store.clear();
                    data.forEach(item => store.put(item));
                } else if (storeName === 'details') {
                    Object.keys(data).forEach(id => {
                        store.put({ lawId: parseInt(id), ...data[id] });
                    });
                } else {
                    store.put(data);
                }
                tx.oncomplete = () => resolve();
                tx.onerror = (e) => reject(e.target.error);
            });
        };

        const getAllData = async (storeName) => {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readonly');
                const store = tx.objectStore(storeName);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = (e) => reject(e.target.error);
            });
        };

        const App = () => {
            const UNIFIED_INITIAL_DATE = '2026-03-02';
            const [isLoaded, setIsLoaded] = useState(false);

            // State 管理
            const [activeTab, setActiveTab] = useState('monitor');
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncText, setSyncText] = useState('正在執行鑑別程序...');
            const [selectedLaw, setSelectedLaw] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [filterType, setFilterType] = useState('全部');
            const [currentTime, setCurrentTime] = useState(new Date());
            
            // 管理員狀態
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [authMode, setAuthMode] = useState('login'); 
            const [passwordInput, setPasswordInput] = useState('');
            const [oldPasswordInput, setOldPasswordInput] = useState('');
            const [newPasswordInput, setNewPasswordInput] = useState('');
            const [loginError, setLoginError] = useState(false);
            const [changeError, setChangeError] = useState('');

            // 數據狀態
            const [adminPassword, setAdminPassword] = useState('1068');
            const [laws, setLaws] = useState([]);
            const [lawDetails, setLawDetails] = useState({});

            // 預設法規清單
            const defaultLaws = [
                { id: 1, pcode: 'N0060001', name: '職業安全衛生法', type: '法律', remoteDate: UNIFIED_INITIAL_DATE, localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 2, pcode: 'N0060002', name: '職業安全衛生法施行細則', type: '法規命令', remoteDate: '2020-02-27', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 3, pcode: 'N0060027', name: '職業安全衛生管理辦法', type: '法規命令', remoteDate: '2022-01-05', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 4, pcode: 'N0060009', name: '職業安全衛生設施規則', type: '法規命令', remoteDate: UNIFIED_INITIAL_DATE, localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 5, pcode: 'N0060010', name: '職業安全衛生教育訓練規則', type: '法規命令', remoteDate: '2025-09-04', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 6, pcode: 'N0060023', name: '職業安全衛生標示設置準則', type: '法規命令', remoteDate: '2014-07-02', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 7, pcode: 'N0060033', name: '勞工作業環境監測實施辦法', type: '法規命令', remoteDate: '2016-11-02', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 8, pcode: 'N0060004', name: '勞工作業場所容許暴露標準', type: '法規命令', remoteDate: UNIFIED_INITIAL_DATE, localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 9, pcode: 'N0060017', name: '有機溶劑中毒預防規則', type: '法規命令', remoteDate: '2025-05-14', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 10, pcode: 'N0060054', name: '危害性化學品標示及通識規則', type: '法規命令', remoteDate: '2018-11-09', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 11, pcode: 'N0060022', name: '勞工健康保護規則', type: '法規命令', remoteDate: '2021-12-22', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 12, pcode: 'N0060065', name: '女性勞工母性健康保護實施辦法', type: '法規命令', remoteDate: '2024-05-31', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 13, pcode: 'N0060032', name: '妊娠與分娩後女性及未滿十八歲勞工禁止從事危險性或有害性工作認定標準', type: '行政規則', remoteDate: '2025-11-20', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 14, pcode: 'N0060012', name: '精密作業勞工視機能保護設施標準', type: '法規命令', remoteDate: '2014-03-30', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 15, pcode: 'N0060025', name: '工業用機器人危害預防標準', type: '法規命令', remoteDate: '2018-02-14', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 16, pcode: 'N0060011', name: '鍋爐及壓力容器安全規則', type: '法規命令', remoteDate: '2014-07-01', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 17, pcode: 'J0160009', name: '游離輻射防護法', type: '法律', remoteDate: '2002-01-30', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 18, pcode: 'J0160022', name: '游離輻射防護施行細則', type: '法規命令', remoteDate: '2008-02-22', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 19, pcode: 'J0160004', name: '游離輻射防護安全標準', type: '法規命令', remoteDate: '2005-12-30', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 20, pcode: 'J0160025', name: '放射性物質與可發生游離輻射設備及其輻輻射作業管理辦法', type: '法規命令', remoteDate: '2018-12-22', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 21, pcode: 'J0160042', name: '放射性物質或可發生游離輻射設備操作人員管理辦法', type: '法規命令', remoteDate: '2009-04-17', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 22, pcode: 'N0030011', name: '事業單位僱用女性勞工夜間工作場所必要之安全衛生設施標準', type: '法規命令', remoteDate: '2015-03-31', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 23, pcode: 'N0060034', name: '機械設備器具安全標準', type: '法規命令', remoteDate: '2022-05-11', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 24, pcode: 'N0030001', name: '勞動基準法', type: '法律', remoteDate: '2024-07-31', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 25, pcode: 'N0050031', name: '勞工職業災害保險及保護法', type: '法律', remoteDate: '2021-04-30', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 26, pcode: 'N0050039', name: '勞工職業災害保險及保護法施行細則', type: '法規命令', remoteDate: '2025-05-29', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 27, pcode: 'N0050035', name: '勞工職業災害保險及保護法第十條規定參加保險辦法', type: '法規命令', remoteDate: '2022-03-09', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 28, pcode: 'N0060020', name: '缺氧症預防規則', type: '法規命令', remoteDate: '2014-06-26', localCheckDate: UNIFIED_INITIAL_DATE }
            ];

            // 預設法規詳情
            const defaultDetails = {
                1: { rows: [{ no: '第 4 條', old: '本法適用於各業。但因事業規模、性質及風險程度...', new: '本法適用於各業。但因事業規模、性質及風險程度，經中央主管機關指定公告者，<ins>得分階段適用</ins>。', note: '擴大適用範圍' }, { no: '第 4 條', old: '有下列情事之一者，處新臺幣三萬元以上十五萬元以下罰鍰...', new: '有下列情事之一者，處新臺幣三萬元以上<ins>三十萬元</ins>以下罰鍰...', note: '罰則加重' }] },
                4: { rows: [{ no: '第 21 條', old: '雇主對於勞工從事作業，應採取必要之安全設備及措施。', new: '雇主對於勞工從事作業，應採取必要之安全設備及措施，<ins>並應落實自動檢查計畫</ins>。', note: '加強自主管理' }, { no: '第 128-1 條', old: '(新增條文)', new: '<ins>雇主對於高溫環境作業勞工，應提供必要之散熱設備及足夠之飲用水。</ins>', note: '新增熱危害預防' }] },
                8: { rows: [{ no: '附表一', old: '甲苯容許濃度：100 ppm', new: '甲苯容許濃度：<ins>50 ppm</ins>', note: '標準趨嚴' }, { no: '附表一', old: '二甲苯容許濃度：100 ppm', new: '二甲苯容許濃度：<ins>80 ppm</ins>', note: '標準趨嚴' }] },
                24: { rows: [{ no: '第 32-1 條', old: '雇主依第三十二條第一項及第二項規定使勞工延長工作時間...', new: '雇主依第三十二條第一項及第二項規定使勞工延長工作時間，<ins>應核實記載至分鐘為止</ins>。', note: '工時記載精細化' }] }
            };

            // 初始化：從 IndexedDB 載入數據
            useEffect(() => {
                const initData = async () => {
                    try {
                        const dbLaws = await getAllData('laws');
                        const dbDetailsArray = await getAllData('details');
                        const dbConfigs = await getAllData('config');

                        const pwdConfig = dbConfigs.find(c => c.key === 'osh_admin_pwd');
                        if (pwdConfig) setAdminPassword(pwdConfig.value);

                        if (dbLaws.length > 0) {
                            setLaws(dbLaws);
                        } else {
                            setLaws(defaultLaws);
                            await saveData('laws', defaultLaws);
                        }

                        if (dbDetailsArray.length > 0) {
                            const detailsObj = {};
                            dbDetailsArray.forEach(item => {
                                detailsObj[item.lawId] = { rows: item.rows };
                            });
                            setLawDetails(detailsObj);
                        } else {
                            setLawDetails(defaultDetails);
                            await saveData('details', defaultDetails);
                        }
                        setIsLoaded(true);
                    } catch (err) {
                        console.error('Database Init Failed:', err);
                        setIsLoaded(true);
                    }
                };
                initData();
            }, []);

            // 持續保存變更
            useEffect(() => {
                if (isLoaded) {
                    saveData('laws', laws);
                }
            }, [laws, isLoaded]);

            useEffect(() => {
                if (isLoaded) {
                    saveData('details', lawDetails);
                }
            }, [lawDetails, isLoaded]);

            useEffect(() => {
                if (isLoaded) {
                    saveData('config', { key: 'osh_admin_pwd', value: adminPassword });
                }
            }, [adminPassword, isLoaded]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const formatTime = (date) => {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                const hh = String(date.getHours()).padStart(2, '0');
                const mm = String(date.getMinutes()).padStart(2, '0');
                const ss = String(date.getSeconds()).padStart(2, '0');
                return `${y}/${m}/${d} ${hh}:${mm}:${ss}`;
            };

            const checkLawDiff = (remoteDate, localDate) => {
                const rDate = new Date(remoteDate);
                const lDate = localDate ? new Date(localDate) : new Date(0);
                return rDate > lDate;
            };

            // 重製系統功能
            const handleResetSystem = async () => {
                if (confirm('確定要執行「重製系統」嗎？這將會清除所有自定義修改，並將法規數據恢復到初始展示狀態。')) {
                    setIsSyncing(true);
                    setSyncText('正在重製系統環境與清除快取數據...');
                    
                    try {
                        const db = await openDB();
                        const tx = db.transaction(['laws', 'details', 'config'], 'readwrite');
                        tx.objectStore('laws').clear();
                        tx.objectStore('details').clear();
                        tx.objectStore('config').clear();

                        setTimeout(async () => {
                            setLaws(defaultLaws);
                            setLawDetails(defaultDetails);
                            setAdminPassword('1068');
                            setIsAdmin(false);
                            setActiveTab('monitor');
                            
                            await saveData('laws', defaultLaws);
                            await saveData('details', defaultDetails);
                            await saveData('config', { key: 'osh_admin_pwd', value: '1068' });
                            
                            setIsSyncing(false);
                            alert('系統已恢復至初始狀態。');
                        }, 2000);
                    } catch (err) {
                        console.error('Reset failed:', err);
                        setIsSyncing(false);
                    }
                }
            };

            const triggerVariation = (targetId = null) => {
                const variationMap = {
                    1: '2026-03-15',
                    4: '2026-04-10',
                    8: '2026-03-20'
                };

                setLaws(prev => prev.map(law => {
                    if (targetId !== null) {
                        if (law.id === targetId && variationMap[law.id]) {
                            return { ...law, remoteDate: variationMap[law.id] };
                        }
                    } else {
                        if (variationMap[law.id]) {
                            return { ...law, remoteDate: variationMap[law.id] };
                        }
                    }
                    return law;
                }));
            };

            const handleAllSync = () => {
                setSyncText('正在批次執行全法規鑑別同步，請稍候...');
                setIsSyncing(true);
                setTimeout(() => {
                    triggerVariation();
                    setIsSyncing(false);
                }, 4000);
            };

            const handleSingleSync = (lawId) => {
                const law = laws.find(l => l.id === lawId);
                setSyncText(`正在連線《${law.name}》並執行即時校對...`);
                setIsSyncing(true);
                setTimeout(() => {
                    triggerVariation(lawId);
                    setIsSyncing(false);
                }, 2500);
            };

            const handleLogin = () => {
                if (passwordInput === adminPassword) {
                    setIsAdmin(true);
                    setShowLoginModal(false);
                    setPasswordInput('');
                    setLoginError(false);
                } else {
                    setLoginError(true);
                }
            };

            const handleChangePassword = () => {
                if (oldPasswordInput !== adminPassword) {
                    setChangeError('舊密碼不正確');
                    return;
                }
                if (newPasswordInput.length < 4) {
                    setChangeError('新密碼長度至少需 4 碼');
                    return;
                }
                setAdminPassword(newPasswordInput);
                setAuthMode('login');
                setOldPasswordInput('');
                setNewPasswordInput('');
                setChangeError('');
                alert('密碼修改成功，請重新登入。');
            };

            const handleLogout = () => {
                setIsAdmin(false);
                setActiveTab('monitor');
            };

            const addNewLaw = () => {
                const newId = Math.max(...laws.map(l => l.id), 0) + 1;
                setLaws([...laws, { id: newId, pcode: 'NEW_CODE', name: '新法規名稱', type: '法規命令', remoteDate: UNIFIED_INITIAL_DATE, localCheckDate: UNIFIED_INITIAL_DATE }]);
            };

            const removeLaw = (id) => {
                if(confirm('確定要移除此法規監測項目嗎？相關鑑別紀錄也會消失。')) {
                    setLaws(prev => prev.filter(law => law.id !== id));
                    setLawDetails(prev => {
                        const next = {...prev};
                        delete next[id];
                        return next;
                    });
                }
            };

            const updateLawField = (id, field, value) => {
                setLaws(prev => prev.map(law => law.id === id ? { ...law, [field]: value } : law));
            };

            const moveLaw = (index, direction) => {
                const newLaws = [...laws];
                const targetIndex = index + direction;
                if (targetIndex < 0 || targetIndex >= newLaws.length) return;
                const temp = newLaws[index];
                newLaws[index] = newLaws[targetIndex];
                newLaws[targetIndex] = temp;
                setLaws(newLaws);
            };

            const updateDetailField = (lawId, rowIndex, field, value) => {
                setLawDetails(prev => {
                    const current = prev[lawId] || { rows: [] };
                    const newRows = [...current.rows];
                    if (!newRows[rowIndex]) {
                        newRows[rowIndex] = { no: '', old: '', new: '', note: '' };
                    }
                    newRows[rowIndex] = { ...newRows[rowIndex], [field]: value };
                    return { ...prev, [lawId]: { rows: newRows } };
                });
            };

            const removeDetailRow = (lawId, rowIndex) => {
                setLawDetails(prev => {
                    const current = prev[lawId] || { rows: [] };
                    const newRows = current.rows.filter((_, idx) => idx !== rowIndex);
                    return { ...prev, [lawId]: { rows: newRows } };
                });
            };

            const addDetailRow = (lawId) => {
                setLawDetails(prev => {
                    const current = prev[lawId] || { rows: [] };
                    return { ...prev, [lawId]: { rows: [...current.rows, { no: '新條號', old: '舊條文內容', new: '新條文內容', note: '異動類型' }] } };
                });
            };

            const handleExport = () => {
                const now = new Date();
                const quarter = Math.ceil((now.getMonth() + 1) / 3);
                const exportData = laws.map((law, index) => {
                    const isDiff = checkLawDiff(law.remoteDate, law.localCheckDate);
                    return {
                        "序號": index + 1,

                                                            <span className="text-[10px] font-bold text-slate-400 block uppercase mb-1">最新公佈日</span>

                                                                <input className={`text-sm font-black admin-input ${
                                                                    checkLawDiff(selectedLaw?.remoteDate, selectedLaw?.localCheckDate) && 
                                                                    ['職業安全衛生法', '職業安全衛生設施規則', '勞工作業場所容許暴露標準'].includes(selectedLaw?.name) 
                                                                    ? 'text-red-600' : 'text-slate-700'
                                                                }`} value={selectedLaw?.remoteDate} onChange={(e) => {
                                                                    updateLawField(selectedLaw.id, 'remoteDate', e.target.value);
                                                                    setSelectedLaw(prev => ({ ...prev, remoteDate: e.target.value }));
                                                                }} />
                                                            ) : (
                                                                <span className={`text-sm font-black ${
                                                                    checkLawDiff(selectedLaw?.remoteDate, selectedLaw?.localCheckDate) && 
                                                                    ['職業安全衛生法', '職業安全衛生設施規則', '勞工作業場所容許暴露標準'].includes(selectedLaw?.name) 
                                                                    ? 'text-red-600' : 'text-slate-700'
                                                                }`}>{selectedLaw?.remoteDate}</span>
                                                            )}
                                                        </div>
                                                        <div className="px-4 py-2 bg-white border border-slate-200 rounded-xl shadow-sm">
                                                            <span className="text-[10px] font-bold text-slate-400 block uppercase mb-1">最近鑑別/登錄日</span>
                                                            {isAdmin ? (
                                                                <input className="text-sm font-black text-emerald-600 admin-input" value={selectedLaw?.localCheckDate} onChange={(e) => {
                                                                    updateLawField(selectedLaw.id, 'localCheckDate', e.target.value);
                                                                    setSelectedLaw(prev => ({ ...prev, localCheckDate: e.target.value }));
                                                                }} />
                                                            ) : (
                                                                <span className="text-sm font-black text-emerald-600">{selectedLaw?.localCheckDate}</span>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex gap-4 action-buttons">
                                                    <button onClick={() => window.print()} className="px-8 py-4 rounded-2xl bg-white border border-slate-200 text-slate-600 font-black text-base transition-all hover:bg-slate-50 active:scale-95"><i className="fas fa-print mr-2"></i> 列印報告</button>
                                                    <button
                                                        onClick={() => {
                                                            setLaws(prev => prev.map(l => l.id === selectedLaw.id ? { ...l, localCheckDate: new Date().toISOString().split('T')[0], remoteDate: l.remoteDate } : l));
                                                            setActiveTab('monitor');
                                                        }}
                                                        className="px-8 py-4 rounded-2xl bg-blue-600 text-white font-black text-base shadow-xl hover:bg-blue-700 transition-all active:scale-95"
                                                    >
                                                        確認鑑別並更新日期
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <div className="p-12 space-y-12 bg-white">
                                            <div className="flex items-center gap-6 p-8 bg-emerald-50 border border-emerald-100 rounded-3xl">
                                                <div className="w-16 h-16 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center shrink-0 shadow-inner">
                                                    <i className="fas fa-check-circle text-3xl"></i>
                                                </div>
                                                <div className="space-y-2">
                                                    <h4 className="text-lg font-black text-emerald-900">自動比對完成</h4>
                                                    <p className="text-emerald-700 font-medium">系統已完成與全國法規資料庫之最新條文比對，下方列出本次異動細節：</p>
                                                </div>
                                            </div>

                                            <div className="overflow-hidden border border-slate-200 rounded-3xl shadow-sm">
                                                <table className="w-full text-left border-collapse">
                                                    <thead>
                                                        <tr className="bg-slate-50 border-b border-slate-200">
                                                            <th className="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-widest w-24 text-center">操作</th>
                                                            <th className="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-widest w-32">條號</th>
                                                            <th className="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-widest">條文比對 (舊版 vs 新版)</th>
                                                            <th className="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-widest w-40">異動屬性</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-100">
                                                        {currentLawData?.rows.map((row, idx) => (
                                                            <tr key={idx} className="hover:bg-slate-50/50 transition-colors">
                                                                <td className="px-8 py-6 text-center">
                                                                    {isAdmin ? (
                                                                        <button onClick={() => removeDetailRow(selectedLaw.id, idx)} className="w-10 h-10 rounded-xl bg-rose-50 text-rose-500 hover:bg-rose-500 hover:text-white transition-all flex items-center justify-center row-action-btn"><i className="fas fa-trash-alt"></i></button>
                                                                    ) : (<span className="font-bold text-slate-400">{idx + 1}</span>)}
                                                                </td>
                                                                <td className="px-8 py-6 font-black text-blue-600">
                                                                    {isAdmin ? (<input className="admin-input" value={row.no} onChange={(e) => updateDetailField(selectedLaw.id, idx, 'no', e.target.value)} />) : row.no}
                                                                </td>
                                                                <td className="px-8 py-6">
                                                                    <div className="space-y-4">
                                                                        {isAdmin ? (
                                                                            <div className="space-y-2">
                                                                                <textarea className="w-full text-slate-400 text-sm bg-slate-50 p-3 rounded-lg border-l-4 border-slate-200 line-through outline-none" value={row.old} onChange={(e) => updateDetailField(selectedLaw.id, idx, 'old', e.target.value)} />
                                                                                <textarea className="w-full text-slate-800 text-base font-medium p-3 rounded-lg border-l-4 border-blue-500 bg-blue-50/30 outline-none" value={row.new} onChange={(e) => updateDetailField(selectedLaw.id, idx, 'new', e.target.value)} />
                                                                            </div>
                                                                        ) : (
                                                                            <>
                                                                                <div className="text-slate-400 text-sm bg-slate-50 p-3 rounded-lg border-l-4 border-slate-200 line-through">{row.old}</div>
                                                                                <div className="text-slate-800 text-base font-medium p-3 rounded-lg border-l-4 border-blue-500 bg-blue-50/30" dangerouslySetInnerHTML={{ __html: row.new }}></div>
                                                                            </>
                                                                        )}
                                                                    </div>
                                                                </td>
                                                                <td className="px-8 py-6">
                                                                    {isAdmin ? (<input className="admin-input text-amber-700 font-black" value={row.note} onChange={(e) => updateDetailField(selectedLaw.id, idx, 'note', e.target.value)} />) : (<span className="px-4 py-1.5 bg-amber-100 text-amber-700 rounded-full text-xs font-black">{row.note}</span>)}
                                                                </td>
                                                            </tr>
                                                        ))}
                                                        {isAdmin && (
                                                            <tr>
                                                                <td colSpan="4" className="p-6">
                                                                    <button onClick={() => addDetailRow(selectedLaw.id)} className="w-full py-4 border border-dashed border-slate-300 rounded-xl text-slate-400 font-bold hover:bg-slate-50 transition-all"><i className="fas fa-plus mr-2"></i> 新增異動對照條文</button>
                                                                </td>
                                                            </tr>
                                                        )}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    <footer className="bg-slate-900 border-t border-slate-800 px-10 py-8 text-center space-y-4">
                        <div className="flex flex-col md:flex-row justify-center items-center gap-4 md:gap-8">
                            <p className="text-slate-400 text-xs font-bold tracking-widest uppercase">© 2026 職業安全衛生室｜法規智慧鑑別系統</p>
                            <span className="hidden md:block text-slate-700">|</span>
                            <div className="flex items-center gap-3 bg-slate-800/50 px-5 py-2 rounded-xl border border-slate-700/50 shadow-inner">
                                <div className="w-2 h-2 bg-blue-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(59,130,246,0.6)]"></div>
                                <span className="text-slate-300 text-[10px] font-black tracking-[0.2em] uppercase">Developed by Sam Sun</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
