<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職業安全法規鑑別系統 - 模擬異常展示版</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }
        @keyframes scan {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(100%); opacity: 0; }
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(to right, transparent, #3b82f6, transparent);
            animation: scan 2s linear infinite;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }
        .new-badge {
            animation: blink 1.5s infinite;
        }
        
        .law-card-glow {
            border: 1px solid #e2e8f0;
            background-color: #ffffff;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .law-card-glow:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            border-color: #3b82f6;
        }

        ins { background: #e6ffed; text-decoration: none; border-bottom: 2px solid #059669; font-weight: 500; color: #065f46; padding: 0 2px; }
        del { background: #ffeef0; color: #991b1b; text-decoration: line-through; padding: 0 2px; }

        @media print {
            header, footer, .back-nav-btn, .action-buttons, .sidebar-mock, .time-display-box {
                display: none !important;
            }
            body { background-color: white !important; }
            .main-container { padding: 0 !important; margin: 0 !important; width: 100% !important; max-width: none !important; }
            .workbench-card { border: none !important; box-shadow: none !important; padding: 0 !important; }
            .print-header { display: block !important; margin-bottom: 2rem; border-bottom: 2px solid #333; padding-bottom: 1rem; }
            table { width: 100% !important; border-collapse: collapse !important; page-break-inside: auto; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            td, th { border: 1px solid #cbd5e1 !important; padding: 12px !important; }
            @page { size: A4; margin: 1.5cm; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const UNIFIED_INITIAL_DATE = '2026-03-02';

        // 模擬正確更新日期的對照表
        const ANOMALY_DATES = {
            1: '2025-12-19', // 職業安全衛生法
            5: '2025-09-04', // 職業安全衛生教育訓練規則
            9: '2025-05-14'  // 有機溶劑中毒預防規則
        };

        const LAW_DIFF_DATABASE = {
            1: { 
                rows: [
                    { no: '第 4 條', old: '本法適用於各業。但因事業規模、性質及風險程度...', new: '本法適用於各業。但因事業規模、性質及風險程度，經中央主管機關指定公告者，<ins>得分階段適用</ins>。', note: '擴大適用範圍' },
                    { no: '第 45 條', old: '有下列情事之一者，處新臺幣三萬元以上十五萬元以下罰鍰...', new: '有下列情事之一者，處新臺幣三萬元以上<ins>三十萬元</ins>以下罰鍰...', note: '罰則加重' }
                ]
            },
            4: { 
                rows: [
                    { no: '第 21 條', old: '雇主對於勞工從事作業，應採取必要之安全設備及措施。', new: '雇主對於勞工從事作業，應採取必要之安全設備及措施，<ins>並應落實自動檢查計畫</ins>。', note: '加強自主管理' },
                    { no: '第 128-1 條', old: '(新增條文)', new: '<ins>雇主對於高溫環境作業勞工，應提供必要之散熱設備及足夠之飲用水。</ins>', note: '新增熱危害預防' }
                ]
            },
            8: { 
                rows: [
                    { no: '附表一', old: '甲苯容許濃度：100 ppm', new: '甲苯容許濃度：<ins>50 ppm</ins>', note: '標準趨嚴' },
                    { no: '附表一', old: '二甲苯容許濃度：100 ppm', new: '二甲苯容許濃度：<ins>80 ppm</ins>', note: '標準趨嚴' }
                ]
            },
            24: { 
                rows: [
                    { no: '第 32-1 條', old: '雇主依第三十二條第一項及第二項規定使勞工延長工作時間...', new: '雇主依第三十二條第一項及第二項規定使勞工延長工作時間，<ins>應核實記載至分鐘為止</ins>。', note: '工時記載精細化' }
                ]
            }
        };

        const getMockDiff = (law) => {
            if (LAW_DIFF_DATABASE[law.id]) return LAW_DIFF_DATABASE[law.id];
            return {
                rows: [
                    { 
                        no: `第 ${Math.floor(Math.random() * 100) + 1} 條`, 
                        old: `雇主對於${law.name}所定之安全衛生事項，應依現行規定執行。`, 
                        new: `雇主對於${law.name}所定之安全衛生事項，應依現行規定執行，<ins>並應保留相關執行紀錄備查</ins>。`, 
                        note: '程序強化' 
                    }
                ]
            };
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('monitor');
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncText, setSyncText] = useState('正在執行鑑別程序...');
            const [selectedLaw, setSelectedLaw] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [filterType, setFilterType] = useState('全部');
            const [currentTime, setCurrentTime] = useState(new Date());
            
            // 追蹤哪些法規正處於「異常紅字」狀態
            const [anomalyLawIds, setAnomalyLawIds] = useState(new Set());

            // 初始法規清單
            const initialLaws = [
                { id: 1, name: '職業安全衛生法', type: '法律', remoteDate: '2025-10-19', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 2, name: '職業安全衛生法施行細則', type: '法規命令', remoteDate: '2020-02-27', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 3, name: '職業安全衛生管理辦法', type: '法規命令', remoteDate: '2022-01-05', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 4, name: '職業安全衛生設施規則', type: '法規命令', remoteDate: '2024-08-01', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 5, name: '職業安全衛生教育訓練規則', type: '法規命令', remoteDate: '2025-07-04', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 6, name: '職業安全衛生標示設置準則', type: '法規命令', remoteDate: '2014-07-02', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 7, name: '勞工作業環境監測實施辦法', type: '法規命令', remoteDate: '2016-11-02', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 8, name: '勞工作業場所容許暴露標準', type: '法規命令', remoteDate: '2025-04-11', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 9, name: '有機溶劑中毒預防規則', type: '法規命令', remoteDate: '2025-03-14', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 10, name: '危害性化學品標示及通識規則', type: '法規命令', remoteDate: '2018-11-09', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 11, name: '勞工健康保護規則', type: '法規命令', remoteDate: '2021-12-22', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 12, name: '女性勞工母性健康保護實施辦法', type: '法規命令', remoteDate: '2024-05-31', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 13, name: '妊娠與分娩後女性及未滿十八歲勞工禁止從事危險性或有害性工作認定標準', type: '行政規則', remoteDate: '2025-11-20', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 14, name: '精密作業勞工視機能保護設施標準', type: '法規命令', remoteDate: '2014-03-30', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 15, name: '工業用機器人危害預防標準', type: '法規命令', remoteDate: '2018-02-14', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 16, name: '鍋爐及壓力容器安全規則', type: '法規命令', remoteDate: '2014-07-01', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 17, name: '游離輻射防護法', type: '法律', remoteDate: '2002-01-30', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 18, name: '游離輻射防護法施行細則', type: '法規命令', remoteDate: '2008-02-22', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 19, name: '游離輻射防護安全標準', type: '法規命令', remoteDate: '2005-12-30', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 20, name: '放射性物質與可發生游離輻射設備及其輻射作業管理辦法', type: '法規命令', remoteDate: '2018-12-22', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 21, name: '放射性物質或可發生游離輻射設備操作人員管理辦法', type: '法規命令', remoteDate: '2009-04-17', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 22, name: '事業單位僱用女性勞工夜間工作場所必要之安全衛生設施標準', type: '法規命令', remoteDate: '2015-03-31', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 23, name: '機械設備器具安全標準', type: '法規命令', remoteDate: '2022-05-11', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 24, name: '勞動基準法', type: '法律', remoteDate: '2024-07-31', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 25, name: '勞工職業災害保險及保護法', type: '法律', remoteDate: '2021-04-30', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 26, name: '勞工職業災害保險及保護法施行細則', type: '法規命令', remoteDate: '2025-05-29', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 27, name: '勞工職業災害保險及保護法第十條規定參加保險辦法', type: '法規命令', remoteDate: '2022-03-09', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 28, name: '缺氧症預防規則', type: '法規命令', remoteDate: '2014-06-26', localCheckDate: UNIFIED_INITIAL_DATE }
            ];

            const [laws, setLaws] = useState(() => {
                const savedLaws = localStorage.getItem('osh_laws_data_v2');
                return savedLaws ? JSON.parse(savedLaws) : initialLaws;
            });

            useEffect(() => {
                localStorage.setItem('osh_laws_data_v2', JSON.stringify(laws));
            }, [laws]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const formatTime = (date) => {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                const hh = String(date.getHours()).padStart(2, '0');
                const mm = String(date.getMinutes()).padStart(2, '0');
                const ss = String(date.getSeconds()).padStart(2, '0');
                return `${y}/${m}/${d} ${hh}:${mm}:${ss}`;
            };

            const getLawStatus = (remoteDate, localDate, isAnomaly) => {
                if (isAnomaly) return { code: 'danger', color: 'bg-rose-600', text: '鑑別異常' };
                const rDate = new Date(remoteDate);
                const lDate = localDate ? new Date(localDate) : new Date(0);
                const today = new Date();
                if (rDate > lDate) return { code: 'danger', color: 'bg-rose-600', text: '鑑別異常' };
                if ((today - lDate) / (1000 * 60 * 60 * 24) > 365) return { code: 'warning', color: 'bg-amber-500', text: '例行性檢視' };
                return { code: 'success', color: 'bg-emerald-600', text: '鑑別完成' };
            };

            const handleAllSync = () => {
                setSyncText('系統偵測中：正在連線全國法規資料庫...');
                setIsSyncing(true);
                setTimeout(() => {
                    const newAnomalyIds = new Set();
                    setLaws(prev => prev.map(law => {
                        if (ANOMALY_DATES[law.id]) {
                            newAnomalyIds.add(law.id);
                            return { ...law, remoteDate: ANOMALY_DATES[law.id] };
                        }
                        return law;
                    }));
                    setAnomalyLawIds(newAnomalyIds);
                    setIsSyncing(false);
                }, 2000); 
            };

            const handleSingleSync = (lawId) => {
                if (ANOMALY_DATES[lawId]) {
                    setSyncText('正在掃描雲端法規異動...');
                    setIsSyncing(true);
                    setTimeout(() => {
                        setAnomalyLawIds(prev => new Set(prev).add(lawId));
                        setLaws(prev => prev.map(law => law.id === lawId ? { ...law, remoteDate: ANOMALY_DATES[lawId] } : law));
                        setIsSyncing(false);
                    }, 1200);
                } else {
                    setSyncText('正在重新分析條文異動...');
                    setIsSyncing(true);
                    setTimeout(() => {
                        const today = `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}-${String(new Date().getDate()).padStart(2, '0')}`;
                        setLaws(prev => prev.map(law => law.id === lawId ? { ...law, localCheckDate: today } : law));
                        setIsSyncing(false);
                    }, 1200);
                }
            };

            const handleConfirmIdentification = (lawId) => {
                setSyncText('正在歸檔鑑別報告並同步日期...');
                setIsSyncing(true);
                setTimeout(() => {
                    const today = `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}-${String(new Date().getDate()).padStart(2, '0')}`;
                    setLaws(prev => prev.map(law => {
                        if (law.id === lawId) {
                            return { ...law, localCheckDate: today, remoteDate: ANOMALY_DATES[lawId] || law.remoteDate };
                        }
                        return law;
                    }));
                    setAnomalyLawIds(prev => {
                        const next = new Set(prev);
                        next.delete(lawId);
                        return next;
                    });
                    setIsSyncing(false);
                    setActiveTab('monitor');
                }, 1500);
            };

            const handleExport = () => {
                const now = new Date();
                const quarter = Math.ceil((now.getMonth() + 1) / 3);
                const exportData = laws.map((law, index) => {
                    const status = getLawStatus(law.remoteDate, law.localCheckDate, anomalyLawIds.has(law.id));
                    return {
                        "序號": index + 1, "法規名稱": law.name, "法規類別": law.type, "鑑別季度": `${now.getFullYear()} Q${quarter}`,
                        "全國法規資料庫日期": law.remoteDate, "公司最近登錄/鑑別日期": law.localCheckDate, "合規狀態": status.text
                    };
                });
                const worksheet = XLSX.utils.json_to_sheet(exportData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "法規鑑別總表");
                XLSX.writeFile(workbook, `職安法規鑑別總表_${now.getFullYear()}_Q${quarter}.xlsx`);
            };

            const filteredLaws = useMemo(() => {
                return laws.filter(law => (filterType === '全部' || law.type === filterType) && law.name.includes(searchQuery));
            }, [searchQuery, filterType, laws]);

            const startSync = (law) => {
                setSyncText(`正在連線資料庫讀取《${law.name}》最新條文...`);
                setIsSyncing(true);
                setTimeout(() => {
                    setSelectedLaw(law);
                    setActiveTab('compare');
                    setIsSyncing(false);
                }, 1000);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-slate-900 border-b border-slate-800 px-10 py-6 flex justify-between items-center sticky top-0 z-40 shadow-xl">
                        <div className="flex items-center gap-6">
                            <div className="bg-blue-600 w-14 h-14 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
                                <i className="fas fa-shield-halved text-3xl"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black text-white leading-tight">
                                    職業安全法規鑑別系統
                                </h1>
                                <div className="text-xs text-slate-400 font-bold uppercase tracking-[0.15em] mt-1.5 opacity-80">
                                    OCCUPATIONAL SAFETY REGULATIONS IDENTIFICATION SYSTEM - DEMO MODE
                                </div>
                                <div className="flex items-center gap-2 mt-2">
                                    <div className="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></div>
                                    <span className="text-emerald-500 text-xs font-black tracking-widest">全國法規資料庫 API 連線中</span>
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-col items-end gap-3">
                            <div className="time-display-box">
                                <span className="text-slate-400 font-black text-xs tracking-widest tabular-nums opacity-90">
                                    {formatTime(currentTime)}
                                </span>
                            </div>
                            <div className="flex items-center gap-4">
                                <button onClick={handleAllSync} className="hidden lg:flex items-center gap-3 px-6 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-black hover:bg-indigo-700 transition-all shadow-lg active:scale-95 border-b-4 border-indigo-900">
                                    <i className="fas fa-bolt"></i> 一鍵同步
                                </button>
                                <button onClick={handleExport} className="hidden lg:flex items-center gap-3 px-6 py-2.5 bg-slate-700 text-white rounded-xl text-sm font-black hover:bg-slate-800 transition-all shadow-lg active:scale-95 border-b-4 border-slate-950">
                                    <i className="fas fa-file-export"></i> 匯出總表
                                </button>
                                <div className="hidden md:flex bg-slate-800 p-1 rounded-xl border border-slate-700">
                                    {['全部', '法律', '法規命令', '行政規則'].map(type => (
                                        <button
                                            key={type}
                                            onClick={() => setFilterType(type)}
                                            className={`px-4 py-1.5 rounded-lg text-xs font-black transition-all ${filterType === type ? 'bg-slate-700 text-blue-400 shadow-md' : 'text-slate-500 hover:text-slate-300'}`}
                                        >
                                            {type}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </header>

                    {isSyncing && (
                        <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-900/70 backdrop-blur-md text-center">
                            <div className="bg-white p-16 rounded-[3rem] shadow-2xl relative overflow-hidden max-w-sm w-full mx-4">
                                <div className="scan-line absolute inset-0"></div>
                                <div className="relative z-10">
                                    <i className="fas fa-circle-notch text-6xl text-blue-600 animate-spin mb-8"></i>
                                    <h3 className="text-2xl font-black text-slate-800 px-4">{syncText}</h3>
                                    <p className="text-slate-500 mt-3 text-base font-medium">系統正在即時更新大數據資料庫紀錄...</p>
                                </div>
                            </div>
                        </div>
                    )}

                    <main className="flex-1 p-8 md:p-12 overflow-y-auto main-container">
                        <div className="max-w-6xl mx-auto">
                            {activeTab === 'monitor' ? (
                                <div className="fade-in space-y-8">
                                    <div className="flex flex-col md:flex-row md:items-end justify-between gap-6">
                                        <div>
                                            <h2 className="text-3xl font-black text-slate-800 tracking-tight">法規動態監測</h2>
                                            <p className="text-slate-500 text-base font-medium mt-1">系統正在即時比對全國法規資料庫之最新修訂內容</p>
                                        </div>
                                        <div className="relative">
                                            <i className="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                            <input 
                                                type="text" 
                                                placeholder="快速搜尋法規名稱..." 
                                                className="pl-14 pr-6 py-4 bg-white border border-slate-200 rounded-2xl text-base w-full md:w-80 focus:ring-4 focus:ring-blue-500/10 outline-none shadow-sm transition-all"
                                                value={searchQuery}
                                                onChange={(e) => setSearchQuery(e.target.value)}
                                            />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 gap-5">
                                        {filteredLaws.map((law, index) => {
                                            const isAnomaly = anomalyLawIds.has(law.id);
                                            const status = getLawStatus(law.remoteDate, law.localCheckDate, isAnomaly);
                                            return (
                                                <div key={law.id} className="p-6 rounded-3xl transition-all flex flex-col lg:flex-row lg:items-center justify-between law-card-glow gap-8">
                                                    <div className="flex gap-6 items-center flex-1">
                                                        <div className="relative shrink-0">
                                                            <div className={`w-14 h-14 rounded-2xl flex flex-col items-center justify-center shadow-lg text-white transition-colors duration-300 ${isAnomaly ? 'bg-rose-600' : 'bg-orange-400'}`}>
                                                                <span className="text-sm font-black tracking-tight">{index + 1}</span>
                                                            </div>
                                                        </div>
                                                        <div className="flex flex-col min-w-0 flex-1">
                                                            <div className="flex items-center gap-3 flex-wrap mb-2.5">
                                                                <h3 className="font-black text-slate-800 truncate text-xl">{law.name}</h3>
                                                                <span className="text-[10px] font-black bg-slate-100 text-slate-500 px-3 py-1 rounded-lg border border-slate-200 uppercase">{law.type}</span>
                                                                {isAnomaly && <span className="new-badge text-[10px] font-black bg-rose-50 text-rose-600 px-3 py-1 rounded-lg border border-rose-200">法規已異動</span>}
                                                            </div>
                                                            <div className="flex flex-wrap items-center gap-y-3">
                                                                <div className="flex flex-col min-w-[140px]">
                                                                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">全國法規公佈日</span>
                                                                    <span className={`text-sm font-bold ${isAnomaly ? 'text-rose-600' : 'text-slate-700'}`}>{law.remoteDate}</span>
                                                                </div>
                                                                <div className="w-px h-8 bg-slate-200 mx-6 hidden sm:block"></div>
                                                                <div className="flex flex-col min-w-[140px]">
                                                                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">最近鑑別/登錄日</span>
                                                                    <span className={`text-sm font-black ${status.code === 'danger' && !isAnomaly ? 'text-rose-500' : 'text-emerald-700'}`}>{law.localCheckDate}</span>
                                                                </div>
                                                                <div className="ml-6 flex items-center gap-2">
                                                                    <span className={`text-[11px] font-black px-4 py-1.5 rounded-lg shadow-sm text-white ${status.color}`}>{status.text}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-4 shrink-0 ml-20 lg:ml-0">
                                                        <button onClick={() => startSync(law)} className={`flex-1 md:flex-none px-6 py-4 rounded-2xl font-black text-sm border transition-all active:scale-95 ${isAnomaly ? 'bg-rose-50 text-rose-600 border-rose-200 hover:bg-rose-100' : 'bg-slate-100 text-slate-600 border-slate-200 hover:bg-slate-200'}`}>比對詳情</button>
                                                        <button onClick={() => handleSingleSync(law.id)} className={`flex-1 md:flex-none px-10 py-4 rounded-2xl font-black text-sm text-white shadow-xl transition-all duration-200 transform hover:scale-105 active:scale-95 flex items-center justify-center ${status.code === 'danger' ? 'bg-rose-600 shadow-rose-600/30 hover:bg-rose-700 animate-pulse' : 'bg-blue-600 shadow-blue-600/30 hover:bg-blue-700'}`}>立即鑑別</button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ) : (
                                <div className="fade-in space-y-8">
                                    <button onClick={() => setActiveTab('monitor')} className="back-nav-btn flex items-center gap-3 text-base font-black text-slate-500 hover:text-blue-600 transition-all group">
                                        <i className="fas fa-chevron-left transition-transform group-hover:-translate-x-1"></i> 返回監控清單
                                    </button>
                                    <div className="bg-white rounded-[3rem] shadow-2xl border border-slate-200 overflow-hidden workbench-card">
                                        <div className="p-12 border-b border-slate-100 bg-slate-50/50">
                                            <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-8">
                                                <div className="space-y-5">
                                                    <div className="inline-flex items-center gap-2.5 bg-blue-100 text-blue-700 px-4 py-1.5 rounded-full text-[11px] font-black uppercase"><i className="fas fa-microchip"></i> 鑑別工作台</div>
                                                    <h2 className="text-4xl font-black text-slate-800 tracking-tight leading-tight">{selectedLaw?.name}</h2>
                                                    <div className="flex gap-6">
                                                        <div className="px-4 py-2 bg-white border border-slate-200 rounded-xl shadow-sm">
                                                            <span className="text-[10px] font-bold text-slate-400 block uppercase mb-1">全國資料庫日期</span>
                                                            <span className={`text-sm font-black ${anomalyLawIds.has(selectedLaw?.id) ? 'text-rose-600' : 'text-slate-700'}`}>{selectedLaw?.remoteDate}</span>
                                                        </div>
                                                        <div className="px-4 py-2 bg-white border border-slate-200 rounded-xl shadow-sm">
                                                            <span className="text-[10px] font-bold text-slate-400 block uppercase mb-1">當前登錄日期</span>
                                                            <span className="text-sm font-black text-emerald-600">{selectedLaw?.localCheckDate}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex gap-4 action-buttons">
                                                    <button onClick={() => window.print()} className="px-8 py-4 rounded-2xl bg-white border border-slate-200 text-slate-600 font-black text-base transition-all hover:bg-slate-50 active:scale-95"><i className="fas fa-print mr-2"></i> 列印報告</button>
                                                    <button onClick={() => handleConfirmIdentification(selectedLaw.id)} className="px-8 py-4 rounded-2xl bg-blue-600 text-white font-black text-base shadow-xl hover:bg-blue-700 transition-all active:scale-95">確認鑑別並更新日期</button>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="p-12 bg-white">
                                            <div className="overflow-hidden border border-slate-200 rounded-3xl shadow-sm">
                                                <table className="w-full text-left border-collapse">
                                                    <thead>
                                                        <tr className="bg-slate-50 border-b border-slate-200">
                                                            <th className="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-widest w-24">項次</th>
                                                            <th className="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-widest w-32">條號</th>
                                                            <th className="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-widest">條文比對 (舊版 vs 新版)</th>
                                                            <th className="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-widest w-40">異動屬性</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-100">
                                                        {getMockDiff(selectedLaw)?.rows.map((row, idx) => (
                                                            <tr key={idx} className="hover:bg-slate-50/50 transition-colors">
                                                                <td className="px-8 py-6 font-bold text-slate-400">{idx + 1}</td>
                                                                <td className="px-8 py-6 font-black text-blue-600">{row.no}</td>
                                                                <td className="px-8 py-6">
                                                                    <div className="space-y-4">
                                                                        <div className="text-slate-400 text-sm bg-slate-50 p-3 rounded-lg border-l-4 border-slate-200 line-through">{row.old}</div>
                                                                        <div className="text-slate-800 text-base font-medium p-3 rounded-lg border-l-4 border-blue-500 bg-blue-50/30" dangerouslySetInnerHTML={{ __html: row.new }}></div>
                                                                    </div>
                                                                </td>
                                                                <td className="px-8 py-6"><span className="px-4 py-1.5 bg-amber-100 text-amber-700 rounded-full text-xs font-black">{row.note}</span></td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    <footer className="bg-slate-900 border-t border-slate-800 px-10 py-8 text-center space-y-4">
                        <div className="flex flex-col md:flex-row justify-center items-center gap-4 md:gap-8">
                            <p className="text-slate-400 text-xs font-bold tracking-widest uppercase">© 2026 職業安全衛生管理部 - 法規智慧監控系統專用介面</p>
                            <span className="hidden md:block text-slate-700">|</span>
                            <div className="flex items-center gap-3 bg-slate-800/50 px-5 py-2 rounded-xl border border-slate-700/50 shadow-inner">
                                <div className="w-2 h-2 bg-blue-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(59,130,246,0.6)]"></div>
                                <span className="text-slate-300 text-[10px] font-black tracking-[0.2em] uppercase">System Developer By Sam Sun</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
